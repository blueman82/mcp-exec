            - paragraph [ref=e3130]:
              - text: Ketchup uses
              - strong [ref=e3131]: Personal Access Tokens (PATs)
              - text: for JIRA authentication, replacing the deprecated Basic Authentication (username/password) method. JIRA fully deprecated Basic Auth on
              - strong [ref=e3132]: November 30, 2025
              - text: .
            - paragraph [ref=e3133]:
              - strong [ref=e3134]: Why PATs?
            - list [ref=e3135]:
              - listitem [ref=e3136]:
                - strong [ref=e3137]: Security
                - text: ": Token-based authentication is more secure than username/password"
              - listitem [ref=e3138]:
                - strong [ref=e3139]: Compliance
                - text: ": Aligns with Adobe's enterprise security standards"
              - listitem [ref=e3140]:
                - strong [ref=e3141]: Mandatory
                - text: ": JIRA API rejects Basic Auth after Nov 30, 2025"
              - listitem [ref=e3142]:
                - strong [ref=e3143]: Automated rotation
                - text: ": System automatically rotates tokens before expiry"
            - paragraph [ref=e3144]:
              - strong [ref=e3145]: Key Constraint
              - text: ": PATs have a maximum 90-day expiry (mandatory, cannot be extended). This requires automated rotation to maintain continuous JIRA access."
