            - list [ref=e2246]:
              - listitem [ref=e2247]:
                - text: "You must be authorized to run Ketchup. To check your access or request it, run:"
                - strong [ref=e2248]: /ketchup access
              - listitem [ref=e2249]:
                - text: Add the Ketchup app to any Slack warroom in the CSO workspace by typing
                - strong [ref=e2250]: "@Ketchup"
                - text: and pressing enter. Accept the prompt to add it to the channel.
              - listitem [ref=e2251]:
                - text: Type
                - strong [ref=e2252]: /ketchup status
                - text: in the chat to get a concise summary with current status, actions taken by engineers, timeline and next steps.
              - listitem [ref=e2253]:
                - text: Type
                - strong [ref=e2254]: /ketchup report
                - text: to get a detailed incident report with impact analysis, actions taken, evidence and RCA.
              - listitem [ref=e2255]:
                - text: Type
                - strong [ref=e2256]: /ketchup query <question>
                - text: inside a war room to ask Ketchup questions in natural language for specific details.
              - listitem [ref=e2257]:
                - text: Type
                - strong [ref=e2258]: /ketchup list
                - text: to get a list of active war rooms that Ketchup is a member of.
              - listitem [ref=e2259]:
                - text: Access the
                - strong [ref=e2260]: Ketchup Home Tab
                - text: "by clicking on the Ketchup app in your Slack sidebar and selecting \"Home\" at the top. Here you can:"
                - list [ref=e2261]:
                  - listitem [ref=e2262]: See a personalized greeting (e.g., "Hi YourName!").
                  - listitem [ref=e2263]: Customize your preferences for summaries (product focus, detail level, time window).
                  - listitem [ref=e2264]:
                    - text: Access the "Support & Feedback" section to find the
                    - link "Ketchup How-To Guide" [ref=e2265] [cursor=pointer]:
                      - /url: https://wiki.corp.adobe.com/display/neolane/Ketchup+How-To
                    - text: ", join the"
                    - link "#ketchup-feedback" [ref=e2266] [cursor=pointer]:
                      - /url: https://adobe.enterprise.slack.com/archives/C08CQN1JCSC
                    - text: channel, and submit feedback.
              - listitem [ref=e2267]:
                - text: Type
                - strong [ref=e2268]: "@Ketchup"
                - text: followed by a question in any warroom to have a conversation. Ask about current status, similar past incidents, or system health. Ketchup answers in a thread and remembers follow-up questions.
