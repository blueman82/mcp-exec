            - list [ref=e2234]:
              - listitem [ref=e2235]: Ketchup is an AI-Powered CSO tool for Slack — summarization, conversational agent, and incident investigation.
              - listitem [ref=e2236]: It translates lengthy Slack CSO Warrooms into concise summaries, answers questions via @Ketchup mentions, and searches 132K+ historical JIRA tickets for similar past incidents.
              - listitem [ref=e2237]: Built on Docker containers running on EC2 with FastAPI, powered by Azure OpenAI (GPT-5.4-mini) and ChromaDB vector search (132K+ JIRA tickets indexed for historical incident lookup).
            - 'heading "8. STATUS: CA Approved 28-01-25 | PPC Approved 27-02-25 Copy link to heading" [level=1] [ref=e2238]':
