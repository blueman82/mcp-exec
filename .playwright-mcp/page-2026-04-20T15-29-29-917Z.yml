            - list [ref=e246]:
              - listitem [ref=e247]: mcp-exec is a local MCP server that lets AI tools (Claude Code, Cursor, etc.) execute sandboxed TypeScript/JavaScript code against a pool of configured backend MCP servers.
              - listitem [ref=e248]: It generates typed wrappers (FuzzyProxy, parameter guards, response guards) at call time and maintains a disk-cached tool catalog — so AI agents see API signatures before writing code, saving 87–91% of tokens versus per-call schema fetches.
              - listitem [ref=e249]:
                - text: Integrates with the
                - strong [ref=e250]: Adobe MCP Gateway
                - text: to provide Okta-authenticated access to Jira, GitHub, Glean, and other Adobe tools via a single local process and one shared
                - code [ref=e251]: .common.env
                - text: credential file.
