              - listitem [ref=f1e25]: It generates typed wrappers (FuzzyProxy, parameter guards, response guards) at call time and maintains a disk-cached tool catalog — so AI agents see API signatures before writing code, saving 87–91% of tokens versus per-call schema fetches.
