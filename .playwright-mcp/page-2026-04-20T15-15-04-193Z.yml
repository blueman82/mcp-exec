              - text: "7. Summary:"
              - button "Copy link to heading" [ref=e322] [cursor=pointer]:
                - img "Copy link to heading" [ref=e323]: 
                - text:  
            - list [ref=e324]:
              - listitem [ref=e325]: Ketchup is an AI-Powered CSO tool for Slack — summarization, conversational agent, and incident investigation.
              - listitem [ref=e326]: It translates lengthy Slack CSO Warrooms into concise summaries, answers questions via @Ketchup mentions, and searches 132K+ historical JIRA tickets for similar past incidents.
              - listitem [ref=e327]: Built on Docker containers running on EC2 with FastAPI, powered by Azure OpenAI (GPT-5.4-mini) and ChromaDB vector search (132K+ JIRA tickets indexed for historical incident lookup).
            - 'heading "8. STATUS: CA Approved 28-01-25 | PPC Approved 27-02-25 Copy link to heading" [level=1] [ref=e328]':
              - text: "8. STATUS: CA Approved 28-01-25 | PPC Approved 27-02-25"
