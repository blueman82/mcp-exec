metadata:
  feature_name: "JIRA PAT Migration with Automated Rotation"
  created: "2025-11-12"
  file_sequence: 4
  total_files: 4
  tasks_in_file: []
  previous_file: "plan-03-infrastructure.yaml"
  description: "Testing strategy, commit strategy, common pitfalls, and resources for JIRA PAT migration"

# Testing strategy
testing_strategy:
  overview: |
    This project requires comprehensive testing at multiple layers due to its critical security nature
    and cross-service architecture. Testing must validate both Python (PAT Rotator) and Node.js (MCP JIRA)
    components, with special attention to AWS integration, iPaaS proxy authentication, and zero-downtime deployment.

  test_pyramid:
    unit_tests:
      priority: "High - Run constantly during development"
      location: "tests/unit/"
      coverage_target: "95%+"
      what_to_test:
        - "TypedDI protocol implementations (JiraPATRotatorProtocol, JiraPATNotifierProtocol)"
        - "PATRotationManager lifecycle methods (create, validate, rotate, cleanup)"
        - "PATSlackNotifier message formatting and alert logic"
        - "PATRotationScheduler job scheduling and trigger conditions"
        - "MCP config.ts PAT configuration loading"
        - "MCP utils.ts header construction with PAT vs username/password"
        - "AWS Secrets Manager interactions (mocked)"
        - "iPaaS HTTP client calls (mocked)"
      setup_required:
        - "Pytest fixtures for mocked dependencies"
        - "Mock AWS Secrets Manager responses"
        - "Mock iPaaS API responses (200/201/401/403/500)"
        - "Isolated test environment variables"
      run_command: "cd tests/setup && make test-unit"
      examples:
        python_unit_test: |
          # tests/unit/ketchup_pat_rotator/test_rotation_manager.py
          import pytest
          from unittest.mock import AsyncMock, MagicMock
          from ketchup_pat_rotator.rotation_manager import PATRotationManager

          @pytest.fixture
          def mock_secrets_manager():
              mock = MagicMock()
              mock.get_secret.return_value = {'ketchup_jira_pat': 'test_pat_123'}
              return mock

          @pytest.fixture
          def mock_http_client():
              mock = AsyncMock()
              mock.post.return_value = {'id': 'new_token_id', 'token': 'new_pat_456'}
              mock.get.return_value = {'status': 200, 'data': {'id': 'test'}}
              return mock

          @pytest.mark.asyncio
          async def test_rotate_pat_full_lifecycle_success(mock_secrets_manager, mock_http_client):
              """Test complete PAT rotation workflow succeeds."""
              manager = PATRotationManager(
                  secrets_manager=mock_secrets_manager,
                  http_client=mock_http_client
              )

              result = await manager.rotate_pat(token_name_prefix='ketchup-test')

              assert result['success'] is True
              assert 'new_token_id' in result
              assert mock_http_client.post.called  # Created new token
              assert mock_http_client.get.called   # Validated token
              assert mock_secrets_manager.update_secret.called  # Updated secrets

        nodejs_unit_test: |
          // corp_jira_mcp/tests/utils.test.js
          const { constructIpaasHeaders } = require('../common/utils');

          describe('constructIpaasHeaders - PAT Support', () => {
            const mockConfig = {
              auth: {
                pat: 'test_pat_token_123',
                usePat: true,
                username: 'test_user',
                password: 'test_pass'
              },
              useIpaas: true
            };

            it('should add x-authorization header when usePat is true', () => {
              const headers = constructIpaasHeaders('ims_token_xyz', 'api_key_123', mockConfig);

              expect(headers['x-authorization']).toBe('Bearer test_pat_token_123');
              expect(headers['Username']).toBeUndefined();
              expect(headers['Password']).toBeUndefined();
            });

            it('should fallback to username/password when usePat is false', () => {
              const configWithoutPat = { ...mockConfig, auth: { ...mockConfig.auth, usePat: false } };
              const headers = constructIpaasHeaders('ims_token_xyz', 'api_key_123', configWithoutPat);

              expect(headers['Username']).toBe('test_user');
              expect(headers['Password']).toBe('test_pass');
              expect(headers['x-authorization']).toBeUndefined();
            });
          });

    integration_tests:
      priority: "Medium - Run before PR merge"
      location: "tests/integration"
      what_to_test:
        - "Real AWS Secrets Manager access (read-only during tests)"
        - "iPaaS proxy authentication with real PAT (WARNING: Creates real tokens!)"
        - "MCP JIRA service end-to-end JIRA API calls"
        - "Feature flag toggles (JIRA_USE_PAT_AUTH=true/false)"
        - "PAT validation against live JIRA instance"
        - "Backup PAT fallback mechanism"
        - "Old token cleanup (list/delete operations)"
      setup_required:
        - "AWS profile configured: campaign_prod_v7"
        - "Valid JIRA PAT in AWS Secrets Manager"
        - "iPaaS proxy accessible from test environment"
        - "Test JIRA project for safe API calls"
      run_command: "cd tests/setup && make test-integration ARGS='-k test_pat'"
      caution: |
        Integration tests CREATE REAL PAT TOKENS in JIRA. Run sparingly and clean up after.
        Mark slow tests with @pytest.mark.slow to avoid accidental execution.
      examples:
        integration_test: |
          # tests/integration/test_pat_rotation_integration.py
          import pytest
          from packages.core.typed_di import TypedServiceRegistry
          from ketchup_pat_rotator.rotation_manager import PATRotationManager

          @pytest.mark.integration
          @pytest.mark.slow
          async def test_validate_current_pat_real_aws():
              """Test validation with real AWS Secrets Manager."""
              registry = TypedServiceRegistry()
              manager = registry.resolve(PATRotationManager)

              is_valid = await manager.validate_current_pat()

              assert isinstance(is_valid, bool)
              # Don't assert True - PAT might be expired in test env

          @pytest.mark.integration
          @pytest.mark.slow
          async def test_full_rotation_lifecycle_real_api():
              """CAUTION: Creates real PAT token in JIRA!"""
              registry = TypedServiceRegistry()
              manager = registry.resolve(PATRotationManager)

              result = await manager.rotate_pat(token_name_prefix='ketchup-test-integration')

              assert result['success'] is True
              assert 'new_token_id' in result

              # CLEANUP: Delete test token immediately
              await manager._cleanup_old_tokens(keep_last=0)

    e2e_tests:
      enabled: false
      reason: "Manual smoke testing via Slack after deployment is sufficient. E2E automation not required."

    manual_testing:
      required: true
      location: "Slack #ketchup_testing channel"
      critical_flows:
        - flow: "JIRA ticket creation with PAT"
          steps:
            - "In #ketchup_testing, run: /jira_create summary=Test PAT Auth project=TEST type=Task"
            - "Verify ticket created successfully"
            - "Check Ketchup logs show 'Using PAT authentication' (not username/password)"
            - "Verify ticket appears in JIRA with correct data"

        - flow: "JIRA query with PAT fallback"
          steps:
            - "Run: /jira_query project=TEST status=Open assignee=currentUser()"
            - "Verify results returned"
            - "Temporarily invalidate primary PAT in AWS Secrets"
            - "Run same query - should auto-fallback to backup PAT"
            - "Verify results still returned with warning logged"

        - flow: "PAT rotation triggered manually"
          steps:
            - "SSH to prod1: ssh ketchup-prod1.campaign.adobe.com"
            - "Exec into container: sudo docker exec -it ketchup-pat-rotator bash"
            - "Trigger rotation: python -c 'from rotation_manager import PATRotationManager; import asyncio; asyncio.run(PATRotationManager().rotate_pat())'"
            - "Verify success message in Slack #ketchup_alerts"
            - "Verify new PAT in AWS Secrets Manager has future expiry date"

        - flow: "Zero-downtime feature flag toggle"
          steps:
            - "Start JIRA operations in Slack (continuous /jira_query commands)"
            - "Toggle JIRA_USE_PAT_AUTH=false in docker-compose.yml"
            - "Restart services: sudo docker-compose restart mcp-jira ketchup-app"
            - "Verify JIRA operations continue working (no 5xx errors)"
            - "Toggle back to JIRA_USE_PAT_AUTH=true"
            - "Restart and verify PAT auth working"

      smoke_tests:
        - test: "All containers healthy"
          command: "sudo docker ps | grep ketchup"
          expected: "All 14 containers running, none restarting"

        - test: "PAT rotator service logs"
          command: "sudo docker logs ketchup-pat-rotator --tail 50"
          expected: "No errors, shows 'Dependencies resolved via TypedDI'"

        - test: "MCP JIRA health check"
          command: "curl http://localhost:8081/health"
          expected: "200 OK with 'status: healthy'"

  test_design_principles:
    patterns_to_use:
      - pattern: "Arrange-Act-Assert (AAA) pattern"
        why: "Clear test structure improves readability"
        example: |
          # Arrange: Set up test data and mocks
          mock_secrets = MagicMock()
          mock_secrets.get_secret.return_value = {'pat': 'test_123'}
          manager = PATRotationManager(secrets_manager=mock_secrets)

          # Act: Execute the function under test
          result = await manager.validate_current_pat()

          # Assert: Verify the outcome
          assert result is True
          mock_secrets.get_secret.assert_called_once()

      - pattern: "Factory pattern for test data"
        why: "Consistent test fixtures reduce duplication"
        example: |
          # tests/conftest.py
          @pytest.fixture
          def valid_pat_response():
              return {
                  'id': 'token_12345',
                  'token': 'ATATT3xFfGF0...',
                  'name': 'ketchup-test-20251112',
                  'expirationDate': '2026-01-11T00:00:00Z'
              }

          # tests/unit/test_rotation_manager.py
          def test_create_pat_parses_response_correctly(valid_pat_response, mock_http_client):
              mock_http_client.post.return_value = valid_pat_response
              manager = PATRotationManager(http_client=mock_http_client)
              # ... test logic

      - pattern: "Parametrized tests for edge cases"
        why: "Efficiently test multiple input scenarios"
        example: |
          @pytest.mark.parametrize("env_value,expected", [
              ("true", True),
              ("True", True),
              ("false", False),
              ("False", False),
              ("", False),
              (None, False)
          ])
          def test_feature_flag_parsing(env_value, expected):
              if env_value is None:
                  os.environ.pop('JIRA_USE_PAT_AUTH', None)
              else:
                  os.environ['JIRA_USE_PAT_AUTH'] = env_value

              config = load_config()
              assert config.auth.usePat == expected

      - pattern: "Async test fixtures with pytest-asyncio"
        why: "Proper async context for testing async code"
        example: |
          @pytest.fixture
          async def initialized_registry():
              registry = TypedServiceRegistry()
              await registry.register_all_services()
              yield registry
              await registry.cleanup()

          @pytest.mark.asyncio
          async def test_dependency_injection(initialized_registry):
              manager = initialized_registry.resolve(PATRotationManager)
              assert isinstance(manager, PATRotationManager)

    anti_patterns_to_avoid:
      - pattern: "Testing implementation details"
        why: "Makes tests brittle and coupled to internals"
        instead: "Test behavior and public API contracts"
        bad_example: |
          # BAD: Testing private method implementation
          def test_internal_token_parsing():
              manager = PATRotationManager()
              result = manager._parse_token_response({'token': 'xyz'})
              assert result == 'xyz'
        good_example: |
          # GOOD: Testing public API behavior
          @pytest.mark.asyncio
          async def test_rotate_pat_returns_valid_result(mock_http_client):
              mock_http_client.post.return_value = {'token': 'xyz', 'id': '123'}
              manager = PATRotationManager(http_client=mock_http_client)

              result = await manager.rotate_pat()

              assert result['success'] is True
              assert 'new_token_id' in result

      - pattern: "Shared mutable state between tests"
        why: "Creates test interdependencies and flakiness"
        instead: "Use pytest fixtures with function scope (default)"
        bad_example: |
          # BAD: Global state shared across tests
          global_config = {'pat': 'test_123'}

          def test_one():
              global_config['pat'] = 'modified'
              assert do_something(global_config)

          def test_two():
              # Fails if test_one ran first!
              assert global_config['pat'] == 'test_123'
        good_example: |
          # GOOD: Fresh fixture for each test
          @pytest.fixture
          def fresh_config():
              return {'pat': 'test_123'}

          def test_one(fresh_config):
              fresh_config['pat'] = 'modified'
              assert do_something(fresh_config)

          def test_two(fresh_config):
              # Always gets fresh config
              assert fresh_config['pat'] == 'test_123'

      - pattern: "Over-mocking business logic"
        why: "Reduces test value and misses real bugs"
        instead: "Only mock external dependencies (HTTP, DB, filesystem)"
        bad_example: |
          # BAD: Mocking internal business logic
          @patch('rotation_manager.calculate_expiry_date')
          def test_rotate_pat(mock_calculate):
              mock_calculate.return_value = '2026-01-11'
              # Test becomes meaningless
        good_example: |
          # GOOD: Mock external HTTP client, test real logic
          @pytest.mark.asyncio
          async def test_rotate_pat(mock_http_client):
              mock_http_client.post.return_value = {'token': 'xyz'}
              manager = PATRotationManager(http_client=mock_http_client)

              result = await manager.rotate_pat()
              # Real calculate_expiry_date() logic runs

    mocking_guidelines:
      mock_these:
        - "AWS Secrets Manager (boto3 calls)"
        - "iPaaS HTTP requests (aiohttp/httpx)"
        - "Slack API calls (posting messages)"
        - "System time (datetime.now for consistent tests)"
        - "Environment variables (os.environ)"
        - "APScheduler job execution"

      dont_mock_these:
        - "TypedDI protocol implementations"
        - "Business logic (PAT expiry calculations)"
        - "Data transformations (date formatting)"
        - "Configuration validation logic"
        - "Internal utility functions"

      project_mocking_pattern:
        reference: "tests/unit/conftest.py"
        example: |
          # tests/unit/conftest.py - Shared fixtures
          import pytest
          from unittest.mock import AsyncMock, MagicMock, patch

          @pytest.fixture
          def mock_secrets_manager():
              mock = MagicMock()
              mock.get_secret.return_value = {
                  'ketchup_jira_pat': 'primary_pat_123',
                  'ketchup_jira_pat_backup': 'backup_pat_456',
                  'ketchup_jira_pat_expiry': '2026-01-11T00:00:00Z'
              }
              mock.update_secret.return_value = {'VersionId': 'v123'}
              return mock

          @pytest.fixture
          def mock_http_client():
              mock = AsyncMock()
              # Default success responses
              mock.post.return_value = {
                  'id': 'new_token_id',
                  'token': 'ATATT3xFfGF0...',
                  'expirationDate': '2026-01-11T00:00:00Z'
              }
              mock.get.return_value = {'status': 200, 'data': {'id': 'current_user'}}
              mock.delete.return_value = {'status': 204}
              return mock

          @pytest.fixture
          def mock_slack_client():
              mock = AsyncMock()
              mock.post_message.return_value = {'ok': True, 'ts': '1234567890.123456'}
              return mock

  test_coverage_requirements:
    overall_target: "95%+"
    critical_paths:
      - path: "ketchup_pat_rotator/rotation_manager.py"
        target: "100%"
        reason: "Core PAT lifecycle logic - any bugs are critical"

      - path: "ketchup_pat_rotator/scheduler.py"
        target: "95%+"
        reason: "Automated jobs must be reliable"

      - path: "corp_jira_mcp/src/utils.js"
        target: "90%+"
        reason: "Header construction affects all JIRA calls"

      - path: "corp_jira_mcp/src/config.ts"
        target: "90%+"
        reason: "Config errors break entire service"

    acceptable_exclusions:
      - "corp_jira_mcp/tools/jira.ts (integration with external MCP framework)"
      - "ketchup_pat_rotator/main.py (entry point, minimal logic)"
      - "Type stubs and protocol definitions"

    run_coverage_report: |
      # Python coverage
      cd tests/setup
      make test-unit ARGS="--cov=ketchup_pat_rotator --cov=packages/core/typed_di/protocols/jira_protocols --cov-report=html --cov-report=term-missing"

      # View HTML report
      open htmlcov/index.html

      # Node.js coverage
      cd corp_jira_mcp
      npm test -- --coverage

# Commit strategy
commit_strategy:
  overview: |
    Follow strict TDD with atomic commits. Each task should result in 1-3 commits:
    (1) tests first, (2) implementation, (3) optional documentation.
    Commit messages follow Conventional Commits format.

  commit_frequency: "High - commit after each logical unit of work (every 30-60 minutes)"

  commit_guidelines:
    - "Write tests BEFORE implementation (commit separately)"
    - "Keep commits atomic - one logical change per commit"
    - "Use imperative mood ('add' not 'added', 'fix' not 'fixed')"
    - "Reference task numbers in commit body if helpful"
    - "Commit early and often - easier to squash than split"
    - "Each worktree maintains independent commit history"

  message_format:
    pattern: "type(scope): brief description\n\nOptional body with details"
    types:
      - "feat: New feature"
      - "fix: Bug fix"
      - "test: Adding/updating tests"
      - "refactor: Code restructuring without behavior change"
      - "docs: Documentation only"
      - "chore: Maintenance (dependencies, build config)"
      - "perf: Performance improvement"
    scopes:
      - "pat-rotator: ketchup-pat-rotator service"
      - "mcp-jira: corp_jira_mcp service"
      - "typed-di: TypedDI system changes"
      - "infrastructure: Docker/deployment configs"
      - "secrets: AWS Secrets Manager"
    examples:
      - "feat(mcp-jira): add PAT authentication support to config"
      - "test(pat-rotator): add unit tests for PATRotationManager"
      - "fix(mcp-jira): correct header construction for PAT auth"
      - "docs(pat-rotator): add deployment runbook for PAT rotation"
      - "chore(infrastructure): update docker-compose with PAT env vars"

  example_commit_sequence:
    task_1_mcp_config:
      - sequence: 1
        type: "test"
        scope: "mcp-jira"
        description: "add unit tests for PAT config loading"
        files:
          - "corp_jira_mcp/tests/config.test.ts"
        message: |
          test(mcp-jira): add unit tests for PAT config loading

          Tests for new PAT configuration fields:
          - JIRA_PAT environment variable
          - JIRA_PAT_BACKUP environment variable
          - JIRA_USE_PAT_AUTH feature flag
          - Backward compatibility with username/password

      - sequence: 2
        type: "feat"
        scope: "mcp-jira"
        description: "add PAT authentication support to config"
        files:
          - "corp_jira_mcp/src/config.ts"
        message: |
          feat(mcp-jira): add PAT authentication support to config

          Extends config.ts with PAT fields:
          - auth.pat (primary PAT from env)
          - auth.patBackup (backup PAT from env)
          - auth.usePat (feature flag toggle)

          Maintains backward compatibility with existing username/password auth.
          Feature flag defaults to false for safe rollout.

    task_6_rotation_manager:
      - sequence: 1
        type: "test"
        scope: "pat-rotator"
        description: "add unit tests for PATRotationManager"
        files:
          - "tests/unit/ketchup_pat_rotator/test_rotation_manager.py"
        message: |
          test(pat-rotator): add unit tests for PATRotationManager

          Comprehensive test coverage:
          - rotate_pat() full lifecycle (create → validate → update → cleanup)
          - validate_current_pat() with backup fallback
          - get_pat_expiry_date() date parsing
          - Error handling for API failures
          - Mocked AWS Secrets and iPaaS HTTP client

      - sequence: 2
        type: "feat"
        scope: "pat-rotator"
        description: "implement PATRotationManager class"
        files:
          - "ketchup_pat_rotator/rotation_manager.py"
        message: |
          feat(pat-rotator): implement PATRotationManager class

          Core PAT lifecycle management:
          - Creates new PAT via iPaaS /rest/pat/latest/tokens
          - Validates PAT with /rest/api/3/myself
          - Updates AWS Secrets (primary → backup → primary strategy)
          - Cleans up old tokens (keeps last 2)
          - Automatic backup fallback on validation failure

          Implements JiraPATRotatorProtocol for TypedDI integration.

  worktree_commit_workflow:
    overview: |
      Each worktree (chain-1, chain-2, chain-3, independent-1) maintains its own branch
      and commit history. Commits in one worktree don't affect others. Merge branches
      to main independently when complete.

    workflow_steps:
      - step: "Create worktree with feature branch"
        command: "git worktree add ../ketchup-chain-1 -b feature/jira-pat-migration/chain-1"

      - step: "Work in worktree, make atomic commits"
        commands:
          - "cd ../ketchup-chain-1"
          - "# Make changes, run tests"
          - "git add corp_jira_mcp/tests/config.test.ts"
          - "git commit -m 'test(mcp-jira): add unit tests for PAT config loading'"
          - "# Make implementation changes"
          - "git add corp_jira_mcp/src/config.ts"
          - "git commit -m 'feat(mcp-jira): add PAT authentication support to config'"

      - step: "Push feature branch to remote"
        command: "git push origin feature/jira-pat-migration/chain-1"

      - step: "Create Pull Request"
        details: "Open PR from feature branch to main. Include task references in description."

      - step: "Merge to main after approval"
        command: "git checkout main && git merge --no-ff feature/jira-pat-migration/chain-1"

      - step: "Clean up worktree after merge"
        commands:
          - "git worktree remove ../ketchup-chain-1"
          - "git branch -d feature/jira-pat-migration/chain-1"

    parallel_execution_notes:
      - "Multiple worktrees can be active simultaneously"
      - "Engineer A works on chain-1 while Engineer B works on chain-2"
      - "Independent worktrees (independent-1) can merge anytime"
      - "Dependency chains (chain-3 depends on chain-1 Task 3) require prerequisite merges"

# Common pitfalls
common_pitfalls:
  - pitfall: "Forgetting to use AsyncMock for async functions"
    why: "Using MagicMock on async functions causes TypeError: object Mock can't be used in 'await' expression"
    how_to_avoid: "Use unittest.mock.AsyncMock for any async method mocks"
    reference:
      example: |
        # BAD
        from unittest.mock import MagicMock
        mock_client = MagicMock()
        mock_client.post.return_value = {...}  # Will fail on await!

        # GOOD
        from unittest.mock import AsyncMock
        mock_client = AsyncMock()
        mock_client.post.return_value = {...}  # Works with await

  - pitfall: "Not handling iPaaS proxy authentication correctly"
    why: "iPaaS requires BOTH IMS token AND x-authorization header with PAT, missing either causes 401/403"
    how_to_avoid: "Always include both headers: Authorization: Bearer {ims_token} AND x-authorization: Bearer {pat}"
    reference:
      file: "corp_jira_mcp/src/utils.js"
      pattern: "See constructIpaasHeaders() function for correct header construction"

  - pitfall: "Hardcoding feature flag checks instead of using environment variables"
    why: "Makes zero-downtime deployment impossible, requires code changes to toggle"
    how_to_avoid: "Always read JIRA_USE_PAT_AUTH from environment, default to false"
    reference:
      file: "corp_jira_mcp/src/config.ts"
      line: "usePat: process.env.JIRA_USE_PAT_AUTH === 'true'"

  - pitfall: "Not implementing backup PAT fallback"
    why: "Single PAT failure causes complete JIRA outage during rotation"
    how_to_avoid: "Always try backup PAT if primary fails, log warning to Slack"
    reference:
      file: "ketchup_pat_rotator/rotation_manager.py"
      method: "validate_current_pat() - shows backup fallback pattern"

  - pitfall: "Creating integration tests that don't clean up JIRA tokens"
    why: "JIRA has 10-token limit per user, leaked test tokens block production rotation"
    how_to_avoid: "Always delete test tokens in finally block or fixture teardown"
    reference:
      example: |
        @pytest.mark.integration
        @pytest.mark.slow
        async def test_rotation_integration():
            manager = PATRotationManager()
            created_tokens = []

            try:
                result = await manager.rotate_pat(token_name_prefix='ketchup-test')
                created_tokens.append(result['new_token_id'])
                # ... test logic
            finally:
                # CRITICAL: Clean up test tokens
                for token_id in created_tokens:
                    await manager._delete_token(token_id)

  - pitfall: "Mixing worktree groups or working in wrong branch"
    why: "Creates merge conflicts and breaks dependency ordering"
    how_to_avoid: "Always check worktree_group field before starting task, verify branch"
    reference:
      command: "git worktree list && git branch --show-current"
      pattern: "Verify you're in correct worktree (e.g., ../ketchup-chain-2 on feature/jira-pat-migration/chain-2)"

  - pitfall: "Merging worktree branches out of dependency order"
    why: "Task 15 (docker-compose) depends on Task 3 (env-aws.ts), merging Task 15 first breaks build"
    how_to_avoid: "Check task dependencies, merge prerequisite branches to main first"
    reference:
      example: "Task 15 depends on Task 3, so merge chain-1 branch before chain-3 branch"

  - pitfall: "Not using TypedDI protocols for new services"
    why: "Breaks dependency injection pattern, makes testing difficult"
    how_to_avoid: "Always define protocol in packages/core/typed_di/protocols/ and register in service_registration.py"
    reference:
      file: "packages/core/typed_di/protocols/jira_protocols.py"
      pattern: "Define protocol with @runtime_checkable and Protocol base class"

  - pitfall: "Committing AWS secrets or credentials"
    why: "Security violation, immediate credential rotation required"
    how_to_avoid: "Never commit .env files, always use AWS Secrets Manager, add to .gitignore"
    reference:
      file: ".gitignore"
      pattern: "Ensure .env, *.pem, secrets.json are excluded"

  - pitfall: "Forgetting to increment Docker image version"
    why: "Deployment pulls wrong image from ECR, old code runs in production"
    how_to_avoid: "deploy-ketchup.sh auto-increments version, never manually tag with existing version"
    reference:
      file: "infrastructure/deploy-ketchup.sh"
      line: "Version auto-increment logic at line 150-180"

  - pitfall: "Not testing feature flag toggle during deployment"
    why: "Zero-downtime deployment fails if services crash on flag change"
    how_to_avoid: "Test both JIRA_USE_PAT_AUTH=true and false locally before deploying"
    reference:
      command: |
        # Test with PAT enabled
        docker-compose -f docker-compose.local.yml up -d
        # Toggle flag in .env
        docker-compose restart mcp-jira ketchup-app
        # Verify no errors in logs

