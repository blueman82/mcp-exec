  # Detailed task breakdown
  tasks:
    - task_number: 14
      name: "Create Dockerfile for PAT Rotator"
      agent: "deployment-engineer"
      worktree_group: "chain-3"
      files:
        - "infrastructure/Dockerfile.pat-rotator"
        - "infrastructure/healthcheck-pat-rotator.sh"
        - "ketchup_pat_rotator/scheduler.py" # Add health status writing
      depends_on: [11] # Task 11: main.py for PAT rotator
      estimated_time: "30m"
      description: |
        Multi-stage Dockerfile for ketchup-pat-rotator service following existing Ketchup Dockerfile patterns
        with Python 3.12-slim, minimal dependencies, and health check support.

        This Dockerfile enables containerized deployment of the PAT rotation service with automatic health
        monitoring via Docker's HEALTHCHECK instruction.
      test_first:
        test_file: "N/A (infrastructure file)"
        structure:
          - "No unit tests for Dockerfile itself"
          - "Testing via docker build and manual container execution"
        mocks: []
        fixtures: []
        assertions:
          - "Docker image builds successfully without errors"
          - "Health check script executes and returns 0 on healthy service"
          - "Container starts and scheduler initializes"
        edge_cases:
          - "Missing health file (container should report unhealthy)"
          - "Stale health file (> 6 minutes old, should report unhealthy)"
          - "Invalid health status in file (should report unhealthy)"
        example_skeleton: |
          # Build the image
          cd infrastructure
          docker build -f Dockerfile.pat-rotator -t ketchup-pat-rotator:test .

          # Run container
          docker run -d --name test-pat-rotator ketchup-pat-rotator:test

          # Wait for service to start
          sleep 10

          # Check health
          docker exec test-pat-rotator /app/infrastructure/healthcheck-pat-rotator.sh
          # Should exit 0

          # Cleanup
          docker rm -f test-pat-rotator
      implementation:
        approach: |
          Create multi-stage Dockerfile following the pattern from Dockerfile.status-updater and
          Dockerfile.jira-reporter. Stage 1 handles dependency compilation, Stage 2 creates minimal
          runtime image.

          Health check script monitors /tmp/pat_rotator_health file which is written by the scheduler
          after each successful health check job execution.
        code_structure: |
          # infrastructure/Dockerfile.pat-rotator

          # Multi-stage build for ketchup-pat-rotator
          # Stage 1: Builder
          FROM python:3.12-slim as builder

          WORKDIR /app

          # Install build dependencies
          RUN apt-get update && apt-get install -y --no-install-recommends \
              gcc \
              g++ \
              && rm -rf /var/lib/apt/lists/*

          # Copy requirements
          COPY requirements.txt .
          RUN pip install --no-cache-dir --user -r requirements.txt

          # Stage 2: Runtime
          FROM python:3.12-slim

          WORKDIR /app

          # Copy Python packages from builder
          COPY --from=builder /root/.local /root/.local

          # Copy application code
          COPY packages/ ./packages/
          COPY ketchup_pat_rotator/ ./ketchup_pat_rotator/
          COPY infrastructure/healthcheck-pat-rotator.sh ./infrastructure/

          # Make health check script executable
          RUN chmod +x ./infrastructure/healthcheck-pat-rotator.sh

          # Set Python path
          ENV PYTHONPATH=/app
          ENV PATH=/root/.local/bin:$PATH

          # Health check
          HEALTHCHECK --interval=5m --timeout=10s --retries=3 --start-period=30s \
              CMD ["/app/infrastructure/healthcheck-pat-rotator.sh"]

          # Entry point
          CMD ["python", "/app/ketchup_pat_rotator/main.py"]

          ---

          # infrastructure/healthcheck-pat-rotator.sh

          #!/bin/bash
          # Health check for ketchup-pat-rotator service

          HEALTH_FILE="/tmp/pat_rotator_health"
          MAX_AGE_SECONDS=360  # 6 minutes (scheduler runs hourly)

          # Check if health file exists
          if [ ! -f "$HEALTH_FILE" ]; then
              echo "Health file not found"
              exit 1
          fi

          # Check file age
          FILE_AGE=$(( $(date +%s) - $(stat -f %m "$HEALTH_FILE" 2>/dev/null || stat -c %Y "$HEALTH_FILE") ))
          if [ $FILE_AGE -gt $MAX_AGE_SECONDS ]; then
              echo "Health file is stale (${FILE_AGE}s old)"
              exit 1
          fi

          # Check health status
          STATUS=$(cat "$HEALTH_FILE")
          if [ "$STATUS" != "healthy" ]; then
              echo "Service unhealthy: $STATUS"
              exit 1
          fi

          echo "Service healthy"
          exit 0
        key_points:
          - point: "Multi-stage build reduces final image size"
            details: "Builder stage includes gcc/g++ for compiling dependencies, runtime stage omits build tools"
          - point: "Follow existing Dockerfile patterns exactly"
            reference: "infrastructure/Dockerfile.status-updater, infrastructure/Dockerfile.jira-reporter"
          - point: "Health check interval matches scheduler frequency"
            details: "5-minute interval with 6-minute max age allows for job execution time"
          - point: "Health file written by scheduler after each successful health check job"
            details: "Requires updating ketchup_pat_rotator/scheduler.py with _write_health_status() method"
          - point: "Start period 30s allows service to initialize before health checks begin"
            details: "TypedDI container initialization and scheduler setup take ~10-15 seconds"
        integration:
          imports: []
          services_to_inject: []
          config_values: []
          error_handling:
            - "Health check script uses robust stat command (tries macOS -f format, falls back to Linux -c)"
            - "Missing health file results in container unhealthy status (triggers alerts)"
            - "Stale health file indicates scheduler stuck (requires investigation)"
      success_criteria:
        - "Dockerfile builds without errors"
        - "Health check script is executable"
        - "Multi-stage build reduces image size"
        - "Python dependencies installed correctly"
      test_commands:
        - "docker build -f infrastructure/Dockerfile.pat-rotator -t ketchup-pat-rotator:test .."
        - "docker run -d --name test-pat-rotator ketchup-pat-rotator:test && sleep 15 && docker logs test-pat-rotator"
        - "docker exec test-pat-rotator /app/infrastructure/healthcheck-pat-rotator.sh"
        - "docker images ketchup-pat-rotator:test --format '{{.Size}}'"
      verification:
        manual_testing:
          - step: "Build Docker image locally"
            command: "cd infrastructure && docker build -f Dockerfile.pat-rotator -t ketchup-pat-rotator:test .."
            expected: "Build completes successfully, no errors"
          - step: "Run container with environment variables"
            command: |
              docker run -d --name test-pat-rotator \
                -e AWS_REGION=eu-west-1 \
                -e DYNAMODB_TABLE_NAME=ketchup_channel_information \
                -e AWS_SECRET_NAME=Ketchup_Token_Secrets \
                ketchup-pat-rotator:test
          - step: "Wait for scheduler to start"
            command: "sleep 15 && docker logs test-pat-rotator"
            expected: "Logs show: PAT rotation scheduler started, Jobs registered: pat_rotation, expiry_warning, health_check"
          - step: "Test health check script"
            command: "docker exec test-pat-rotator /app/infrastructure/healthcheck-pat-rotator.sh"
            expected: "Exit code 0, output: Service healthy"
          - step: "Clean up"
            command: "docker rm -f test-pat-rotator"
        automated_tests:
          command: "N/A (infrastructure testing done via manual verification)"
          expected_output: "N/A"
        success_criteria:
          - "Docker image builds without errors"
          - "Container starts and logs show scheduler initialization"
          - "Health check script passes after scheduler writes health file"
          - "Image size is reasonable (< 500MB)"
      commit:
        type: "feat"
        message: "add Dockerfile for PAT rotator service"
        body: |
          Multi-stage Dockerfile with Python 3.12-slim:
          - Builder stage with gcc/g++ for compilation
          - Runtime stage with minimal footprint
          - Health check script monitoring scheduler health
          - Entry point: python ketchup_pat_rotator/main.py

          Follows existing Ketchup Dockerfile patterns.
        files:
          - "infrastructure/Dockerfile.pat-rotator"
          - "infrastructure/healthcheck-pat-rotator.sh"
          - "ketchup_pat_rotator/scheduler.py"
    - task_number: 15
      name: "Update docker-compose.yml"
      agent: "deployment-engineer"
      worktree_group: "chain-3"
      files:
        - "infrastructure/docker-compose.yml"
        - "infrastructure/deploy-ketchup.sh"
      depends_on: [14, 3] # Task 14: Dockerfile exists, Task 3: env var names defined
      estimated_time: "45m"
      description: |
        Add ketchup-pat-rotator service to docker-compose.yml with proper environment variables, volume mounts,
        health checks, and logging configuration. Service runs as singleton on prod1 only.

        Also update deploy-ketchup.sh to explicitly stop ketchup-pat-rotator on prod2 (same as other singletons).
      test_first:
        test_file: "N/A (infrastructure file)"
        structure:
          - "No unit tests for docker-compose.yml"
          - "Testing via docker-compose config validation"
        mocks: []
        fixtures: []
        assertions:
          - "docker-compose config validates without errors"
          - "Environment variables match expectations from Task 3"
          - "Volume paths are correct"
          - "Health check configuration is valid"
        edge_cases:
          - "Service starts on prod1 successfully"
          - "Service is stopped on prod2 by deploy script"
          - "Logs directory is created if it doesn't exist"
        example_skeleton: |
          # Validate docker-compose syntax
          cd infrastructure
          docker-compose config

          # Verify singleton services listed in deploy script
          grep "ketchup-pat-rotator" deploy-ketchup.sh
      implementation:
        approach: |
          Add ketchup-pat-rotator service definition to docker-compose.yml after ketchup-maintenance-fetcher
          service. Follow the exact pattern of other singleton services (status-updater, jira-reporter).

          Update deploy-ketchup.sh around line 505-506 to include ketchup-pat-rotator in the list of
          singleton services that are stopped on prod2.
        code_structure: |
          # infrastructure/docker-compose.yml
          # Add after ketchup-maintenance-fetcher service:

          ketchup-pat-rotator:
            build:
              context: .
              dockerfile: Dockerfile.pat-rotator
              platforms:
                - linux/amd64
            image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-pat-rotator:v2.360.346
            environment:
              - AWS_REGION=eu-west-1
              - DYNAMODB_TABLE_NAME=ketchup_channel_information
              - AWS_SECRET_NAME=Ketchup_Token_Secrets
              - LOG_LEVEL=INFO
              - PYTHONPATH=/app
              - TZ=Europe/London
              - PAT_ROTATION_INTERVAL_DAYS=60
              - PAT_IPAAS_BASE_URL=https://ipaas-proxy.adobe.com
              # Feature flag for PAT auth (default: false, can enable after deployment)
              - JIRA_USE_PAT_AUTH=false
              # HTTP/2 support
              - KETCHUP_USE_HTTPX=true
              - KETCHUP_HTTP2_ENABLED=true
              - KETCHUP_HTTPX_POOL_LIMITS=50
            volumes:
              - ./logs/pat_rotator:/var/log/pat_rotator
            restart: unless-stopped
            healthcheck:
              test: ["CMD", "/app/infrastructure/healthcheck-pat-rotator.sh"]
              interval: 300s  # 5 minutes
              timeout: 10s
              retries: 3
              start_period: 60s
            logging:
              driver: json-file
              options:
                max-size: "10m"
                max-file: "3"

          ---

          # infrastructure/deploy-ketchup.sh
          # Around line 505-506, update to:

          # Stop and remove singleton services on prod2
          docker-compose stop ketchup-status-updater ketchup-metadata-updater ketchup-jira-reporter ketchup-maintenance-fetcher ketchup-pat-rotator
          docker-compose rm -f ketchup-status-updater ketchup-metadata-updater ketchup-jira-reporter ketchup-maintenance-fetcher ketchup-pat-rotator
        key_points:
          - point: "Service is singleton - runs on prod1 only"
            details: "Similar to ketchup-status-updater, ketchup-jira-reporter, ketchup-maintenance-fetcher"
          - point: "Feature flag JIRA_USE_PAT_AUTH defaults to false"
            details: "Allows deployment without immediately switching to PAT auth (Phase 1 of deployment)"
          - point: "Environment variable names match Task 3 (env-aws.ts)"
            details: "JIRA_PAT, JIRA_PAT_BACKUP, JIRA_USE_PAT_AUTH defined in env-aws.ts mappings"
          - point: "Health check interval 5 minutes matches scheduler frequency"
            details: "Scheduler runs hourly jobs, health check every 5 minutes provides quick failure detection"
          - point: "HTTP/2 support enabled for performance"
            details: "Consistent with ketchup-app performance optimizations (PR #201)"
          - point: "Logging follows standard Ketchup pattern"
            details: "json-file driver with 10m max-size, 3 max files (30MB total per service)"
        integration:
