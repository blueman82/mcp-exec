        code_structure: |
          # docs/deployment_runbooks/jira_pat_migration_runbook.md

          # JIRA PAT Migration Deployment Runbook

          **Date Created**: 2025-11-12
          **Target Deployment**: November 25, 2025 (5 days before deprecation deadline)
          **Rollback Time**: < 2 minutes
          **Estimated Downtime**: Zero (feature flag enabled deployment)

          ## Overview

          This runbook guides the deployment of JIRA Personal Access Token (PAT) authentication to replace username/password authentication (deprecated November 30, 2025).

          **Key Components**:
          - MCP JIRA Service: Updated to support PAT in x-authorization header
          - ketchup-pat-rotator: New singleton service for automated 60-day rotation
          - Feature Flag: JIRA_USE_PAT_AUTH enables zero-downtime cutover

          ---

          ## Pre-Deployment Checklist

          ### 1. AWS Secrets Verification
          - [ ] Verify `ketchup_jira_pat` exists in AWS Secrets Manager
          - [ ] Verify `ketchup_jira_pat_backup` exists
          - [ ] Verify `ketchup_jira_pat_expiry` is set correctly
          - [ ] Test PAT works via manual JIRA API call

          **Command**:
          ```bash
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text | \
            jq '{pat: .ketchup_jira_pat | .[0:30], backup: .ketchup_jira_pat_backup | .[0:30], expiry: .ketchup_jira_pat_expiry}'
          ```

          ### 2. Code Verification
          - [ ] All tests passing: `cd tests/setup && make test-unit && make test-integration`
          - [ ] Code review approved on PR
          - [ ] TypedDI registrations verified

          ### 3. Docker Images Built
          - [ ] ECR login successful
          - [ ] All images built and pushed to ECR with version tag
          - [ ] Version tag incremented correctly

          ---

          ## Deployment Steps

          ### Phase 1: Deploy with Feature Flag Disabled (30 minutes)

          **Goal**: Deploy new code with PAT support but keep using username/password.

          **Steps**:

          1. **Build and push Docker images**:
             ```bash
             cd infrastructure
             ./deploy-ketchup.sh
             # Version will auto-increment (e.g., v2.360.347)
             ```

          2. **Verify feature flag is FALSE in docker-compose.yml**:
             ```bash
             grep JIRA_USE_PAT_AUTH infrastructure/docker-compose.yml
             # Should show: JIRA_USE_PAT_AUTH=false
             ```

          3. **Deploy to prod1**:
             ```bash
             ssh ketchup-prod1.campaign.adobe.com
             cd /opt/ketchup
             sudo docker-compose pull
             sudo docker-compose up -d
             ```

          4. **Verify prod1 services**:
             ```bash
             sudo docker ps | grep ketchup
             # Should show 10 containers (added ketchup-pat-rotator)
             sudo docker logs ketchup-pat-rotator --tail 50
             # Should show: "PAT rotation scheduler started"
             ```

          5. **Deploy to prod2**:
             ```bash
             ssh ketchup-prod2.campaign.adobe.com
             cd /opt/ketchup
             sudo docker-compose pull
             sudo docker-compose up -d
             ```

          6. **Verify prod2 (no pat-rotator, singleton stopped)**:
             ```bash
             sudo docker ps | grep ketchup
             # Should show 5 containers (NO ketchup-pat-rotator)
             ```

          7. **Test JIRA functionality still works**:
             - Create test JIRA ticket via Slack `/jira-test`
             - Verify ticket creation successful
             - Verify using username/password auth (check logs)

          **Validation**:
          - All services healthy
          - JIRA integration working
          - No errors in logs
          - PAT rotator running on prod1 but not executing rotations yet

          **Rollback** (if issues):
          ```bash
          # On both servers
          cd /opt/ketchup
          sudo docker-compose down
          git checkout v2.360.346  # Previous version
          sudo docker-compose up -d
          ```

          ---

          ### Phase 2: Enable PAT Authentication (15 minutes)

          **Goal**: Switch from username/password to PAT authentication.

          **Steps**:

          1. **Update feature flag on both servers**:
             ```bash
             # On ketchup-prod1
             sudo vi /opt/ketchup/docker-compose.yml
             # Change: JIRA_USE_PAT_AUTH=false → JIRA_USE_PAT_AUTH=true

             # On ketchup-prod2
             sudo vi /opt/ketchup/docker-compose.yml
             # Change: JIRA_USE_PAT_AUTH=false → JIRA_USE_PAT_AUTH=true
             ```

          2. **Restart MCP JIRA service (both servers)**:
             ```bash
             # On both prod1 and prod2
             sudo docker-compose restart mcp-jira ketchup-app
             ```

          3. **Verify PAT authentication in logs**:
             ```bash
             # On prod1
             sudo docker logs mcp-jira --tail 100 | grep -i "pat\|x-authorization"
             # Should show: "Using PAT authentication" or similar
             ```

          4. **Test JIRA functionality with PAT**:
             - Create test JIRA ticket via Slack
             - Verify ticket creation successful
             - Check logs confirm PAT used (not username/password)

          5. **Monitor for errors (10 minutes)**:
             ```bash
             # Watch logs on both servers
             sudo docker-compose logs -f mcp-jira ketchup-app | grep -i "error\|fail"
             ```

          **Validation**:
          - JIRA operations successful
          - Logs show PAT authentication
          - No 401/403 errors
          - Performance unchanged

          **Rollback** (if issues):
          ```bash
          # Quick rollback: Disable feature flag (< 2 minutes)
          # On both servers
          sudo vi /opt/ketchup/docker-compose.yml
          # Change: JIRA_USE_PAT_AUTH=true → JIRA_USE_PAT_AUTH=false
          sudo docker-compose restart mcp-jira ketchup-app

          # Wait 30 seconds, verify JIRA working
          sudo docker logs mcp-jira --tail 50
          ```

          ---

          ### Phase 3: Verify PAT Rotation Service (15 minutes)

          **Goal**: Ensure automated rotation service is operational.

          **Steps**:

          1. **Check scheduler status**:
             ```bash
             # On prod1 only (singleton)
             ssh ketchup-prod1
             sudo docker logs ketchup-pat-rotator --tail 100
             # Should show: "PAT rotation scheduler started"
             # Should show: "Jobs registered: pat_rotation, expiry_warning, health_check"
             ```

          2. **Verify health check job running**:
             ```bash
             # Wait for hourly health check to execute (or trigger manually)
             sudo docker exec ketchup-pat-rotator cat /tmp/pat_rotator_health
             # Should show: "healthy"
             ```

          3. **Check #ketchup_alerts for notifications** (if rotation triggered):
             - Navigate to Slack #ketchup_alerts channel
             - Look for "✅ PAT Rotation Successful" or "⏰ PAT Expiring Soon"

          **Validation**:
          - ketchup-pat-rotator running on prod1 only
          - Health check passing
          - Scheduler jobs registered
          - Service writing health file

          ---

          ## Post-Deployment Verification

          ### 1. Smoke Tests (30 minutes after deployment)

          - [ ] Create JIRA ticket via Slack - Success
          - [ ] Query JIRA ticket via Slack - Success
          - [ ] Update JIRA ticket via Slack - Success
          - [ ] Check #ketchup_alerts for errors - None
          - [ ] Verify PAT not expired: Check `ketchup_jira_pat_expiry` in AWS Secrets

          ### 2. Monitoring (24 hours)

          - [ ] Monitor #ketchup_alerts for rotation failures
          - [ ] Check Docker logs for errors: `sudo docker-compose logs --tail 1000 | grep -i "error\|fail"`
          - [ ] Verify JIRA operations continue working
          - [ ] Confirm PAT rotator health checks passing

          ### 3. First Rotation Event (60 days)

          - [ ] Monitor #ketchup_alerts for "✅ PAT Rotation Successful"
          - [ ] Verify new PAT in AWS Secrets Manager
          - [ ] Confirm old PAT moved to backup
          - [ ] Test JIRA operations with new PAT

          ---

          ## Rollback Procedures

          ### Quick Rollback (< 2 minutes)

          **Scenario**: JIRA operations failing after PAT enabled

          **Steps**:
          1. Disable PAT feature flag on both servers
          2. Restart affected services
          3. Verify JIRA working with username/password

          ```bash
          # On both prod1 and prod2
          sudo vi /opt/ketchup/docker-compose.yml
          # Change: JIRA_USE_PAT_AUTH=true → JIRA_USE_PAT_AUTH=false
          sudo docker-compose restart mcp-jira ketchup-app
          ```

          ### Full Rollback (< 5 minutes)

          **Scenario**: Deployment has critical issues, revert entire codebase

          **Steps**:
          ```bash
          # On both servers
          cd /opt/ketchup
          sudo docker-compose down
          git checkout v2.360.346  # Previous stable version
          sudo docker-compose up -d

          # Verify all services healthy
          sudo docker ps
          ```

          ---

          ## Troubleshooting Guide

          ### Issue 1: PAT Authentication Fails (401 Unauthorized)

          **Symptoms**: JIRA operations return 401 errors after enabling PAT

          **Diagnosis**:
          ```bash
          # Check PAT in AWS Secrets
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text | \
            jq -r '.ketchup_jira_pat' | wc -c
          # Should be > 50 characters

          # Check PAT expiry
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text | \
            jq -r '.ketchup_jira_pat_expiry'
          # Should be future date
          ```

          **Resolution**:
          1. Verify PAT not expired
          2. Try backup PAT: Check if backup works
          3. Regenerate PAT manually in JIRA UI
          4. Update AWS Secrets with new PAT
          5. Restart services

          ### Issue 2: PAT Rotator Not Running

          **Symptoms**: ketchup-pat-rotator container not showing on prod1

          **Diagnosis**:
          ```bash
          sudo docker ps -a | grep pat-rotator
          sudo docker logs ketchup-pat-rotator
          ```

          **Resolution**:
          1. Check if container stopped: `sudo docker-compose restart ketchup-pat-rotator`
          2. Verify Dockerfile built correctly
          3. Check dependency resolution in logs
          4. Verify TypedDI registrations: Look for "Dependencies resolved via TypedDI"

          ### Issue 3: Rotation Fails with API Error

          **Symptoms**: #ketchup_alerts shows "⚠️ PAT Rotation Failed"

          **Diagnosis**:
          ```bash
          sudo docker logs ketchup-pat-rotator --tail 200 | grep -i "error\|fail"
          # Look for iPaaS API error codes
          ```

          **Resolution**:
          1. Check iPaaS proxy status: Verify https://ipaas-proxy.adobe.com is accessible
          2. Verify IMS token not expired: Check JIRA_IMS_TOKEN in AWS Secrets
          3. Manually trigger rotation: Use backup PAT if needed
          4. Check JIRA service account permissions

          ---

          ## Success Criteria

          **Deployment Complete When**:
          - [ ] All services running on prod1 and prod2
