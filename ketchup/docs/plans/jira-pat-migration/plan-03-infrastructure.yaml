            - "PAT_IPAAS_BASE_URL=https://ipaas-proxy.adobe.com (iPaaS proxy endpoint)"
            - "JIRA_USE_PAT_AUTH=false (feature flag, enable in Phase 2)"
          error_handling:
            - "restart: unless-stopped ensures service restarts on failure"
            - "Health check retries: 3 attempts before marking unhealthy"
            - "Start period 60s allows initialization before health checks begin"
      success_criteria:
        - "Container configuration valid"
        - "Environment variables set correctly"
        - "Singleton service runs only on prod1"
        - "Health check endpoint configured"
      test_commands:
        - "cd infrastructure && docker-compose config"
        - "grep -A 2 'Stop and remove singleton services' infrastructure/deploy-ketchup.sh | grep ketchup-pat-rotator"
        - "grep JIRA_USE_PAT_AUTH infrastructure/docker-compose.yml"
        - "grep 'healthcheck:' infrastructure/docker-compose.yml | wc -l"
      verification:
        manual_testing:
          - step: "Validate docker-compose configuration"
            command: "cd infrastructure && docker-compose config"
            expected: "No errors, YAML is valid"
          - step: "Verify singleton handling in deploy script"
            command: "grep -A 2 'Stop and remove singleton services' infrastructure/deploy-ketchup.sh"
            expected: "ketchup-pat-rotator listed in both stop and rm commands"
          - step: "Test local deployment"
            command: "cd infrastructure && docker-compose up -d ketchup-pat-rotator"
            expected: "Service starts, logs show scheduler initialization"
          - step: "Verify health check"
            command: "docker ps --format 'table {{.Names}}\t{{.Status}}' | grep pat-rotator"
            expected: "Status shows (healthy) after 60 seconds"
          - step: "Clean up local test"
            command: "docker-compose down"
        automated_tests:
          command: "N/A (infrastructure testing done via manual verification)"
          expected_output: "N/A"
        success_criteria:
          - "docker-compose config validates successfully"
          - "Service starts and reaches healthy status"
          - "deploy-ketchup.sh correctly handles singleton on prod2"
          - "Environment variables correctly passed to container"
      commit:
        type: "feat"
        message: "add PAT rotator service to docker-compose"
        body: |
          Add ketchup-pat-rotator as singleton service (prod1 only):
          - 60-day rotation interval (configurable)
          - iPaaS proxy URL configuration
          - JIRA_USE_PAT_AUTH feature flag (default: false)
          - HTTP/2 support enabled
          - Health check every 5 minutes
          - Logs to ./logs/pat_rotator

          Update deploy-ketchup.sh to handle singleton on prod2.
        files:
          - "infrastructure/docker-compose.yml"
          - "infrastructure/deploy-ketchup.sh"
    - task_number: 16
      name: "Update AWS Secrets Manager Schema"
      agent: "deployment-engineer"
      worktree_group: "independent-1"
      files:
        - "N/A (manual AWS CLI commands, document in commit message)"
      depends_on: [] # Independent task
      estimated_time: "15m"
      description: |
        Populate ketchup_jira_pat and ketchup_jira_pat_backup keys in AWS Secrets Manager with initial PAT
        values, and add expiry metadata fields.

        This task can run in parallel with all other tasks - it has no dependencies and nothing depends on it
        until deployment time.
      test_first:
        test_file: "N/A (AWS operations)"
        structure:
          - "No unit tests for AWS Secrets Manager operations"
          - "Verification via AWS CLI queries"
        mocks: []
        fixtures: []
        assertions:
          - "AWS Secrets Manager contains ketchup_jira_pat key"
          - "AWS Secrets Manager contains ketchup_jira_pat_backup key"
          - "AWS Secrets Manager contains ketchup_jira_pat_expiry key"
          - "AWS Secrets Manager contains ketchup_jira_pat_backup_expiry key"
          - "PAT token is valid (manually test JIRA API call)"
        edge_cases:
          - "PAT token is invalid or expired (should detect before deployment)"
          - "Secret update fails due to permissions (check IAM role)"
        example_skeleton: |
          # Verify PAT keys present
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text | \
            jq 'has("ketchup_jira_pat") and has("ketchup_jira_pat_backup") and has("ketchup_jira_pat_expiry")'
          # Should output: true
      implementation:
        approach: |
          Manually create initial PAT via JIRA UI, then update AWS Secrets Manager with new keys using AWS CLI.

          The PAT is created with 60-day expiry. Both primary and backup start with the same value - they will
          diverge after the first rotation when the rotator service creates a new primary PAT.
        code_structure: |
          # STEP 1: Create initial PAT manually via JIRA UI

          1. Log into https://jira.corp.adobe.com with Ketchup service account
          2. Navigate to Profile → Personal Access Tokens
          3. Create new PAT: "ketchup-prod-initial" with 60-day expiry
          4. Save the token value securely (will only be shown once)

          # STEP 2: Update AWS Secrets Manager

          # Get current secrets
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text > /tmp/secrets.json

          # Edit /tmp/secrets.json to add these keys:
          # - "ketchup_jira_pat": "<PAT_TOKEN_FROM_JIRA>"
          # - "ketchup_jira_pat_backup": "<SAME_TOKEN>" (initially same, will diverge after first rotation)
          # - "ketchup_jira_pat_expiry": "2025-01-12T00:00:00Z" (60 days from now)
          # - "ketchup_jira_pat_backup_expiry": "2025-01-12T00:00:00Z"

          # Update secrets
          aws secretsmanager update-secret \
            --secret-id Ketchup_Token_Secrets \
            --secret-string file:///tmp/secrets.json \
            --profile campaign_prod_v7 \
            --region eu-west-1

          # Verify update
          aws secretsmanager get-secret-value \
            --secret-id Ketchup_Token_Secrets \
            --profile campaign_prod_v7 \
            --region eu-west-1 \
            --query SecretString --output text | \
            jq -r '.ketchup_jira_pat' | head -c 30

          # Should show first 30 characters of PAT token

          # Clean up temp file
          rm /tmp/secrets.json
        key_points:
          - point: "PAT created manually via JIRA UI first"
            details: "Automated PAT creation happens later via ketchup-pat-rotator service"
          - point: "60-day expiry aligns with rotation schedule"
            details: "Rotation service will create new PAT before this one expires"
          - point: "Primary and backup start identical"
            details: "After first rotation, backup will be the old primary (providing fallback)"
          - point: "Expiry timestamps in ISO8601 format"
            details: "Format: YYYY-MM-DDTHH:MM:SSZ (UTC timezone)"
          - point: "Secrets are flat key-value pairs"
            details: "Not nested JSON - matches existing Ketchup secrets pattern"
        integration:
          imports: []
          services_to_inject: []
          config_values: []
          error_handling:
            - "If PAT creation fails, check JIRA permissions for service account"
            - "If AWS update fails, verify IAM permissions for secrets:UpdateSecret"
            - "Always verify PAT works before deployment (test JIRA API call)"
      success_criteria:
        - "Secret schema updated successfully"
        - "Backup PAT field added"
