      tasks: [16]
      branch: "feature/jira-pat-migration/independent-1"
      execution_model: "parallel"
      isolation: "separate-worktree"
      estimated_time: "15-30 minutes"
      rationale: "AWS Secrets Manager schema update can run immediately in parallel with all other work"
      setup_commands: |
        # This task can start immediately, no dependencies
        cd /Users/harrison/Documents/Github/camp-ops-tools-emea/ketchup
        git worktree add ../ketchup-independent-1 -b feature/jira-pat-migration/independent-1
        cd ../ketchup-independent-1

        # Task 16: Update AWS Secrets Manager
