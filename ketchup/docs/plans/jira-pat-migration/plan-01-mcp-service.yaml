plan:
  # Metadata about the implementation plan
  metadata:
    feature_name: "JIRA PAT Migration with Automated Rotation"
    created: "2025-11-12"
    target: "Migrate Ketchup from JIRA username/password authentication to Personal Access Token (PAT) authentication with automated 60-day rotation lifecycle"
    estimated_tasks: 19
    deadline: "2025-11-30"
    days_remaining: 18
    file_sequence: 1
    total_files: 4
    tasks_in_file: [1, 2, 3, 4]
    next_file: "plan-02-pat-rotator.yaml"
  # Worktree groups for parallel execution while respecting dependencies
  worktree_groups:
    - group_id: "chain-1"
      description: "MCP JIRA Service Updates (Node.js) - Tasks 1→2→3→4→17"
      tasks: [1, 2, 3, 4, 17]
      branch: "feature/jira-pat-migration/chain-1"
      execution_model: "sequential"
      isolation: "separate-worktree"
      estimated_time: "3-4 hours"
      rationale: "These tasks modify the MCP JIRA Service (Node.js) codebase and must execute in order (config → utils → env mapping → tests → integration tests)"
      setup_commands: |
        # Create worktree for this dependency chain
        cd /Users/harrison/Documents/Github/camp-ops-tools-emea/ketchup
        git worktree add ../ketchup-chain-1 -b feature/jira-pat-migration/chain-1
        cd ../ketchup-chain-1

        # Task 1: Update MCP JIRA config.ts for PAT Support
        # [Implement Task 1]
        git add corp_jira_mcp/common/config.ts corp_jira_mcp/tests/config.test.ts
        git commit -m "feat(mcp-jira): add PAT configuration support"

        # Task 2: Update MCP JIRA utils.ts for PAT Header Logic
        # [Implement Task 2]
        git add corp_jira_mcp/common/utils.ts corp_jira_mcp/tests/utils.test.ts
        git commit -m "feat(mcp-jira): implement PAT header logic for iPaaS"

        # Task 3: Update env-aws.ts for PAT Secret Mapping
        # [Implement Task 3]
        git add corp_jira_mcp/env-aws.ts corp_jira_mcp/tests/env-aws.test.ts
        git commit -m "feat(mcp-jira): add PAT secret mappings for AWS Secrets Manager"

        # Task 4: MCP JIRA PAT Authentication Tests
        # [Implement Task 4]
        git add corp_jira_mcp/tests/auth-pat.integration.test.ts
        git commit -m "test(mcp-jira): add PAT authentication integration tests"

        # Task 17 will be implemented later in this worktree

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/chain-1
        git push origin main
    - group_id: "chain-2"
      description: "PAT Rotation Service (Python) - Tasks 5→6→7→8→9→10→11→12→13→18"
      tasks: [5, 6, 7, 8, 9, 10, 11, 12, 13, 18]
      branch: "feature/jira-pat-migration/chain-2"
      execution_model: "sequential"
      isolation: "separate-worktree"
      estimated_time: "6-8 hours"
      rationale: "New ketchup-pat-rotator service implementation from protocols → managers → scheduler → main → TypedDI registration → tests → documentation"
      setup_commands: |
        # Create worktree for PAT rotation service
        cd /Users/harrison/Documents/Github/camp-ops-tools-emea/ketchup
        git worktree add ../ketchup-chain-2 -b feature/jira-pat-migration/chain-2
        cd ../ketchup-chain-2

        # Tasks 5-13, 18 will be implemented sequentially
        # Each task will have its own commit

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/chain-2
        git push origin main
    - group_id: "chain-3"
      description: "Infrastructure & Deployment - Tasks 14→15→19"
      tasks: [14, 15, 19]
      branch: "feature/jira-pat-migration/chain-3"
      execution_model: "sequential"
      isolation: "separate-worktree"
      estimated_time: "2-3 hours"
      rationale: "Infrastructure configuration that depends on code from chain-1 (Task 3) being complete"
      cross_dependencies:
        - "Task 15 depends on Task 3 (env-aws.ts) and Task 14 (Dockerfile)"
      setup_commands: |
        # Wait for Task 3 from chain-1 to be merged to main
        git checkout main
        git pull origin main

        # Create worktree for infrastructure
        git worktree add ../ketchup-chain-3 -b feature/jira-pat-migration/chain-3
        cd ../ketchup-chain-3

        # Tasks 14, 15, 19 will be implemented sequentially

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/chain-3
        git push origin main
    - group_id: "independent-1"
