      implementation:
        approach: |
          These are integration tests, not unit tests. They start the MCP JIRA Service locally, make real
          HTTP calls to it, and verify the service correctly formats headers and receives responses from JIRA.

          The tests use real AWS credentials and real JIRA PAT from Secrets Manager, so they validate the
          entire authentication chain works in practice.
        code_structure: |
          // Test helpers in auth-pat.integration.test.js
          const axios = require('axios');
          const { SecretsManager } = require('@aws-sdk/client-secrets-manager');

          // Start MCP service for testing
          async function startMCPService() {
            const { spawn } = require('child_process');
            const service = spawn('npm', ['start'], {
              cwd: __dirname + '/..',
              env: { ...process.env, PORT: 8081 },
              detached: true
            });

            // Wait for health check
            await waitForHealth('http://localhost:8081/health');
            return service;
          }

          async function waitForHealth(url, maxAttempts = 30) {
            for (let i = 0; i < maxAttempts; i++) {
              try {
                await axios.get(url);
                return;
              } catch (e) {
                await new Promise(resolve => setTimeout(resolve, 1000));
              }
            }
            throw new Error('Service did not start');
          }

          async function makeTestJiraRequest(path) {
            const response = await axios.post('http://localhost:8081/message', {
              jsonrpc: '2.0',
              id: 'test-' + Date.now(),
              method: 'tools/call',
              params: {
                name: 'search_jira_issues',
                arguments: { jql: 'project = CPGNREQ', maxResults: 1 }
              }
            }, {
              headers: {
                'Authorization': 'Bearer ' + process.env.JIRA_IMS_TOKEN,
                'Content-Type': 'application/json'
              }
            });

            return {
              statusCode: response.status,
              data: response.data,
              requestHeaders: response.config.headers
            };
          }

          async function getSecretFromAWS(key) {
            const client = new SecretsManager({
              region: 'eu-west-1'
            });

            const response = await client.getSecretValue({
              SecretId: 'Ketchup_Token_Secrets'
            });

            const secrets = JSON.parse(response.SecretString);
            return secrets[key];
          }
