    # Task 10: Create PAT Rotation Scheduler
    - task_number: 10
      name: "Create PAT Rotation Scheduler"
      agent: "python-pro"
      estimated_time: "1.5h"
      worktree_group: "chain-2"
      depends_on: [6, 7]
      files:
        - "ketchup_pat_rotator/scheduler.py"
        - "tests/unit/ketchup_pat_rotator/test_scheduler.py"
      description: |
        APScheduler-based service that triggers PAT rotation every 60 days,
        checks for expiry warnings daily, and validates current PAT health every hour.
        Includes graceful shutdown and error handling.
      test_first:
        file: "tests/unit/ketchup_pat_rotator/test_scheduler.py"
        approach: "TDD - Test scheduler job registration and execution"
        test_cases:
          - "test_rotation_job_success - Test rotation job executes successfully"
          - "test_rotation_job_failure_sends_alert - Test rotation failure triggers alert"
          - "test_expiry_warning_job_sends_alert_when_expiring_soon - Test expiry warning sent when PAT expiring in 9 days"
          - "test_health_check_job_no_alert_when_healthy - Test health check doesn't alert when PAT valid"
          - "test_scheduler_initialization_creates_jobs - Test scheduler registers all jobs on start"
          - "test_scheduler_shutdown_stops_gracefully - Test scheduler stops without errors"
      implementation:
        approach: "Use APScheduler's AsyncIOScheduler for async/await compatibility with three jobs: rotation (60 days), expiry warning (daily), health check (hourly)"
        key_points:
          - point: "Rotation job every 60 days using IntervalTrigger"
            details: "Automated rotation ensures PATs stay within 60-day validity window"
          - point: "Daily expiry warnings at 9 AM UTC using CronTrigger"
            details: "Early morning alerts give ops team full business day to respond"
          - point: "Hourly health checks using IntervalTrigger"
            details: "Frequent validation detects PAT failures quickly for backup fallback"
          - point: "Slack notifications for all events"
            details: "All rotation events trigger #ketchup_alerts notifications for visibility"
          - point: "Graceful shutdown with wait=True"
            details: "Ensures scheduler stops cleanly without interrupting in-progress jobs"
          - point: "Health status file writes for Docker health checks"
            details: "Scheduler writes /tmp/pat_rotator_health file for healthcheck-pat-rotator.sh monitoring"
        code_structure: |
          # Core Scheduler Class

          class PATRotationScheduler:
              """APScheduler-based scheduler for automated JIRA PAT rotation and health monitoring.

              This scheduler manages three key jobs:
              1. Rotation job (every 60 days) - Rotates JIRA PAT before expiry
              2. Expiry warning job (daily at 9 AM UTC) - Alerts when PAT expiring in 10 days
              3. Health check job (hourly) - Validates current PAT and writes health status

              Why: Automated scheduling ensures PATs never expire unexpectedly while maintaining
              visibility into health status for Docker health checks and operational monitoring.
              """

              def __init__(
                  self,
                  pat_rotator: JiraPATRotatorProtocol,
                  pat_notifier: JiraPATNotifierProtocol,
                  logger: Logger,
              ) -> None:
                  """Initialize the PAT rotation scheduler with injected dependencies.

                  Args:
                      pat_rotator: Protocol for managing PAT rotation operations
                      pat_notifier: Protocol for sending notifications to Slack
                      logger: Structured logger for scheduler events

                  Why: TypedDI injection ensures testability and loose coupling from implementations.
                  """
                  self.pat_rotator = pat_rotator
                  self.pat_notifier = pat_notifier
                  self.logger = logger
                  self.scheduler = AsyncIOScheduler()

              async def start(self) -> None:
                  """Start the scheduler and register all rotation jobs.

                  Returns: None

                  Why: Called from main.py during service initialization to begin automated
                  PAT lifecycle management.
                  """
                  self.scheduler.add_job(
                      self._rotation_job,
                      trigger=IntervalTrigger(days=60),
                      id="pat_rotation",
                      name="PAT Rotation Job",
                      replace_existing=True,
                      max_instances=1,
                  )

                  self.scheduler.add_job(
                      self._expiry_warning_job,
                      trigger=CronTrigger(hour=9, minute=0, timezone="UTC"),
                      id="pat_expiry_warning",
                      name="PAT Expiry Warning Job",
                      replace_existing=True,
                      max_instances=1,
                  )

                  self.scheduler.add_job(
                      self._health_check_job,
                      trigger=IntervalTrigger(hours=1),
                      id="pat_health_check",
                      name="PAT Health Check Job",
                      replace_existing=True,
                      max_instances=1,
                  )

                  self.scheduler.start()
                  self.logger.info("PAT rotation scheduler started with all jobs registered")

              async def shutdown(self) -> None:
                  """Gracefully shutdown the scheduler.

                  Returns: None

                  Why: Called during service shutdown to stop the scheduler cleanly without
                  interrupting in-progress jobs.
                  """
                  self.scheduler.shutdown(wait=True)
                  self.logger.info("PAT rotation scheduler shut down gracefully")

              async def _rotation_job(self) -> None:
                  """Rotation job executed every 60 days.

                  Returns: None

                  Why: APScheduler job handler that triggers PAT rotation operations and
                  sends appropriate notifications.
                  """
                  self.logger.info("Starting scheduled PAT rotation job")
                  try:
                      await self.pat_rotator.rotate_pat()
                      self.logger.info("PAT rotation job completed successfully")
                      await self._write_health_status("healthy")
                  except Exception as e:
                      self.logger.error(f"PAT rotation job failed: {str(e)}")
                      await self.pat_notifier.notify_rotation_failure(str(e))
                      await self._write_health_status("unhealthy")

              async def _expiry_warning_job(self) -> None:
                  """Expiry warning job executed daily at 9 AM UTC.

                  Returns: None

                  Why: APScheduler job handler that checks PAT expiry and sends warnings
                  when PAT will expire in 10 days or less.
                  """
                  self.logger.info("Starting scheduled PAT expiry check")
                  try:
                      expiry_date = await self.pat_rotator.get_pat_expiry_date()
                      days_until_expiry = (expiry_date - datetime.utcnow()).days

                      if days_until_expiry <= 10:
                          self.logger.warning(f"PAT expiring in {days_until_expiry} days")
                          await self.pat_notifier.notify_expiry_warning()
                      else:
                          self.logger.info(f"PAT healthy, expires in {days_until_expiry} days")
                  except Exception as e:
                      self.logger.error(f"Expiry check failed: {str(e)}")

              async def _health_check_job(self) -> None:
                  """Health check job executed hourly with status file writing.

                  Returns: None

                  Why: APScheduler job handler that validates current PAT and writes health
                  status file for Docker health check monitoring via HEALTHCHECK instruction.
                  """
                  self.logger.info("Starting scheduled PAT health check")
                  try:
                      is_valid = await self.pat_rotator.validate_current_pat()
                      if is_valid:
                          self.logger.info("PAT health check passed, writing healthy status")
                          await self._write_health_status("healthy")
                      else:
                          self.logger.error("PAT validation failed, writing unhealthy status")
                          await self._write_health_status("unhealthy")
                  except Exception as e:
                      self.logger.error(f"Health check failed: {str(e)}, writing unhealthy status")
                      await self._write_health_status("unhealthy")

              async def _write_health_status(self, status: str = "healthy") -> None:
                  """Write health status to file for Docker health checks.

                  Args:
                      status: Health status string ("healthy" or "unhealthy")

                  Returns: None

                  Why: Docker health check script (healthcheck-pat-rotator.sh) monitors
                  /tmp/pat_rotator_health file to determine service health. Must be written
                  after each significant operation (rotation, expiry check, health validation).
                  """
                  try:
                      health_file = Path("/tmp/pat_rotator_health")
                      health_file.write_text(status)
                      health_file.chmod(0o644)
                      self.logger.debug(f"Wrote health status: {status}")
                  except Exception as e:
                      self.logger.error(f"Failed to write health status: {str(e)}")
        code_points:
          - point: "_write_health_status() method"
            implementation: "Writes health status to /tmp/pat_rotator_health with 0o644 permissions"
            called_from: "_health_check_job() after validation, _rotation_job() after rotation"
            docker_integration: "healthcheck-pat-rotator.sh reads this file, exits 1 if missing/stale/unhealthy"
          - point: "_health_check_job() method"
            implementation: "Calls validate_current_pat(), writes appropriate health status"
            frequency: "Hourly via APScheduler IntervalTrigger"
            failure_handling: "Writes 'unhealthy' on exception, logs error for investigation"
      success_criteria:
        - "All scheduler tests pass"
        - "Jobs registered correctly"
        - "Graceful shutdown works"
