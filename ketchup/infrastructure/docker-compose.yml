services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ketchup-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-app:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-app:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - MCP_BASE_URL=http://mcp-jira:8081
      - JIRA_TOOL_PERSIST_CORRECTIONS=true
      - JIRA_TOOL_CORRECTIONS_FILE=/tmp/jira_corrections_cache.json
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=true
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true   # Enable trust endorsement
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true     # Enabled globally for all channels
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_FEATURE=true  # Enable access request automation
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_GLOBAL=true   # Enable globally for all users
      - KETCHUP_USER_JOIN_NOTIFICATIONS_FEATURE=true   # Enable user join notifications (default disabled)
      - KETCHUP_USER_JOIN_NOTIFICATIONS_GLOBAL=true    # Enable globally for all channels (controlled rollout)
      - KETCHUP_MAINTENANCE_DETECTION=true  # Enable maintenance detection globally
      - USE_PIPELINE_PROCESSING=true   # Enable pipeline processing for slash commands (59% performance improvement proven in production)
      - KETCHUP_EVENTS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/483013340174/ketchup-events-queue
      # Keep-Alive Connection Tuning - Optimize HTTP connection reuse
      - KETCHUP_KEEPALIVE_ENABLED=true  # Enable optimized keep-alive settings (2-3% performance gain)
      - KETCHUP_KEEPALIVE_TIMEOUT=60     # Keep connections alive for 60s (vs 15s default)
      - KETCHUP_DNS_CACHE_TTL=300        # Cache DNS for 5 minutes (vs 10s default)
      - TZ=Europe/London
      - MAX_CONCURRENT_REQUESTS=20
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
      # Structured JSON Output - Enable JSON mode for 10-20% faster AI responses (default: false)
      - KETCHUP_STRUCTURED_JSON_OUTPUT=true
      # System channels excluded from CSO metrics
      - EXCLUDED_CSO_CHANNELS=C090V88CB1N,C08CQN1JCSC  # ketchup_access, ketchup_feedback
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    deploy:
      replicas: 2  # 2 replicas for High Availability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-metadata-updater:
    build:
      context: .
      dockerfile: Dockerfile.updater
      platforms:
        - linux/amd64
      # Enable BuildKit features for faster builds
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-metadata-updater:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - MAX_CONCURRENT_REQUESTS=20
      - USE_PIPELINE_PROCESSING=true   # Enable pipeline processing for metadata updater (59% improvement proven)
      # Keep-Alive Connection Tuning - Optimize HTTP connection reuse
      - KETCHUP_KEEPALIVE_ENABLED=true  # Enable optimized keep-alive settings (2-3% performance gain)
      - KETCHUP_KEEPALIVE_TIMEOUT=60     # Keep connections alive for 60s (vs 15s default)
      - KETCHUP_DNS_CACHE_TTL=300        # Cache DNS for 5 minutes (vs 10s default)
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
      # Structured JSON Output - Enable JSON mode for 10-20% faster AI responses (default: false)
      - KETCHUP_STRUCTURED_JSON_OUTPUT=true
    volumes:
      - ./logs:/var/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-customer-jira-metadata-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mcp-jira:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mcp-jira
      platforms:
        - linux/amd64
      # Enable BuildKit features for faster builds
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/mcp-jira:v2.360.347
    ports:
      - "8081:8081"  # Expose for testing
    environment:
      - USE_IPAAS=true
      - AWS_REGION=eu-west-1
      - PORT=8081
      # iPaaS credentials - these will be populated from AWS Secrets Manager
      # The ketchup-app container has access to these secrets
      - JIRA_API_KEY=
      - JIRA_USERNAME=
      - JIRA_PASSWORD=
      - JIRA_IMS_TOKEN=
      - JIRA_USE_PAT_AUTH=false  # PAT authentication feature flag (default: false for safety)
      - TZ=Europe/London
      - MAX_CONCURRENT_REQUESTS=20
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-status-updater:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-status-updater:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - MCP_BASE_URL=http://mcp-jira:8081
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=true
      # Server-specific enablement (set to true on prod2, false on prod1)
      - KETCHUP_STATUS_UPDATER_ENABLED=true
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true   # Enable trust endorsement
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true     # Enabled globally for all channels
      - USE_PIPELINE_PROCESSING=true   # Enable pipeline processing for auto-status generation (similar workload to slash commands)
      # Keep-Alive Connection Tuning - Optimize HTTP connection reuse
      - KETCHUP_KEEPALIVE_ENABLED=true  # Enable optimized keep-alive settings (2-3% performance gain)
      - KETCHUP_KEEPALIVE_TIMEOUT=60     # Keep connections alive for 60s (vs 15s default)
      - KETCHUP_DNS_CACHE_TTL=300        # Cache DNS for 5 minutes (vs 10s default)
      - TZ=Europe/London
      - MAX_CONCURRENT_REQUESTS=20
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
      # Structured JSON Output - Enable JSON mode for 10-20% faster AI responses (default: false)
      - KETCHUP_STRUCTURED_JSON_OUTPUT=true
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/scripts/healthcheck-public-status-message-scheduler.sh"]
      interval: 30s       # Check every 30 seconds
      timeout: 10s
      retries: 2          # Allow 1 missed run before marking unhealthy
      start_period: 120s  # Wait 2 minutes for first run
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-jira-reporter:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-jira-reporter:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - MCP_BASE_URL=http://mcp-jira:8081
      - CHECK_INTERVAL_MINUTES=15
      - LOOKBACK_HOURS=24
      - BATCH_SIZE=5
      - PYTHONPATH=/app
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true   # Enable trust endorsement
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true     # Enabled globally for all channels
      - KETCHUP_EVENTS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/483013340174/ketchup-events-queue
      - USE_PIPELINE_PROCESSING=true   # Enable pipeline processing for JIRA reporter (59% improvement proven)
      # Keep-Alive Connection Tuning - Optimize HTTP connection reuse
      - KETCHUP_KEEPALIVE_ENABLED=true  # Enable optimized keep-alive settings (2-3% performance gain)
      - KETCHUP_KEEPALIVE_TIMEOUT=60     # Keep connections alive for 60s (vs 15s default)
      - KETCHUP_DNS_CACHE_TTL=300        # Cache DNS for 5 minutes (vs 10s default)
      - TZ=Europe/London
      - MAX_CONCURRENT_REQUESTS=20
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
      # Structured JSON Output - Enable JSON mode for 10-20% faster AI responses (default: false)
      - KETCHUP_STRUCTURED_JSON_OUTPUT=true
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ./logs/jira_reporter:/var/log/jira_reporter
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/infrastructure/healthcheck-jira-reporter.sh"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-access-monitor:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-access-monitor:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - TZ=Europe/London
      - ACCESS_REQUEST_MONITOR_INTERVAL=300  # 5 minutes
      - ACCESS_REQUEST_ALERT_COOLDOWN=3600  # 1 hour
      - MAX_CONCURRENT_REQUESTS=20
      # HTTP/2 Migration Settings (Phase 2 - ENABLED for deployment)
      - KETCHUP_USE_HTTPX=true  # Enable httpx instead of aiohttp for HTTP/2 support (5-8% performance gain)
      - KETCHUP_HTTP2_ENABLED=true  # Enable HTTP/2 multiplexing when httpx is enabled
      - KETCHUP_HTTPX_POOL_LIMITS=50  # Max concurrent connections in httpx pool
    volumes:
      - ./logs/access_monitor:/var/log/access_monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/infrastructure/healthcheck-access-monitor.sh"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-maintenance-fetcher:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-maintenance-fetcher:v2.360.347
    environment:
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - KETCHUP_MAINTENANCE_FETCHER_ENABLED=true
      - KETCHUP_MAINTENANCE_FETCHER_RUN_ON_START=true
      - TZ=UTC
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "test", "-f", "/app/health/maintenance_fetcher_health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# Production network configuration
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

# Persistent volumes
volumes: {}