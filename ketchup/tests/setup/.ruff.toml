# Ruff configuration for test setup files
# These files require sys.path modification before imports

[lint]
ignore = [
    "E402",  # Module level import not at top of file - needed for sys.path setup
]

# Only apply to test files that need path manipulation
[lint.per-file-ignores]
"test_*.py" = ["E402"]
"production_*.py" = ["E402"]
"demo_*.py" = ["E402"]
"validate_*.py" = ["F401"]  # Allow unused imports in validation files