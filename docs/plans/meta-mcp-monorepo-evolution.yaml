conductor:
  default_agent: typescript-pro
  worktree_groups:
    - group_id: "core-extraction"
      description: "Extract shared infrastructure to @meta-mcp/core"
      tasks: [1, 2, 3, 4, 5, 6]
      rationale: "Foundation packages must be created before consumers can import"
    - group_id: "meta-mcp-refactor"
      description: "Refactor existing meta-mcp to use core imports"
      tasks: [7, 8, 9]
      rationale: "Depends on core package being complete"
    - group_id: "mcp-exec-foundation"
      description: "Create new mcp-exec package with sandbox execution"
      tasks: [10, 11, 12, 13, 14]
      rationale: "New package development, depends on core"
    - group_id: "wrapper-generation"
      description: "TypeScript wrapper generation for MCP tools"
      tasks: [15, 16]
      rationale: "Enhancement to mcp-exec for better DX"
    - group_id: "integration-testing"
      description: "End-to-end testing and documentation"
      tasks: [17, 18]
      rationale: "Final validation after all components complete"
