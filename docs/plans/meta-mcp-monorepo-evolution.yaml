# ═══════════════════════════════════════════════════════════════
# DATA FLOW REGISTRY
# ═══════════════════════════════════════════════════════════════
# PRODUCERS:
#   Task 1 → npm workspace root, packages/ structure
#   Task 2 → @meta-mcp/core types (ServerConfig, MCPConnection, ToolDefinition)
#   Task 3 → @meta-mcp/core registry (loadServerManifest, getServerConfig)
#   Task 4 → @meta-mcp/core pool (ServerPool, createConnection)
#   Task 5 → @meta-mcp/core tool-cache (ToolCache)
#   Task 6 → @meta-mcp/core package.json and exports
#   Task 7 → @meta-mcp/server refactored to use core imports
#   Task 10 → @meta-mcp/exec package skeleton
#   Task 11 → SandboxExecutor class using @anthropic-ai/sandbox-runtime
#   Task 12 → MCPBridge HTTP server
#   Task 13 → execute_code tool handler
#   Task 15 → WrapperGenerator for TypeScript tool wrappers
#
# CONSUMERS:
#   Task 3 → [2] (uses types)
#   Task 4 → [2] (uses types)
#   Task 5 → [2] (uses types)
#   Task 6 → [2, 3, 4, 5] (bundles all core modules)
#   Task 7 → [6] (imports from @meta-mcp/core)
#   Task 8 → [7] (updates server entry)
#   Task 9 → [7, 8] (updates tests)
#   Task 11 → [10] (adds to mcp-exec)
#   Task 12 → [6, 10] (uses core pool + mcp-exec structure)
#   Task 13 → [11, 12] (uses executor + bridge)
#   Task 14 → [13] (creates MCP server with tool)
#   Task 15 → [6, 10] (uses core types + mcp-exec)
#   Task 16 → [15] (uses wrapper generator)
#   Task 17 → [14, 16] (tests full flow)
#   Task 18 → [17] (documents after implementation)
#
# VALIDATION: All consumers depend_on producers ✓
