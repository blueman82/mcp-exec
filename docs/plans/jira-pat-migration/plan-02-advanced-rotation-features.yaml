plan:
  metadata:
    feature_name: "JIRA PAT Advanced Rotation Features with Backup and Documentation"
    created: "2025-11-19"
    phase: "Phase 2: Backup PAT, Metrics, and Documentation"
    depends_on: "Phase 1 (plan-01-pat-authentication.yaml) must be completed first"
    target: "Add backup PAT management, metrics collection, and comprehensive system documentation"
    estimated_tasks: 6
    total_files: 1
    task_numbering: "19-24 (continuation from Phase 1 which has tasks 1-18)"
    status: "Ready for implementation after Phase 1 completion"
  context:
    framework: "TypeScript (MCP), Python (rotation service)"
    architecture: "Backup PAT management, metrics collection to DynamoDB, comprehensive internal documentation"
    test_framework: "Jest (TypeScript), pytest (Python)"
    phase_1_dependencies:
      - "buildJiraAuthHeaders utility function with PAT support"
      - "MCP PAT operations (createPAT, revokePAT, listPATs, validatePAT)"
      - "Python rotation service with scheduler and TypedDI integration"
      - "Feature flag JIRA_USE_PAT_AUTH controlling auth method"
    key_patterns:
      - "TypedDI dependency injection for services"
      - "Distributed DynamoDB locking for concurrent operations"
      - "Scheduler pattern with health status file updates"
      - "Minimal alerting: rotation failures sent to #ketchup-alerts using existing pattern"
      - "TDD approach: write tests first, then implementation"
    expectations:
      - "Write tests BEFORE implementation (RED/GREEN/REFACTOR)"
      - "Follow existing service patterns established in Phase 1"
      - "Backup PAT feature must be non-intrusive to primary rotation"
      - "Metrics collection must not degrade rotation service performance"
      - "Alerting uses existing #ketchup-alerts pattern (like ketchup_access_request_monitor)"
      - "Documentation is comprehensive and follows existing style (internal_documentation/)"
      - "Commit frequently after each completed task"
      - "Use worktree per group for parallel development"
  worktree_groups:
    - group_id: "chain-1"
      description: "Backup PAT management system (create, validate, fallback logic)"
      tasks: [1, 2, 3]
      branch: "feature/jira-pat-migration/phase-2-chain-1-backup"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Backup PAT tasks form a dependency chain: storage schema → operations → fallback logic"
      setup_commands: |
        # Create worktree for backup PAT feature
        git worktree add ../wt-phase2-chain-1 -b feature/jira-pat-migration/phase-2-chain-1-backup
        cd ../wt-phase2-chain-1

        # Task 1: Add backup PAT schema to config
        # Implement and test
        git add .
        git commit -m "feat: add backup PAT configuration schema"

        # Task 2: Implement backup PAT operations
        # Implement and test
        git add .
        git commit -m "feat: implement backup PAT creation and validation"

        # Task 3: Implement fallback logic
        # Implement and test
        git add .
        git commit -m "feat: add PAT fallback mechanism when primary expires"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-chain-1-backup
        git push origin main
    - group_id: "chain-2"
      description: "Metrics collection system (aggregation and storage)"
      tasks: [4, 5]
      branch: "feature/jira-pat-migration/phase-2-chain-2-metrics"
      execution_model: "sequential"
      isolation: "separate-worktree"
      depends_on: ["Phase 1 completion - rotation service must be running"]
      rationale: "Metrics tasks form a dependency chain: storage schema → collector service"
      setup_commands: |
        # Wait for Phase 1 to be merged and rotation service running
        git checkout main
        git pull origin main

        # Create worktree for metrics feature
        git worktree add ../wt-phase2-chain-2 -b feature/jira-pat-migration/phase-2-chain-2-metrics
        cd ../wt-phase2-chain-2

        # Task 4: Add metrics schema and storage
        # Implement and test
        git add .
        git commit -m "feat: add PAT metrics schema and DynamoDB storage"

        # Task 5: Implement metrics collector service
        # Implement and test
        git add .
        git commit -m "feat: implement metrics collection scheduler"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-chain-2-metrics
        git push origin main
    - group_id: "independent-1"
      description: "PAT rotation system documentation"
      tasks: [6]
      branch: "feature/jira-pat-migration/phase-2-independent-1-docs"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Documentation can be written independently from code implementation"
      setup_commands: |
        # Create worktree for documentation
        git worktree add ../wt-phase2-independent-1 -b feature/jira-pat-migration/phase-2-independent-1-docs
        cd ../wt-phase2-independent-1

        # Task 6: Document PAT rotation system
        # Write and validate documentation
        git add .
        git commit -m "docs: add comprehensive PAT rotation system documentation"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-independent-1-docs
        git push origin main
  execution_strategy:
    parallel_groups:
      - ["chain-1", "independent-1"] # Can start immediately after Phase 1
    sequential_dependencies:
      - "chain-1 → chain-2 (chain-2 waits for chain-1)"
      - "chain-2 and independent-1 → deployment (both complete before prod deployment)"
    optimal_flow: |
      1. Start chain-1 (backup PAT) and independent-1 (documentation) in parallel
      2. When chain-1 completes, start chain-2 (metrics collection)
      3. When both chain-2 AND independent-1 complete, ready for testing/deployment
      4. Total duration: ~2 days wall-clock time (vs 3+ sequential)
  prerequisites:
    - item: "Phase 1 (plan-01-pat-authentication.yaml) completed"
      details: "All 14 Phase 1 tasks implemented and merged to main"
      verified: false
      blocking: true
    - item: "MCP service with PAT support running"
      details: "buildJiraAuthHeaders() working, feature flag implemented"
      verified: false
      blocking: true
    - item: "Python rotation service running with health checks"
      details: "Scheduler running, rotation logic tested, health file updating"
      verified: false
      blocking: true
    - item: "DynamoDB tables available"
      details: "Existing ketchup tables, metrics table available"
      verified: false
      blocking: true
    - item: "AWS Secrets Manager access"
      details: "Can read/write JIRA_PAT, JIRA_PAT_EXPIRY, and backup PAT secrets"
      verified: false
      blocking: true
    - item: "Git worktrees ready"
      details: "Understand worktree workflow from Phase 1"
      verified: false
      blocking: false
  critical_milestones:
    - milestone: "Task 3 Complete"
      description: "Backup PAT feature working"
      validation: "Run: python -m pytest tests/unit/test_backup_pat -v && npm test ketchup/corp_jira_mcp --testPathPattern=backup"
      before_next: "Backup PAT can be created, validated, and used as fallback"
    - milestone: "Task 5 Complete"
      description: "Metrics collection running"
      validation: "Verify metrics are being written to DynamoDB every 5 minutes"
      before_next: "Can use metrics for monitoring and operational decisions"
    - milestone: "Task 6 Complete"
      description: "PAT rotation system documented"
      validation: "Documentation covers how it works, success flows, failure modes, and alerting"
      before_next: "Ready for production deployment with team trained on documentation"
  key_files_to_monitor:
    - "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts (backupPat configuration)"
    - "ketchup/corp_jira_mcp/corp_jira_mcp/services/backup-pat.service.ts (backup operations)"
    - "ketchup/ketchup_jira_pat_rotator/metrics_collector.py (metrics collection)"
    - "ketchup/docs/internal_documentation/jira_pat_rotation_system.md (documentation)"
  expected_outcomes_by_task:
    task_1_3:
      description: "Backup PAT management fully integrated"
      validation: "Backup PAT can be created, validated, and used as fallback"
    task_4_5:
      description: "Metrics collection running continuously"
      validation: "Metrics visible in DynamoDB and queryable via Python API"
    task_6:
      description: "PAT rotation system comprehensively documented"
      validation: "Documentation is accurate, complete, and integrated with existing docs"
  tasks:
    - task_number: 19
      name: "Add backup PAT configuration schema"
      agent: "typescript-pro"
      worktree_group: "chain-1"
      files:
        - "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts"
        - "ketchup/corp_jira_mcp/corp_jira_mcp/common/types/backup-pat.types.ts"
        - "tests/unit/test_backup_pat/test_config.test.ts"
      depends_on: []
      estimated_time: "30m"
      description: |
        Add configuration schema for backup PAT management to MCP service.
        This extends the existing JiraConfig interface to support a secondary
        backup PAT that can be used as fallback when primary PAT is near expiry.
      test_first:
        test_file: "tests/unit/test_backup_pat/test_config.test.ts"
        structure:
          - "describe('BackupPATConfig', () => {...})"
          - "test: config loads backup PAT from AWS Secrets"
          - "test: backup PAT expiry is parsed correctly"
          - "test: config can be read without primary PAT (for fresh rotation)"
          - "test: config validates backup PAT format"
        mocks:
          - "SecretsManagerService"
        fixtures:
          - "validBackupPATConfig"
          - "expiredBackupPATConfig"
        assertions:
          - "Backup PAT is stored in config.backupPat field"
          - "Backup PAT expiry is stored in config.backupPatExpiry field"
          - "useBackupPat flag exists and defaults to false"
          - "Config validation succeeds with valid backup PAT"
        example_skeleton: |
          // tests/unit/test_backup_pat/test_config.test.ts
          import { describe, it, expect, beforeEach } from '@jest/globals';
          import { JiraConfig } from '../../../src/common/config';
          import { loadConfig } from '../../../src/common/config-loader';
          import { mockSecretsManager } from '../../helpers/mocks';

          describe('BackupPATConfig', () => {
            let config: JiraConfig;

            beforeEach(async () => {
              // Mock secrets with backup PAT
              mockSecretsManager({
                JIRA_PAT: 'primary-token-abc123',
                JIRA_PAT_EXPIRY: '2026-02-15T10:30:00Z',
                JIRA_BACKUP_PAT: 'backup-token-xyz789',
                JIRA_BACKUP_PAT_EXPIRY: '2026-03-15T10:30:00Z'
              });

              config = await loadConfig();
            });

            it('should load primary and backup PAT from secrets', () => {
              expect(config.pat).toBe('primary-token-abc123');
              expect(config.backupPat).toBe('backup-token-xyz789');
            });

            it('should parse backup PAT expiry as Date', () => {
              expect(config.backupPatExpiry).toEqual(
                new Date('2026-03-15T10:30:00Z')
              );
            });

            it('should have useBackupPat flag defaulting to false', () => {
              expect(config.useBackupPat).toBe(false);
            });

            it('should validate backup PAT format', () => {
              // Invalid backup PAT should throw or fail validation
              expect(() => {
                config.validateBackupPat('invalid-format');
              }).toThrow('Invalid backup PAT format');
            });

            it('should handle missing backup PAT gracefully', async () => {
              mockSecretsManager({
                JIRA_PAT: 'primary-token-abc123',
                JIRA_PAT_EXPIRY: '2026-02-15T10:30:00Z',
                // JIRA_BACKUP_PAT not provided
              });

              config = await loadConfig();
              expect(config.backupPat).toBeUndefined();
              expect(config.useBackupPat).toBe(false);
            });
          });
      implementation:
        approach: |
          Extend the existing JiraConfig interface to include backup PAT fields.
          Load backup PAT and expiry from AWS Secrets Manager (new secret keys).
          Add flag to control which PAT is actively used (primary vs backup).
          Update config loader to handle optional backup PAT gracefully.
        code_structure: |
          // ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts
          export interface JiraConfig {
            // Existing fields
            email: string;
            token: string;
            pat: string;
            patExpiry: Date;
            usePat: boolean;

            // NEW fields for Phase 2
            backupPat?: string;              // Secondary PAT for fallback
            backupPatExpiry?: Date;          // When backup PAT expires
            useBackupPat?: boolean;          // Currently using backup (default false)
            backupPatCreatedAt?: Date;       // When backup was created
          }
        key_points:
          - point: "Extend existing config.ts, don't replace it"
            reference: "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts:1"
          - point: "Load from AWS Secrets Manager same as primary PAT"
            reference: "ketchup/corp_jira_mcp/corp_jira_mcp/env-aws.ts - pattern for secret mapping"
          - point: "Make backup PAT optional - not all deployments need it"
            details: "Use optional fields (?:) in TypeScript interface"
          - point: "Add validation utility for backup PAT format"
            reference: "Similar to existing PAT validation in utils.ts"
        critical_patterns:
          purpose: "Complete code patterns to copy-paste into implementation"
          backup_pat_config_interface:
            description: "TypeScript interface for backup PAT configuration"
            complete_code: |
              // ketchup/corp_jira_mcp/corp_jira_mcp/common/types/backup-pat.types.ts
              export interface BackupPATConfig {
                /** Secondary PAT token (Bearer token format) */
                backupPat?: string;

                /** When backup PAT expires */
                backupPatExpiry?: Date;

                /** Whether to use backup PAT instead of primary */
                useBackupPat: boolean;

                /** When backup PAT was created (UTC) */
                backupPatCreatedAt?: Date;

                /** Days until backup PAT should be rotated */
                backupPatRotationDaysRemaining?: number;
              }

              // Extend existing JiraConfig
              export interface JiraConfig extends BackupPATConfig {
                // Existing fields remain
                email: string;
                token: string;
                pat: string;
                patExpiry: Date;
                usePat: boolean;
              }
      verification:
        manual_testing:
          - step: "Load config locally with backup PAT"
            command: "npm run test tests/unit/test_backup_pat/test_config.test.ts"
          - step: "Verify backup PAT is accessible"
            expected: "Config loads with backupPat and backupPatExpiry fields"
        automated_tests:
          command: "npm test ketchup/corp_jira_mcp --testPathPattern=backup.*config"
          expected_output: |
            All tests passing:
            ✓ Config loads backup PAT from secrets
            ✓ Backup PAT expiry parsed correctly
            ✓ useBackupPat flag defaults to false
            ✓ Config validates backup PAT format
        success_criteria:
          - "All unit tests pass"
          - "No TypeScript errors"
          - "Config can load with and without backup PAT"
          - "Validation catches invalid backup PAT format"
      commit:
        type: "feat"
        message: "add backup PAT configuration schema to MCP service"
        body: |
          Extend JiraConfig to support backup PAT management.
          - Add backupPat, backupPatExpiry, useBackupPat to config interface
          - Load backup PAT from AWS Secrets Manager
          - Add validation for backup PAT format and expiry
          - Make backup PAT optional (not all deployments require it)
