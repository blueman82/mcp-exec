plan:
  metadata:
    feature_name: "JIRA PAT Advanced Rotation Features with Backup Strategy and Monitoring"
    created: "2025-11-19"
    phase: "Phase 2: Advanced PAT Rotation & Monitoring"
    depends_on: "Phase 1 (plan-01-pat-authentication.yaml) must be completed first"
    target: "Add backup PAT management, comprehensive metrics, Slack dashboard, enhanced monitoring, and operational runbooks for post-deployment PAT management"
    estimated_tasks: 10
    total_files: 1
    status: "Ready for implementation after Phase 1 completion"

  context:
    framework: "TypeScript (MCP), Python (rotation service)"
    architecture: "Microservice-based with scheduled rotation, distributed metrics collection, Slack integration"
    test_framework: "Jest (TypeScript), pytest (Python)"
    phase_1_dependencies:
      - "buildJiraAuthHeaders utility function with PAT support"
      - "MCP PAT operations (createPAT, revokePAT, listPATs, validatePAT)"
      - "Python rotation service with scheduler and TypedDI integration"
      - "Feature flag JIRA_USE_PAT_AUTH controlling auth method"
    key_patterns:
      - "TypedDI dependency injection for services"
      - "Distributed DynamoDB locking for concurrent operations"
      - "Scheduler pattern with health status file updates"
      - "Slack webhook integration for dashboards and alerts"
      - "Metrics aggregation and time-series storage"
      - "TDD approach: write tests first, then implementation"
    expectations:
      - "Write tests BEFORE implementation (RED/GREEN/REFACTOR)"
      - "Follow existing service patterns established in Phase 1"
      - "Backup PAT feature must be non-intrusive to primary rotation"
      - "Metrics collection must not degrade rotation service performance"
      - "Slack dashboard must be read-only (no interactive controls)"
      - "Operational runbooks must be validated against actual failure scenarios"
      - "Commit frequently after each completed task"
      - "Use worktree per group for parallel development"

  worktree_groups:
    - group_id: "chain-1"
      description: "Backup PAT management system (create, validate, fallback logic)"
      tasks: [1, 2, 3]
      branch: "feature/jira-pat-migration/phase-2-chain-1-backup"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Backup PAT tasks form a dependency chain: storage schema → operations → fallback logic"
      setup_commands: |
        # Create worktree for backup PAT feature
        git worktree add ../wt-phase2-chain-1 -b feature/jira-pat-migration/phase-2-chain-1-backup
        cd ../wt-phase2-chain-1

        # Task 1: Add backup PAT schema to config
        # Implement and test
        git add .
        git commit -m "feat: add backup PAT configuration schema"

        # Task 2: Implement backup PAT operations
        # Implement and test
        git add .
        git commit -m "feat: implement backup PAT creation and validation"

        # Task 3: Implement fallback logic
        # Implement and test
        git add .
        git commit -m "feat: add PAT fallback mechanism when primary expires"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-chain-1-backup
        git push origin main

    - group_id: "chain-2"
      description: "Metrics collection system (aggregation and storage)"
      tasks: [4, 5]
      branch: "feature/jira-pat-migration/phase-2-chain-2-metrics"
      execution_model: "sequential"
      isolation: "separate-worktree"
      depends_on: ["Phase 1 completion - rotation service must be running"]
      rationale: "Metrics tasks form a dependency chain: storage schema → collector service"
      setup_commands: |
        # Wait for Phase 1 to be merged and rotation service running
        git checkout main
        git pull origin main

        # Create worktree for metrics feature
        git worktree add ../wt-phase2-chain-2 -b feature/jira-pat-migration/phase-2-chain-2-metrics
        cd ../wt-phase2-chain-2

        # Task 4: Add metrics schema and storage
        # Implement and test
        git add .
        git commit -m "feat: add PAT metrics schema and DynamoDB storage"

        # Task 5: Implement metrics collector service
        # Implement and test
        git add .
        git commit -m "feat: implement metrics collection scheduler"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-chain-2-metrics
        git push origin main

    - group_id: "chain-3"
      description: "Slack dashboard integration (read-only metrics display)"
      tasks: [6, 7]
      branch: "feature/jira-pat-migration/phase-2-chain-3-dashboard"
      execution_model: "sequential"
      isolation: "separate-worktree"
      depends_on: ["chain-2 - metrics must be collected before displaying"]
      rationale: "Dashboard tasks depend on metrics collection: format metrics → build dashboard blocks"
      setup_commands: |
        # Wait for chain-2 to complete and merge
        git checkout main
        git pull origin main

        # Create worktree for dashboard feature
        git worktree add ../wt-phase2-chain-3 -b feature/jira-pat-migration/phase-2-chain-3-dashboard
        cd ../wt-phase2-chain-3

        # Task 6: Format and prepare metrics for Slack
        # Implement and test
        git add .
        git commit -m "feat: add metrics formatter for Slack display"

        # Task 7: Implement Slack dashboard block builder
        # Implement and test
        git add .
        git commit -m "feat: add Slack dashboard with PAT metrics and status"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-chain-3-dashboard
        git push origin main

    - group_id: "independent-1"
      description: "Enhanced health monitoring with advanced checks"
      tasks: [8]
      branch: "feature/jira-pat-migration/phase-2-independent-1-monitoring"
      execution_model: "parallel"
      isolation: "separate-worktree"
      depends_on: ["Phase 1 completion - rotation service health checks"]
      rationale: "Health monitoring is independent from backup/metrics features, can run in parallel"
      setup_commands: |
        # After Phase 1 is merged, can start immediately
        git checkout main
        git pull origin main

        # Create worktree for health monitoring
        git worktree add ../wt-phase2-independent-1 -b feature/jira-pat-migration/phase-2-independent-1-monitoring
        cd ../wt-phase2-independent-1

        # Task 8: Implement advanced health monitoring
        # Implement and test
        git add .
        git commit -m "feat: add advanced PAT health checks (expiry predictions, rotation failures)"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-independent-1-monitoring
        git push origin main

    - group_id: "independent-2"
      description: "Operational runbooks and troubleshooting guide"
      tasks: [9]
      branch: "feature/jira-pat-migration/phase-2-independent-2-runbooks"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Runbook documentation is independent from code tasks, can run in parallel"
      setup_commands: |
        # Create worktree for runbooks
        git worktree add ../wt-phase2-independent-2 -b feature/jira-pat-migration/phase-2-independent-2-runbooks
        cd ../wt-phase2-independent-2

        # Task 9: Create operational runbooks
        # Write and test documentation
        git add .
        git commit -m "docs: add PAT rotation operational runbooks and troubleshooting guide"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-independent-2-runbooks
        git push origin main

    - group_id: "independent-3"
      description: "Team training materials and knowledge transfer"
      tasks: [10]
      branch: "feature/jira-pat-migration/phase-2-independent-3-training"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Training materials can be developed independently from implementation tasks"
      setup_commands: |
        # Create worktree for training
        git worktree add ../wt-phase2-independent-3 -b feature/jira-pat-migration/phase-2-independent-3-training
        cd ../wt-phase2-independent-3

        # Task 10: Create team training materials
        # Write and document training content
        git add .
        git commit -m "docs: add team training materials for PAT rotation and monitoring"

        # When ready, merge to main
        git checkout main
        git merge feature/jira-pat-migration/phase-2-independent-3-training
        git push origin main

  execution_strategy:
    parallel_groups:
      - ["chain-1 + independent-1 + independent-2 + independent-3"]  # All can start after Phase 1 completion
      - ["chain-2 requires Phase 1 rotation service running"]
      - ["chain-3 requires chain-2 metrics collection"]

    sequential_dependencies:
      - "chain-1 → independent (can run anytime)"
      - "Phase 1 → chain-2 (metrics needs rotation service)"
      - "chain-2 → chain-3 (dashboard needs metrics)"

    optimal_flow: |
      1. Ensure Phase 1 (plan-01-pat-authentication.yaml) is completed and merged
      2. Start chain-1 (backup PAT) in parallel with independent-1, independent-2, independent-3
      3. After Phase 1 rotation service is running, start chain-2 (metrics collection)
      4. After chain-2 completes, start chain-3 (Slack dashboard)
      5. Total duration: ~3-4 hours wall-clock time (vs 6+ sequential)
      6. After all worktrees merge, validate end-to-end functionality

  prerequisites:
    - item: "Phase 1 (plan-01-pat-authentication.yaml) completed"
      details: "All 14 Phase 1 tasks implemented and merged to main"
      verified: false
      blocking: true

    - item: "MCP service with PAT support running"
      details: "buildJiraAuthHeaders() working, feature flag implemented"
      verified: false
      blocking: true

    - item: "Python rotation service running with health checks"
      details: "Scheduler running, rotation logic tested, health file updating"
      verified: false
      blocking: true

    - item: "DynamoDB tables available"
      details: "Existing ketchup tables, distributed locking table if needed"
      verified: false
      blocking: true

    - item: "AWS Secrets Manager access"
      details: "Can read/write JIRA_PAT, JIRA_PAT_EXPIRY, and backup PAT secrets"
      verified: false
      blocking: true

    - item: "Slack webhook configured"
      details: "Valid webhook URL for posting to #ketchup-alerts or dedicated #pat-dashboard"
      verified: false
      blocking: true

    - item: "Development environment from Phase 1"
      details: "Docker Compose, local testing environment, test scripts"
      verified: false
      blocking: true

    - item: "Git worktrees ready"
      details: "Understand worktree workflow from Phase 1"
      verified: false
      blocking: false

  critical_milestones:
    - milestone: "Task 3 Complete"
      description: "Backup PAT feature working"
      validation: "Run: python -m pytest tests/unit/test_backup_pat -v && npm test ketchup/corp_jira_mcp --testPathPattern=backup"
      before_next: "Backup PAT can be created and validated"

    - milestone: "Task 5 Complete"
      description: "Metrics collection running"
      validation: "Verify metrics are being written to DynamoDB every minute, check: aws dynamodb scan --table-name ketchup_pat_metrics"
      before_next: "Can begin Slack dashboard development"

    - milestone: "Task 7 Complete"
      description: "Slack dashboard displaying metrics"
      validation: "Post test message to #pat-dashboard: dashboard should show current metrics (rotation status, next rotation date, backup PAT health)"
      before_next: "Operational features ready"

    - milestone: "All Tasks Complete"
      description: "Phase 2 fully implemented"
      validation: "Run local docker-compose with all Phase 2 services, verify: rotation running + metrics collecting + dashboard updating every 5 minutes + health monitoring active"
      before_next: "Ready for integration testing and production deployment"

  key_files_to_monitor:
    - "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts (backupPat configuration)"
    - "ketchup/corp_jira_mcp/corp_jira_mcp/services/backup-pat.service.ts (backup operations)"
    - "ketchup/ketchup_jira_pat_rotator/metrics_collector.py (metrics collection)"
    - "ketchup/ketchup_jira_pat_rotator/slack_dashboard.py (Slack integration)"
    - "infrastructure/docker-compose.yml (backup PAT and metrics services)"

  expected_outcomes_by_task:
    task_1_3:
      description: "Backup PAT management fully integrated"
      validation: "Backup PAT can be created, validated, and used as fallback"

    task_4_5:
      description: "Metrics collection running continuously"
      validation: "Metrics visible in DynamoDB and queryable via Python API"

    task_6_7:
      description: "Slack dashboard showing PAT health"
      validation: "Dashboard posts to Slack every 5 minutes with formatted metrics"

    task_8:
      description: "Enhanced health monitoring with predictive alerts"
      validation: "Alerts sent for upcoming expiry, rotation failures, and anomalies"

    task_9:
      description: "Comprehensive operational documentation"
      validation: "Runbook covers all common failure scenarios with resolution steps"

    task_10:
      description: "Team trained on new PAT rotation system"
      validation: "Team can troubleshoot issues using runbook, perform manual rotation"

  next_phases:
    - phase: "Phase 3 (Optional - Post-Deployment Enhancements)"
      description: "Additional features based on production usage"
      tasks:
        - "Implement automated PAT backup and recovery"
        - "Add predictive rotation scheduling (AI-based)"
        - "Create Slack bot commands for manual operations"
        - "Implement cross-region PAT failover"
      estimated_effort: "1-2 weeks after Phase 2 completion"

    - phase: "Operations & Support"
      description: "Ongoing monitoring and improvement"
      items:
        - "Monitor metrics dashboard for anomalies"
        - "Run quarterly backup recovery drills"
        - "Update runbooks based on incidents"
        - "Measure PAT rotation success rate and reliability"

  success_criteria_phase_2:
    must_have:
      - "✓ Backup PAT management implemented and tested"
      - "✓ Metrics collection running continuously"
      - "✓ Slack dashboard displaying real-time metrics"
      - "✓ Enhanced health monitoring with early warnings"
      - "✓ All tests passing (unit + integration)"
      - "✓ All Phase 1 + Phase 2 features stable for 24h locally"

    should_have:
      - "✓ Comprehensive operational runbooks"
      - "✓ Team trained and able to troubleshoot"
      - "✓ Performance: rotation takes <5 seconds, metrics collection <1 second"
      - "✓ Monitoring: no PAT-related alerts in normal operation"

    nice_to_have:
      - "✓ Automated backup recovery testing"
      - "✓ Historical metrics visualization"
      - "✓ Predictive rotation scheduling"

  tasks:
    - task_number: 1
      name: "Add backup PAT configuration schema"
      agent: "typescript-pro"
      worktree_group: "chain-1"
      files:
        - "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts"
        - "ketchup/corp_jira_mcp/corp_jira_mcp/common/types/backup-pat.types.ts"
        - "tests/unit/test_backup_pat/test_config.test.ts"
      depends_on: []
      estimated_time: "30m"

      description: |
        Add configuration schema for backup PAT management to MCP service.
        This extends the existing JiraConfig interface to support a secondary
        backup PAT that can be used as fallback when primary PAT is near expiry.

      test_first:
        test_file: "tests/unit/test_backup_pat/test_config.test.ts"
        structure:
          - "describe('BackupPATConfig', () => {...})"
          - "test: config loads backup PAT from AWS Secrets"
          - "test: backup PAT expiry is parsed correctly"
          - "test: config can be read without primary PAT (for fresh rotation)"
          - "test: config validates backup PAT format"
        mocks:
          - "SecretsManagerService"
        fixtures:
          - "validBackupPATConfig"
          - "expiredBackupPATConfig"
        assertions:
          - "Backup PAT is stored in config.backupPat field"
          - "Backup PAT expiry is stored in config.backupPatExpiry field"
          - "useBackupPat flag exists and defaults to false"
          - "Config validation succeeds with valid backup PAT"

        example_skeleton: |
          // tests/unit/test_backup_pat/test_config.test.ts
          import { describe, it, expect, beforeEach } from '@jest/globals';
          import { JiraConfig } from '../../../src/common/config';
          import { loadConfig } from '../../../src/common/config-loader';
          import { mockSecretsManager } from '../../helpers/mocks';

          describe('BackupPATConfig', () => {
            let config: JiraConfig;

            beforeEach(async () => {
              // Mock secrets with backup PAT
              mockSecretsManager({
                JIRA_PAT: 'primary-token-abc123',
                JIRA_PAT_EXPIRY: '2026-02-15T10:30:00Z',
                JIRA_BACKUP_PAT: 'backup-token-xyz789',
                JIRA_BACKUP_PAT_EXPIRY: '2026-03-15T10:30:00Z'
              });

              config = await loadConfig();
            });

            it('should load primary and backup PAT from secrets', () => {
              expect(config.pat).toBe('primary-token-abc123');
              expect(config.backupPat).toBe('backup-token-xyz789');
            });

            it('should parse backup PAT expiry as Date', () => {
              expect(config.backupPatExpiry).toEqual(
                new Date('2026-03-15T10:30:00Z')
              );
            });

            it('should have useBackupPat flag defaulting to false', () => {
              expect(config.useBackupPat).toBe(false);
            });

            it('should validate backup PAT format', () => {
              // Invalid backup PAT should throw or fail validation
              expect(() => {
                config.validateBackupPat('invalid-format');
              }).toThrow('Invalid backup PAT format');
            });

            it('should handle missing backup PAT gracefully', async () => {
              mockSecretsManager({
                JIRA_PAT: 'primary-token-abc123',
                JIRA_PAT_EXPIRY: '2026-02-15T10:30:00Z',
                // JIRA_BACKUP_PAT not provided
              });

              config = await loadConfig();
              expect(config.backupPat).toBeUndefined();
              expect(config.useBackupPat).toBe(false);
            });
          });

      implementation:
        approach: |
          Extend the existing JiraConfig interface to include backup PAT fields.
          Load backup PAT and expiry from AWS Secrets Manager (new secret keys).
          Add flag to control which PAT is actively used (primary vs backup).
          Update config loader to handle optional backup PAT gracefully.

        code_structure: |
          // ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts
          export interface JiraConfig {
            // Existing fields
            email: string;
            token: string;
            pat: string;
            patExpiry: Date;
            usePat: boolean;

            // NEW fields for Phase 2
            backupPat?: string;              // Secondary PAT for fallback
            backupPatExpiry?: Date;          // When backup PAT expires
            useBackupPat?: boolean;          // Currently using backup (default false)
            backupPatCreatedAt?: Date;       // When backup was created
          }

        key_points:
          - point: "Extend existing config.ts, don't replace it"
            reference: "ketchup/corp_jira_mcp/corp_jira_mcp/common/config.ts:1"
          - point: "Load from AWS Secrets Manager same as primary PAT"
            reference: "ketchup/corp_jira_mcp/corp_jira_mcp/env-aws.ts - pattern for secret mapping"
          - point: "Make backup PAT optional - not all deployments need it"
            details: "Use optional fields (?:) in TypeScript interface"
          - point: "Add validation utility for backup PAT format"
            reference: "Similar to existing PAT validation in utils.ts"

        critical_patterns:
          purpose: "Complete code patterns to copy-paste into implementation"

          backup_pat_config_interface:
            description: "TypeScript interface for backup PAT configuration"
            complete_code: |
              // ketchup/corp_jira_mcp/corp_jira_mcp/common/types/backup-pat.types.ts
              export interface BackupPATConfig {
                /** Secondary PAT token (Bearer token format) */
                backupPat?: string;

                /** When backup PAT expires */
                backupPatExpiry?: Date;

                /** Whether to use backup PAT instead of primary */
                useBackupPat: boolean;

                /** When backup PAT was created (UTC) */
                backupPatCreatedAt?: Date;

                /** Days until backup PAT should be rotated */
                backupPatRotationDaysRemaining?: number;
              }

              // Extend existing JiraConfig
              export interface JiraConfig extends BackupPATConfig {
                // Existing fields remain
                email: string;
                token: string;
                pat: string;
                patExpiry: Date;
                usePat: boolean;
              }

          config_loader_with_backup:
            description: "Load backup PAT from secrets, handle gracefully if missing"
            complete_code: |
              // In ketchup/corp_jira_mcp/corp_jira_mcp/common/config-loader.ts

              async function loadJiraConfig(): Promise<JiraConfig> {
                const secrets = await secretsManager.getSecret('Ketchup_Token_Secrets');

                // Load primary PAT (required)
                const pat = secrets.ketchup_jira_pat;
                const patExpiry = new Date(secrets.ketchup_jira_pat_expiry);

                // Load backup PAT (optional - if not present, backupPat = undefined)
                const backupPat = secrets.ketchup_jira_pat_backup;
                const backupPatExpiry = secrets.ketchup_jira_pat_backup_expiry
                  ? new Date(secrets.ketchup_jira_pat_backup_expiry)
                  : undefined;

                const config: JiraConfig = {
                  email: secrets.jira_email,
                  token: secrets.jira_basic_auth_token,
                  pat,
                  patExpiry,
                  usePat: process.env.JIRA_USE_PAT_AUTH === 'true',

                  // NEW: Backup PAT fields
                  backupPat,
                  backupPatExpiry,
                  useBackupPat: process.env.JIRA_USE_BACKUP_PAT === 'true' ?? false,
                  backupPatCreatedAt: secrets.ketchup_jira_pat_backup_created
                    ? new Date(secrets.ketchup_jira_pat_backup_created)
                    : undefined,

                  // Calculate days remaining for backup PAT
                  backupPatRotationDaysRemaining: backupPatExpiry
                    ? Math.floor((backupPatExpiry.getTime() - Date.now()) / (24 * 60 * 60 * 1000))
                    : undefined,
                };

                // Validation
                validateJiraConfig(config);
                return config;
              }

              function validateJiraConfig(config: JiraConfig): void {
                // Primary PAT validation (required)
                if (!config.pat || config.pat.trim() === '') {
                  throw new Error('JIRA_PAT not found in secrets');
                }

                // Backup PAT validation (optional but format must be valid if present)
                if (config.backupPat) {
                  if (!config.backupPat.match(/^[a-zA-Z0-9_-]+$/)) {
                    throw new Error('Invalid backup PAT format');
                  }
                  if (!config.backupPatExpiry || config.backupPatExpiry <= new Date()) {
                    throw new Error('Backup PAT is expired or missing expiry date');
                  }
                }

                // If useBackupPat is true, backup must exist
                if (config.useBackupPat && !config.backupPat) {
                  throw new Error('useBackupPat=true but no backup PAT available');
                }
              }

          env_aws_mapping:
            description: "Map backup PAT secrets in env-aws.ts"
            complete_code: |
              // In ketchup/corp_jira_mcp/corp_jira_mcp/env-aws.ts
              // Add these mappings to the secrets mapping:

              export async function mapAwsSecretsToEnv(
                secretsResponse: SecretsManagerResponse
              ): Promise<void> {
                const secrets = JSON.parse(secretsResponse.SecretString);

                // Existing mappings
                process.env.JIRA_EMAIL = secrets.jira_email;
                process.env.JIRA_PASSWORD = secrets.jira_password;
                process.env.IPAAS_USERNAME = secrets.ipaas_username;
                process.env.IPAAS_API_KEY = secrets.ipaas_api_key;

                // Phase 1 PAT mapping
                process.env.JIRA_PAT = secrets.ketchup_jira_pat;
                process.env.JIRA_PAT_EXPIRY = secrets.ketchup_jira_pat_expiry;

                // Phase 2 - Backup PAT mapping (NEW)
                if (secrets.ketchup_jira_pat_backup) {
                  process.env.JIRA_BACKUP_PAT = secrets.ketchup_jira_pat_backup;
                }
                if (secrets.ketchup_jira_pat_backup_expiry) {
                  process.env.JIRA_BACKUP_PAT_EXPIRY = secrets.ketchup_jira_pat_backup_expiry;
                }
                if (secrets.ketchup_jira_pat_backup_created) {
                  process.env.JIRA_BACKUP_PAT_CREATED = secrets.ketchup_jira_pat_backup_created;
                }
              }

      verification:
        manual_testing:
          - step: "Load config locally with backup PAT"
            command: "npm run test tests/unit/test_backup_pat/test_config.test.ts"
          - step: "Verify backup PAT is accessible"
            expected: "Config loads with backupPat and backupPatExpiry fields"

        automated_tests:
          command: "npm test ketchup/corp_jira_mcp --testPathPattern=backup.*config"
          expected_output: |
            All tests passing:
            ✓ Config loads backup PAT from secrets
            ✓ Backup PAT expiry parsed correctly
            ✓ useBackupPat flag defaults to false
            ✓ Config validates backup PAT format

        success_criteria:
          - "All unit tests pass"
          - "No TypeScript errors"
          - "Config can load with and without backup PAT"
          - "Validation catches invalid backup PAT format"

      commit:
        type: "feat"
        message: "add backup PAT configuration schema to MCP service"
        body: |
          Extend JiraConfig to support backup PAT management.
          - Add backupPat, backupPatExpiry, useBackupPat to config interface
          - Load backup PAT from AWS Secrets Manager
          - Add validation for backup PAT format and expiry
          - Make backup PAT optional (not all deployments require it)

    - task_number: 2
      name: "Implement backup PAT creation and validation operations"
      agent: "typescript-pro"
      worktree_group: "chain-1"
      files:
        - "ketchup/corp_jira_mcp/corp_jira_mcp/services/backup-pat.service.ts"
        - "tests/unit/test_backup_pat/test_backup_pat_service.test.ts"
      depends_on: [1]
      estimated_time: "1h"

      description: |
        Implement BackupPATService with operations to create, validate, and manage
        backup PAT tokens. This service wraps the existing PAT operations to manage
        two PAT tokens (primary and backup) with minimal code duplication.

      test_first:
        test_file: "tests/unit/test_backup_pat/test_backup_pat_service.test.ts"
        structure:
          - "describe('BackupPATService', () => {...})"
          - "test: createBackupPAT creates new token and stores expiry"
          - "test: validateBackupPAT checks token works against JIRA API"
          - "test: isBackupPATExpiring returns true when <14 days left"
          - "test: useBackupPAT switches config to use backup token"
          - "test: error handling when backup PAT creation fails"
        mocks:
          - "MCP PAT operations (createPAT, validatePAT)"
          - "SecretsManager for storing backup PAT"
          - "Logger for audit trail"
        fixtures:
          - "validBackupPATService"
          - "configWithoutBackupPAT"
          - "expiredBackupPAT"
        assertions:
