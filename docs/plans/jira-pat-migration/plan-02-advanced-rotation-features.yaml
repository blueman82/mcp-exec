      implementation:
        approach: |
          Update buildJiraAuthHeaders() to check primary PAT expiry and fallback to backup.
          Make fallback transparent - callers don't need to handle it specially.
          Add logging for all fallback events (audit trail, monitoring).
          Throw clear errors if neither PAT available.
          Calculate days remaining until backup expires to help with rotation timing.
        code_structure: |
          // ketchup/corp_jira_mcp/corp_jira_mcp/common/utils.ts
          export function buildJiraAuthHeaders(
            config: JiraConfig,
            logger: Logger
          ): Record<string, string> {
            // Determine which PAT to use (with fallback logic)
            let authToken: string;
            let source: 'primary' | 'backup';

            if (config.useBackupPat && config.backupPat) {
              // Explicitly using backup
              authToken = config.backupPat;
              source = 'backup';
            } else if (config.usePat && config.pat && isPATValid(config.patExpiry)) {
              // Primary PAT still valid
              authToken = config.pat;
              source = 'primary';
            } else if (config.backupPat && isPATValid(config.backupPatExpiry)) {
              // Primary expired but backup available - automatic fallback
              authToken = config.backupPat;
              source = 'backup';
            } else {
              // Neither PAT available
              throw new Error('No PAT available (primary and backup missing or expired)');
            }

            // Log fallback events
            if (source === 'backup' && !config.useBackupPat) {
              logger.warn('Falling back to backup PAT (primary expired)', {
                primaryExpiryDate: config.patExpiry,
                backupExpiryDate: config.backupPatExpiry,
                daysUntilBackupExpiry: calculateDaysUntilExpiry(config.backupPatExpiry)
              });
            } else if (source === 'backup' && config.useBackupPat) {
              logger.info('Using backup PAT (explicitly enabled)', {
                backupExpiryDate: config.backupPatExpiry
              });
            }

            // Return Authorization header
            return {
              'Authorization': `Bearer ${authToken}`,
              'Content-Type': 'application/json'
            };
          }
        key_points:
