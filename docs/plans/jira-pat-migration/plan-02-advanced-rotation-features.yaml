              // ketchup/corp_jira_mcp/corp_jira_mcp/services/backup-pat.service.ts
              import { Service, Inject } from 'typedi';
              import { Logger } from 'pino';
              import { MCPPATOperations } from './mcp-pat-operations';
              import { SecretsManagerService } from './secrets-manager.service';
              import { JiraConfig } from '../common/config';

              @Service()
              export class BackupPATService {
                // Constants
                private readonly BACKUP_PAT_ROTATION_DAYS = 75;
                private readonly BACKUP_PAT_EXPIRING_DAYS_THRESHOLD = 14;

                constructor(
                  @Inject() private mcpPat: MCPPATOperations,
                  @Inject() private secrets: SecretsManagerService,
                  @Inject() private logger: Logger
                ) {}

                /**
                 * Create a new backup PAT token via MCP operations.
                 * Stores in AWS Secrets Manager and logs for audit.
                 */
                async createBackupPAT(): Promise<{ token: string; expiresAt: Date }> {
                  try {
                    this.logger.info('Creating new backup PAT token');

                    // Use existing MCP operation to create PAT
                    const result = await this.mcpPat.createPAT({
                      name: 'backup-jira-pat',
                      expiryDays: 90
                    });

                    // Store in AWS Secrets
                    await this.secrets.updateSecret('Ketchup_Token_Secrets', {
                      ketchup_jira_pat_backup: result.token,
                      ketchup_jira_pat_backup_expiry: result.expiresAt.toISOString(),
                      ketchup_jira_pat_backup_created: new Date().toISOString()
                    });

                    this.logger.info('Backup PAT created and stored', {
                      expiresAt: result.expiresAt
                    });

                    return result;
                  } catch (error) {
                    this.logger.error('Failed to create backup PAT', { error });
                    throw new Error(`Backup PAT creation failed: ${error.message}`);
                  }
                }

                /**
                 * Validate that a backup PAT token works against JIRA API.
                 */
                async validateBackupPAT(token: string): Promise<boolean> {
                  try {
                    this.logger.debug('Validating backup PAT token');

                    // Use existing MCP operation
                    const isValid = await this.mcpPat.validatePAT(token);

                    if (!isValid) {
                      this.logger.warn('Backup PAT validation failed');
                    }

                    return isValid;
                  } catch (error) {
                    this.logger.error('Error during backup PAT validation', { error });
                    return false;
                  }
                }

                /**
                 * Check if backup PAT is expiring soon (< daysThreshold).
                 */
                isBackupPATExpiring(
                  expiryDate: Date,
                  daysThreshold: number = this.BACKUP_PAT_EXPIRING_DAYS_THRESHOLD
                ): boolean {
                  const now = new Date();
                  const daysRemaining = Math.floor(
                    (expiryDate.getTime() - now.getTime()) / (24 * 60 * 60 * 1000)
                  );

                  return daysRemaining <= daysThreshold;
                }

                /**
                 * Switch to using backup PAT as the active token.
                 * Should only be called when primary PAT is about to expire.
                 */
                async useBackupPAT(config: JiraConfig): Promise<void> {
                  try {
                    if (!config.backupPat) {
                      throw new Error('No backup PAT available to use');
                    }

                    // Validate backup PAT works before switching
                    const isValid = await this.validateBackupPAT(config.backupPat);
                    if (!isValid) {
                      throw new Error('Backup PAT validation failed');
                    }

                    // Update config
                    config.useBackupPat = true;
                    process.env.JIRA_USE_BACKUP_PAT = 'true';

                    // Persist to secrets
                    await this.secrets.updateSecret('Ketchup_Token_Secrets', {
                      jira_use_backup_pat: 'true'
                    });

                    this.logger.warn('Switched to backup PAT', {
                      backupExpiresAt: config.backupPatExpiry
                    });
                  } catch (error) {
                    this.logger.error('Failed to switch to backup PAT', { error });
                    throw error;
                  }
                }

                /**
                 * Rotate backup PAT: create new, validate, update secrets.
                 * Keeps old backup for 24h before revoking for safety.
                 */
                async rotateBackupPAT(config: JiraConfig): Promise<void> {
                  try {
                    this.logger.info('Starting backup PAT rotation');

                    // Create new backup PAT
                    const newBackup = await this.createBackupPAT();

                    // Validate new token works
                    const isValid = await this.validateBackupPAT(newBackup.token);
                    if (!isValid) {
                      throw new Error('New backup PAT failed validation');
                    }

                    // Schedule old backup for revocation (24h from now)
                    if (config.backupPat) {
                      this.logger.info('Scheduling old backup PAT for revocation', {
                        revokeAt: new Date(Date.now() + 24 * 60 * 60 * 1000)
                      });
                      // TODO: Store revoke schedule in DynamoDB, implement cleanup job
                    }

                    this.logger.info('Backup PAT rotated successfully', {
                      newExpiresAt: newBackup.expiresAt
                    });
                  } catch (error) {
                    this.logger.error('Backup PAT rotation failed', { error });
                    throw error;
                  }
                }
              }

