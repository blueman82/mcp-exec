          // tests/unit/test_backup_pat/test_fallback_logic.test.ts
          import { describe, it, expect, beforeEach } from '@jest/globals';
          import { buildJiraAuthHeaders } from '../../../src/common/utils';
          import { JiraConfig } from '../../../src/common/config';
          import { Logger } from 'pino';

          describe('PAT fallback logic', () => {
            let config: JiraConfig;
            let mockLogger: Logger;

            beforeEach(() => {
              mockLogger = createMockLogger();
            });

            it('should use primary PAT when available and not expired', () => {
              config = {
                pat: 'primary-token',
                patExpiry: new Date(Date.now() + 30 * 24 * 60 * 60 * 1000), // 30 days
                usePat: true,
                useBackupPat: false,
                backupPat: 'backup-token',
                backupPatExpiry: new Date(Date.now() + 60 * 24 * 60 * 60 * 1000)
              };

              const headers = buildJiraAuthHeaders(config, mockLogger);

              expect(headers.Authorization).toBe('Bearer primary-token');
              expect(mockLogger.debug).not.toHaveBeenCalledWith(
                expect.stringContaining('fallback')
              );
            });

            it('should fall back to backup when primary is expired', () => {
              config = {
                pat: 'expired-token',
                patExpiry: new Date(Date.now() - 1 * 24 * 60 * 60 * 1000), // expired 1 day ago
                usePat: true,
                useBackupPat: false,
                backupPat: 'backup-token',
                backupPatExpiry: new Date(Date.now() + 60 * 24 * 60 * 60 * 1000)
              };

              const headers = buildJiraAuthHeaders(config, mockLogger);

              expect(headers.Authorization).toBe('Bearer backup-token');
              expect(mockLogger.warn).toHaveBeenCalledWith(
                expect.stringContaining('Falling back to backup PAT')
              );
            });

