          metrics_collector_service:
            description: "Full MetricsCollectorService implementation"
            complete_code: |
              # ketchup/ketchup_jira_pat_rotator/metrics_collector.py
              import asyncio
              from datetime import datetime, timedelta
              from typing import Optional
              from typedi import Service, Inject
              from logging import Logger
              import logging

              from .metrics_schema import (
                  MetricsStorage,
                  HealthMetrics,
                  BackupPATMetrics,
                  RotationStatus
              )
              from ..common.config import JiraConfig

              logger = logging.getLogger(__name__)

              @Service()
              class MetricsCollectorService:
                  """Collects and stores PAT health metrics on a schedule."""

                  COLLECTION_INTERVAL_SECONDS = 300  # 5 minutes
                  PRIMARY_PAT_CRITICAL_DAYS = 7
                  PRIMARY_PAT_WARNING_DAYS = 14

                  def __init__(
                      self,
                      storage: MetricsStorage,
                      config: JiraConfig
                  ):
                      """Initialize collector with dependencies."""
                      self.storage = storage
                      self.config = config
                      self.logger = logger

                  async def run(self) -> None:
                      """Main run loop - collect metrics every 5 minutes."""
                      self.logger.info("Starting metrics collector service")

                      while True:
                          try:
                              await self.collect_metrics()
                          except Exception as e:
                              self.logger.error(
                                  f"Error collecting metrics: {e}",
                                  exc_info=True
                              )
                          # Sleep before next collection
                          await asyncio.sleep(self.COLLECTION_INTERVAL_SECONDS)

                  async def collect_metrics(self) -> None:
                      """Collect and store all metrics."""
                      self.logger.debug("Collecting metrics")

                      try:
                          # Collect individual metric types
                          await self._collect_backup_pat_metrics()
                          await self._collect_health_metrics()

                          self.logger.debug("Metrics collected successfully")
                      except Exception as e:
                          self.logger.error(f"Failed to collect metrics: {e}")
                          raise

                  async def _collect_backup_pat_metrics(self) -> None:
                      """Collect backup PAT health metrics."""
                      metrics = BackupPATMetrics(
                          timestamp=datetime.utcnow(),
                          backup_pat_exists=self.config.backupPat is not None,
                          backup_pat_valid=self._is_pat_valid(self.config.backupPatExpiry),
                          days_until_expiry=self._calculate_days_until_expiry(
                              self.config.backupPatExpiry
                          ),
                          last_validated_at=datetime.utcnow()
                      )

                      self.storage.store_backup_metrics(metrics)
                      self.logger.debug(f"Backup PAT metrics stored: {metrics}")

                  async def _collect_health_metrics(self) -> None:
                      """Collect overall system health metrics."""
                      primary_days = self._calculate_days_until_expiry(
                          self.config.patExpiry
                      )
                      backup_days = self._calculate_days_until_expiry(
                          self.config.backupPatExpiry
                      )

                      health_status = self._calculate_health_status(
                          primary_days,
                          backup_days
                      )

                      # Get last successful rotation from DynamoDB
                      last_rotations = self.storage.get_recent_rotations(
                          limit=1,
                          status=RotationStatus.SUCCESS
                      )
                      last_successful = (
                          last_rotations[0].timestamp if last_rotations else None
                      )

                      metrics = HealthMetrics(
                          timestamp=datetime.utcnow(),
                          primary_pat_days_remaining=primary_days or 0,
                          backup_pat_days_remaining=backup_days,
                          last_successful_rotation=last_successful,
                          last_rotation_attempt=None,  # TODO: get from rotation service
                          consecutive_rotation_failures=0,  # TODO: calculate from metrics
                          system_health_status=health_status
                      )

                      self.storage.store_health_metrics(metrics)
                      self.logger.info(
                          f"Health metrics stored: status={health_status}",
                          extra={
                              'primary_days': primary_days,
                              'backup_days': backup_days
                          }
                      )

                  def _is_pat_valid(self, expiry_date: Optional[datetime]) -> bool:
                      """Check if PAT is still valid (not expired)."""
                      if not expiry_date:
                          return False
                      return expiry_date > datetime.utcnow()

                  def _calculate_days_until_expiry(
                      self,
                      expiry_date: Optional[datetime]
                  ) -> Optional[int]:
                      """Calculate days until PAT expires."""
                      if not expiry_date:
                          return None

                      days_remaining = (
                          expiry_date - datetime.utcnow()
                      ).days
                      return max(0, days_remaining)  # Return 0 if already expired

                  def _calculate_health_status(
                      self,
                      primary_days: Optional[int],
                      backup_days: Optional[int]
                  ) -> str:
                      """Calculate overall health status.

                      - "healthy": Primary PAT has >14 days
                      - "warning": Primary PAT has 7-14 days or no backup
                      - "critical": Primary PAT has <7 days or expired
                      """
                      if primary_days is None or primary_days < 0:
                          # Primary is missing or already expired
                          if backup_days and backup_days > 0:
                              return "warning"
                          return "critical"

                      if primary_days < self.PRIMARY_PAT_CRITICAL_DAYS:
                          return "critical"
                      elif primary_days < self.PRIMARY_PAT_WARNING_DAYS:
                          return "warning"
                      else:
                          return "healthy"

