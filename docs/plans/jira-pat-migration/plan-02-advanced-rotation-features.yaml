      - type: "AWS Secrets Manager API"
        link: "https://docs.aws.amazon.com/secretsmanager/"
        relevance: "For storing backup PAT"

      - type: "DynamoDB time-series best practices"
        link: "https://docs.aws.amazon.com/amazondynamodb/latest/developerguide/best-practices.html"
        relevance: "For metrics storage and querying"

      - type: "Slack Block Kit documentation"
        link: "https://api.slack.com/block-kit"
        relevance: "For building dashboard blocks (Phase 2 tasks 6-7)"

    validation_checklist:
      - item: "All unit tests pass"
        command: "npm test && pytest tests/unit/"
        checked: false

      - item: "Backup PAT configuration loads correctly"
        command: "npm test --testNamePattern=config"
        checked: false

      - item: "Backup PAT operations work (create, validate)"
        command: "npm test --testNamePattern=backup"
        checked: false

      - item: "Fallback logic is transparent (no caller changes)"
        command: "npm test --testNamePattern=fallback"
        checked: false

      - item: "Metrics collector runs without errors"
        command: "pytest tests/unit/test_metrics/"
        checked: false

      - item: "No sensitive data (PAT tokens) in metrics"
        command: "grep -r 'ketchup_jira_pat[^_]' ketchup/ketchup_jira_pat_rotator/ || echo 'OK'"
        checked: false

      - item: "DynamoDB table schema is created"
        command: "aws dynamodb describe-table --table-name ketchup_pat_metrics"
        checked: false

      - item: "Health file updates (from Phase 1) still working"
        command: "grep -l 'health_status' ketchup/ketchup_jira_pat_rotator/*.py"
        checked: false
