            description: "Updated buildJiraAuthHeaders with fallback logic"
            complete_code: |
              // ketchup/corp_jira_mcp/corp_jira_mcp/common/utils.ts

              /**
               * Build JIRA authentication headers with support for PAT fallback.
               *
               * Fallback logic:
               * 1. If useBackupPat flag is true and backup exists → use backup
               * 2. If primary PAT valid → use primary
               * 3. If primary expired but backup valid → automatic fallback to backup
               * 4. If neither available → throw error
               *
               * This function is transparent to callers - fallback handling is internal.
               */
              export function buildJiraAuthHeaders(
                config: JiraConfig,
                logger: Logger
              ): Record<string, string> {
                let authToken: string;
                let source: 'primary' | 'backup';

                // Determine which PAT to use with fallback logic
                if (config.useBackupPat && config.backupPat) {
                  // Explicitly using backup (config.useBackupPat = true)
                  authToken = config.backupPat;
                  source = 'backup';
                  logger.debug('Using backup PAT (explicitly enabled)');

                } else if (config.usePat && config.pat && isPATValid(config.patExpiry)) {
                  // Primary PAT still valid and usePat=true
                  authToken = config.pat;
                  source = 'primary';

                } else if (config.backupPat && isPATValid(config.backupPatExpiry)) {
                  // Primary expired or unavailable, but backup is valid
                  // Automatic fallback to backup
                  authToken = config.backupPat;
                  source = 'backup';

                  logger.warn('Falling back to backup PAT - primary is expired', {
                    primaryExpiryDate: config.patExpiry?.toISOString(),
                    backupExpiryDate: config.backupPatExpiry?.toISOString(),
                    daysUntilBackupExpiry: calculateDaysUntilExpiry(config.backupPatExpiry),
                    timestamp: new Date().toISOString()
                  });

                } else {
                  // Neither PAT is available
                  const issues: string[] = [];
                  if (!config.pat || !isPATValid(config.patExpiry)) {
                    issues.push('primary PAT missing or expired');
                  }
                  if (!config.backupPat || !isPATValid(config.backupPatExpiry)) {
                    issues.push('backup PAT missing or expired');
                  }

                  const errorMessage = `No valid PAT available: ${issues.join(', ')}`;
                  logger.error(errorMessage, {
                    primaryExpiryDate: config.patExpiry?.toISOString(),
                    backupExpiryDate: config.backupPatExpiry?.toISOString()
                  });

                  throw new Error(errorMessage);
                }

                // Build and return Authorization header
                return {
                  'Authorization': `Bearer ${authToken}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/json'
                };
              }

              /**
               * Check if a PAT is still valid (not expired).
               */
              function isPATValid(expiryDate?: Date): boolean {
                if (!expiryDate) return false;
                const now = new Date();
                return expiryDate > now;
              }

              /**
               * Calculate days remaining until PAT expiry.
               * Returns null if no expiry date provided.
               */
              function calculateDaysUntilExpiry(expiryDate?: Date): number | null {
                if (!expiryDate) return null;

                const now = new Date();
                const expiryTime = expiryDate.getTime();
                const nowTime = now.getTime();
                const daysMs = expiryTime - nowTime;
                const days = Math.floor(daysMs / (24 * 60 * 60 * 1000));

                return days;
              }

