          metrics_schema:
            description: "Full metrics schema with DynamoDB storage"
            complete_code: |
              # ketchup/ketchup_jira_pat_rotator/metrics_schema.py
              from dataclasses import dataclass, asdict, field
              from datetime import datetime, timedelta
              from typing import Optional, List
              from enum import Enum
              import json
              from abc import ABC, abstractmethod

              class RotationStatus(str, Enum):
                  """Status of a PAT rotation operation."""
                  SUCCESS = "success"
                  FAILURE = "failure"
                  IN_PROGRESS = "in_progress"

              @dataclass
              class RotationMetrics:
                  """Metrics for a single PAT rotation event.

                  Stored in DynamoDB with:
                  - pk: ROT#{rotation_id}
                  - sk: {timestamp}
                  """
                  timestamp: datetime
                  rotation_id: str
                  status: RotationStatus
                  duration_seconds: float
                  old_pat_hash: str  # Hash of old PAT (don't store full token)
                  new_pat_hash: str  # Hash of new PAT
                  error_message: Optional[str] = None
                  retry_count: int = 0
                  rotation_type: str = "primary"  # or "backup"

              @dataclass
              class BackupPATMetrics:
                  """Metrics for backup PAT health and status.

                  Stored in DynamoDB with:
                  - pk: BACKUP#METRICS
                  - sk: {timestamp}
                  """
                  timestamp: datetime
                  backup_pat_exists: bool
                  backup_pat_valid: bool
                  days_until_expiry: Optional[int]
                  last_validated_at: Optional[datetime] = None
                  last_validation_error: Optional[str] = None
                  rotation_scheduled_at: Optional[datetime] = None

              @dataclass
              class HealthMetrics:
                  """Overall PAT system health metrics.

                  Stored in DynamoDB with:
                  - pk: HEALTH#METRICS
                  - sk: {timestamp}
                  """
                  timestamp: datetime
                  primary_pat_days_remaining: int
                  backup_pat_days_remaining: Optional[int]
                  last_successful_rotation: Optional[datetime]
                  last_rotation_attempt: Optional[datetime]
                  consecutive_rotation_failures: int
                  system_health_status: str  # "healthy", "warning", "critical"
                  last_alert_sent_at: Optional[datetime] = None

              class MetricsStorage(ABC):
                  """Abstract base for metrics storage implementations."""

                  @abstractmethod
                  def store_rotation_metrics(self, metrics: RotationMetrics) -> None:
                      """Store rotation metrics to backend."""
                      pass

                  @abstractmethod
                  def store_backup_metrics(self, metrics: BackupPATMetrics) -> None:
                      """Store backup PAT metrics to backend."""
                      pass

                  @abstractmethod
                  def store_health_metrics(self, metrics: HealthMetrics) -> None:
                      """Store overall health metrics to backend."""
                      pass

                  @abstractmethod
                  def get_recent_rotations(
                      self,
                      limit: int = 10,
                      status: Optional[RotationStatus] = None
                  ) -> List[RotationMetrics]:
                      """Get recent rotation metrics."""
                      pass

                  @abstractmethod
                  def get_health_metrics(self, hours: int = 24) -> List[HealthMetrics]:
                      """Get health metrics from last N hours."""
                      pass

              class DynamoDBMetricsStorage(MetricsStorage):
                  """DynamoDB implementation of metrics storage."""

                  TABLE_NAME = "ketchup_pat_metrics"
                  TTL_DAYS = 30

                  def __init__(self, dynamodb_client):
                      """Initialize with DynamoDB client."""
                      self.dynamodb = dynamodb_client
                      self.table = dynamodb_client.Table(self.TABLE_NAME)

                  def store_rotation_metrics(self, metrics: RotationMetrics) -> None:
                      """Store rotation metrics with TTL."""
                      # Calculate TTL (30 days from now)
                      ttl = int((datetime.utcnow() + timedelta(days=self.TTL_DAYS)).timestamp())

                      item = {
                          'pk': f'ROT#{metrics.rotation_id}',
                          'sk': metrics.timestamp.isoformat(),
                          'status': metrics.status.value,
                          'duration_seconds': metrics.duration_seconds,
                          'old_pat_hash': metrics.old_pat_hash,
                          'new_pat_hash': metrics.new_pat_hash,
                          'error_message': metrics.error_message,
                          'retry_count': metrics.retry_count,
                          'rotation_type': metrics.rotation_type,
                          'timestamp': int(metrics.timestamp.timestamp()),
                          'ttl': ttl,  # DynamoDB will auto-delete after this
                          'gsi1pk': f'STATUS#{metrics.status.value}',
                          'gsi1sk': metrics.timestamp.isoformat()
                      }

                      self.table.put_item(Item=item)

              # Usage example:
              if __name__ == '__main__':
                  import boto3

                  dynamodb = boto3.resource('dynamodb')
                  storage = DynamoDBMetricsStorage(dynamodb)

                  # Store rotation metrics
                  metrics = RotationMetrics(
                      timestamp=datetime.utcnow(),
                      rotation_id='rot-001',
                      status=RotationStatus.SUCCESS,
                      duration_seconds=8.3,
                      old_pat_hash='hash-abc123',
                      new_pat_hash='hash-xyz789'
                  )
                  storage.store_rotation_metrics(metrics)

