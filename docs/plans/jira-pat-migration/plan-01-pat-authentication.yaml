        critical_patterns:
          - pattern: "24-hour scheduler with health updates"
            complete_code: |
              # ketchup/ketchup_jira_pat_rotator/scheduler.py
              import asyncio
              import signal
              from datetime import datetime

              class PAT RotationScheduler:
                  def __init__(self):
                      self.running = True
                      self.health_file = Path('/tmp/jira_pat_rotator_health')
                      self.last_run_file = Path('/tmp/jira_pat_rotator_last_run')

                  async def start(self):
                      """Start scheduler with graceful shutdown handling"""
                      # Handle signals
                      signal.signal(signal.SIGTERM, self._handle_shutdown)
                      signal.signal(signal.SIGINT, self._handle_shutdown)

                      # Run immediately
                      await self.run_rotation_check()

                      # Main loop: every 24 hours
                      while self.running:
                          # Wait 24 hours (1440 minutes), updating health every minute
                          for i in range(1440):
                              if not self.running:
                                  break
                              self._update_health_status('idle')
                              await asyncio.sleep(60)

                          if self.running:
                              await self.run_rotation_check()

                  def _update_health_status(self, status: str):
                      """Write health status for Docker healthcheck"""
                      timestamp = int(time.time())
                      self.health_file.write_text(f"{timestamp}:{status}")

                  async def run_rotation_check(self):
                      """Run PAT rotation check"""
                      try:
                          self._update_health_status('running')
                          # Initialize services and call rotator
                          result = await self.rotator.check_and_rotate()
                          self._update_health_status('idle')
                          self._update_last_run()
                      except Exception as e:
                          logger.error(f"Rotation check failed: {e}", exc_info=True)
                          self._update_health_status('error')

                  def _handle_shutdown(self, signum, frame):
                      logger.info(f"Received signal {signum}, shutting down gracefully")
                      self.running = False
                      self._update_health_status('stopped')
      verification:
        success_criteria:
          - "Tests pass"
          - "Service runs correctly in Docker"
          - "Health file updates as expected"
