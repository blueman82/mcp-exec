  common_pitfalls_reference:
    typescript_pitfalls:
      - pitfall: "Mixing async/await patterns with callbacks"
        error_example: |
          // WRONG - mixing patterns
          async function jiraRequest() {
            fetch(url).then(res => res.json()); // Returns promise but not awaited
          }

          // RIGHT - consistent async/await
          async function jiraRequest() {
            const res = await fetch(url);
            return res.json();
          }
        why: "Inconsistent async handling causes race conditions and silent failures"
        detection: ".then() mixed with async/await in same function"
        fix: "Use consistent async/await pattern throughout"
      - pitfall: "Not handling Bearer token prefix correctly"
        error_example: |
          // WRONG - assumes token already has Bearer prefix
          headers['Authorization'] = config.pat; // Should be 'Bearer <token>'

          // RIGHT - explicit Bearer prefix
          headers['Authorization'] = `Bearer ${config.pat}`;
        why: "JIRA API requires Bearer prefix, missing it causes 401 errors"
        detection: "401 Unauthorized errors when using PAT"
        fix: "Always use 'Bearer ' prefix before token in header"
    python_pitfalls:
      - pitfall: "Not awaiting async database operations"
        error_example: |
          # WRONG
          async def check_expiry():
            lock = distributed_lock.acquire_lock(...)  # Missing await

          # RIGHT
          async def check_expiry():
            async with distributed_lock.acquire_lock(...) as acquired:
              if acquired:
                # Perform rotation
        why: "Coroutines not awaited never execute, leading to resource leaks"
        detection: "RuntimeWarning about unawaited coroutine"
        fix: "Always use await for async functions"
      - pitfall: "Secrets Manager exceptions not caught properly"
        error_example: |
          # WRONG - assumes get_secret never fails
          pat = await secrets_manager.get_secret('ketchup_jira_pat')

          # RIGHT - handle secrets exceptions
          try:
            pat = await secrets_manager.get_secret('ketchup_jira_pat')
          except Exception as e:
            logger.error(f"Failed to retrieve PAT: {e}")
            # Alert ops, don't proceed with rotation
        why: "Secrets Manager can fail; unhandled errors crash service"
        detection: "Unhandled exceptions in logs"
        fix: "Wrap secrets access in try-except, log and alert"
      - pitfall: "Forgetting to close MCP client connection"
        error_example: |
          # WRONG
          mcp_client = await MCPClient()
          result = await mcp_client.createPAT()
          # Client connection left open

          # RIGHT - use context manager
          async with MCPClient() as mcp_client:
            result = await mcp_client.createPAT()
          # Connection properly closed
        why: "Unclosed connections exhaust resources"
        detection: "Resource warnings, connection pool exhaustion"
        fix: "Use async context managers for clients"
