plan:
  metadata:
    feature_name: "JIRA PAT Migration with Automated Rotation"
    created: "2025-11-19"
    target: "Migrate Ketchup from Basic Auth (deprecating Nov 30) to PAT-based authentication with long-term automated rotation"
    estimated_tasks: 18
    phase: "Phase 1: PAT Authentication Migration"
    phase_deadline: "2025-11-30"
  context:
    framework: "TypeScript (MCP), Python (rotation service)"
    architecture: "MCP-based microservice architecture with scheduled Python rotation service"
    test_framework: "Jest (TypeScript), pytest (Python)"
    key_patterns:
      - "TypedDI dependency injection (Python rotation service)"
      - "Distributed locking (DynamoDB via existing patterns)"
      - "Scheduler pattern (see ketchup_status_updater, ketchup_maintenance_fetcher)"
      - "Feature flags for safe rollout"
      - "TDD approach for all new code"
    expectations:
      - "Write tests BEFORE implementation (RED/GREEN/REFACTOR)"
      - "Follow existing service patterns (single-purpose containers with health checks)"
      - "Maintain feature flag OFF by default for safety"
      - "Commit frequently after each completed task"
      - "Use worktree per group for parallel development"
  worktree_groups:
    - group_id: "chain-1"
      description: "MCP JIRA Service - PAT authentication foundation (core changes)"
      tasks: [1, 2, 3, 4]
      branch: "feature/jira-pat-migration/chain-1"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "These tasks form core authentication refactoring that must execute in order"
      setup_commands: |
        # Create worktree for MCP PAT authentication
        git worktree add ../wt-chain-1 -b feature/jira-pat-migration/chain-1
        cd ../wt-chain-1

        # Task 1: Update env-aws.ts
        # Implement and test
        git add .
        git commit -m "feat: add PAT mappings to env-aws.ts"

        # Task 2: Update config.ts
        # Implement and test
        git add .
        git commit -m "feat: add PAT configuration support to config.ts"

        # Task 3: Create buildJiraAuthHeaders utility
        # Implement and test
        git add .
        git commit -m "feat: create buildJiraAuthHeaders utility function"

        # Task 4: Update jiraRequest to use feature flag
        # Implement and test
        git add .
        git commit -m "feat: integrate feature flag in jiraRequest for PAT support"

        # Merge to main
        git checkout main
        git merge feature/jira-pat-migration/chain-1
        git push origin main
    - group_id: "chain-2"
      description: "MCP JIRA Service - Add PAT operations (createPAT, revokePAT, etc.)"
      tasks: [5, 6, 7, 8]
      branch: "feature/jira-pat-migration/chain-2"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "These tasks add new MCP operations needed for rotation service"
      depends_on: ["chain-1"]
      setup_commands: |
        # Wait for chain-1 to merge, then create chain-2
        git worktree add ../wt-chain-2 -b feature/jira-pat-migration/chain-2
        cd ../wt-chain-2

        # Tasks 5-8: Create MCP operations
        # Implement each operation with tests

        git checkout main
        git merge feature/jira-pat-migration/chain-2
        git push origin main
    - group_id: "independent-3"
      description: "Docker Compose Configuration - Add PAT feature flag and rotation service stubs"
      tasks: [9, 10]
      branch: "feature/jira-pat-migration/independent-3"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Configuration changes independent of implementation tasks"
      setup_commands: |
        # Can work in parallel with chain-1 and chain-2
        git worktree add ../wt-independent-3 -b feature/jira-pat-migration/independent-3
        cd ../wt-independent-3

        # Task 9: Add JIRA_USE_PAT_AUTH flag
        # Task 10: Add jira-pat-rotator stubs

        git add .
        git commit -m "feat: add PAT feature flag and rotation service configuration"

        git checkout main
        git merge feature/jira-pat-migration/independent-3
        git push origin main
    - group_id: "chain-4"
      description: "Python rotation service - Scheduler, monitor, and orchestration"
      tasks: [11, 12, 13, 14]
      branch: "feature/jira-pat-migration/chain-4"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Rotation service components build on each other"
      depends_on: ["chain-2", "independent-3"]
      setup_commands: |
        # Wait for chain-2 and independent-3 to merge
        git worktree add ../wt-chain-4 -b feature/jira-pat-migration/chain-4
        cd ../wt-chain-4

        # Tasks 11-14: Build rotation service
        # Each task implements core service component

        git checkout main
        git merge feature/jira-pat-migration/chain-4
        git push origin main
    - group_id: "independent-5"
      description: "Testing, Health Checks, Documentation"
      tasks: [15, 16, 17, 18]
      branch: "feature/jira-pat-migration/independent-5"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Can run in parallel after core implementation complete"
      depends_on: ["chain-4"]
      setup_commands: |
        # Wait for chain-4 to complete
        git worktree add ../wt-independent-5 -b feature/jira-pat-migration/independent-5
        cd ../wt-independent-5

