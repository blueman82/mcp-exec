              from datetime import datetime, timezone

              async def check_expiry(self) -> bool:
                  """Check if PAT rotation is needed (< 75 days until expiry)"""
                  try:
                      expiry_str = await self.secrets_mgr.get_secret('JIRA_PAT_EXPIRY')
                      expiry_date = datetime.fromisoformat(expiry_str.replace('Z', '+00:00'))
                      now = datetime.now(timezone.utc)
                      days_remaining = (expiry_date - now).days

                      logger.info(f"PAT expires in {days_remaining} days")
                      return days_remaining <= 75  # Trigger rotation at 75 days
                  except Exception as e:
                      logger.error(f"Failed to check PAT expiry: {e}")
                      return False  # Don't rotate on errors
      verification:
