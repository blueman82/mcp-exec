      depends_on: [12]
      estimated_time: "45m"
      description: |
        Rotation orchestrator that coordinates the full flow:
        1. Check expiry (monitor)
        2. Create new PAT (call MCP)
        3. Validate new PAT works (call MCP)
        4. Update secrets (AWS Secrets Manager)
        5. Revoke old PAT (call MCP)
        6. Alert on Slack (success/failure)
      test_first:
        test_file: "tests/unit/test_jira_pat_rotator/test_rotator.py"
        structure:
          - "test: complete successful rotation flow"
          - "test: validation failure keeps old PAT"
          - "test: secrets update failure keeps old PAT"
          - "test: revocation failure still alerts ops"
          - "test: distributed lock prevents concurrent rotations"
        assertions:
          - "New PAT created and validated"
          - "Old PAT preserved if new one fails"
          - "Slack alerts sent correctly"
      implementation:
        approach: |
          Implement safe rotation sequence:
          1. Check expiry needed (return if not)
          2. Acquire distributed lock (DynamoDB)
          3. Create new PAT via MCP
          4. Validate new PAT works
          5. Update secrets with new PAT + expiry
          6. Revoke old PAT
          7. Send success alert
        critical_patterns:
          - pattern: "Safe rotation sequence with fallback"
            complete_code: |
              async def perform_rotation(self) -> bool:
                  """Safely rotate PAT with fallback protection"""
                  async with self.distributed_lock.acquire_lock(
                      'PAT_ROTATION_GLOBAL',
                      timeout_seconds=300
                  ) as lock_acquired:
                      if not lock_acquired:
                          logger.info("Another server rotating PAT, exiting")
                          return False

                      try:
                          # 1. Check if rotation needed
                          if not await self.monitor.check_expiry():
                              logger.info("PAT not expiring soon, skipping rotation")
                              return True

                          # 2. Create new PAT
                          logger.info("Creating new PAT...")
                          new_pat_result = await self.mcp_client.createPAT()
                          new_pat = new_pat_result['token']
                          new_expiry = new_pat_result['expiry']

                          # 3. Validate new PAT
                          logger.info("Validating new PAT...")
                          is_valid = await self.mcp_client.validatePAT(new_pat)
                          if not is_valid:
                              raise RuntimeError("New PAT validation failed")

                          # 4. Update secrets
                          logger.info("Updating AWS Secrets...")
                          await self.secrets_mgr.update_secret('JIRA_PAT', new_pat)
                          await self.secrets_mgr.update_secret('JIRA_PAT_EXPIRY', new_expiry)

                          # 5. Revoke old PAT
                          logger.info("Revoking old PAT...")
                          old_pat_id = await self.secrets_mgr.get_secret('JIRA_PAT_ID')
                          await self.mcp_client.revokePAT(old_pat_id)

                          # 6. Send success alert
                          await self.slack_client.send_message(
                              channel='C0957H8ASH2',
                              text="✅ JIRA PAT rotation successful"
                          )

                          return True

                      except Exception as e:
                          logger.error(f"PAT rotation failed at step: {e}", exc_info=True)

                          # Alert ops but keep old PAT
                          await self.slack_client.send_message(
                              channel='C0957H8ASH2',
                              text=f"❌ PAT rotation failed: {str(e)}\n Old PAT still active."
                          )

                          return False
      verification:
        success_criteria:
          - "All test cases pass"
          - "Each step can fail independently without affecting old PAT"
          - "Distributed locking prevents concurrent rotations"
      commit:
        type: "feat"
        message: "create rotator.py orchestrator for safe PAT rotation with fallback"
