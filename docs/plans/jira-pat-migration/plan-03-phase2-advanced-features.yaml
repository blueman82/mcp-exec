        approach: |
          Create training materials at different levels:
          1. Executive summary: Why it matters, high-level overview
          2. Operator level: How to monitor, respond to alerts, manual procedures
          3. Engineer level: Architecture, code references, deep dives
          Include diagrams, examples, and links to runbooks.
          Provide training checklist to verify team readiness.

        code_structure: |
          # docs/training/pat-rotation-overview.md

          # PAT Rotation Training Overview

          ## Table of Contents
          1. Executive Summary
          2. What is PAT Rotation?
          3. Why Do We Need It?
          4. How Does It Work?
          5. Your Role
          6. Monitoring and Alerts
          7. Common Scenarios
          8. Getting Help

          ## 1. Executive Summary
          - JIRA Basic Auth deprecated Nov 30, 2025
          - We use PAT (Personal Access Token) instead
          - PAT automatically rotates every 75 days
          - Team monitors dashboard and responds to alerts

          ## 2. What is PAT Rotation?
          ...

          ## 3. Why Do We Need It?
          - Compliance: JIRA requires PAT by Nov 30
          - Security: PATs are more secure than basic auth
          - Automation: Reduces manual work and errors
          - Reliability: Backup PAT ensures continuity

          ## 4. How Does It Work?
          [Include diagram here]
          1. Every 75 days: Create new PAT via MCP
          2. Validate it works against JIRA API
          3. Gradually migrate services to new PAT
          4. Revoke old PAT
          5. Repeat

          ## 5. Your Role
          ### Ops Team
          - Monitor #pat-dashboard for health status
          - Respond to alerts per runbook
          - Execute manual procedures if needed

          ### Platform Team
          - Investigate rotation failures
          - Resolve JIRA API issues
          - Update configuration as needed

          ### On-Call Engineer
          - Be available for critical alerts
          - Escalate if rotation service fails
          - Execute emergency procedures

          ## 6. Monitoring and Alerts
          ### Dashboard (#pat-dashboard)
          - Shows current PAT status
          - Updates every 5 minutes
          - Green/Orange/Red status indicators

          ### Alert Types
          - **Warning** (Primary PAT 7-14 days): Rotation in progress
          - **Critical** (Primary PAT <7 days): Immediate action needed
          - **Failure** (Rotation failed): Check logs and retry

          ### Responses
          | Alert | Response |
          |-------|----------|
          | Warning | Monitor dashboard, rotation should complete |
          | Critical | Check dashboard, may need manual rotation |
          | Failure | Check logs, contact platform team |

          ## 7. Common Scenarios
          ### Scenario 1: Normal Rotation Completes
          - Dashboard shows progress over ~5 minutes
          - Alert status goes from "in_progress" to "success"
          - Team sees no alert, continues normal operations

          ### Scenario 2: PAT About to Expire
          - Dashboard shows "⚠️ Warning: 5 days remaining"
          - Rotation is scheduled, no manual action needed
          - Verify rotation completes within 24 hours

          ### Scenario 3: PAT Expired, Backup Available
          - Dashboard shows "❌ Critical: PAT expired"
          - System auto-fallback to backup PAT
          - Rotation service creates new backup
          - Verify backup creation succeeds

          ### Scenario 4: PAT Expired, No Backup
          - Dashboard shows "❌ Critical: No backup PAT"
          - IMMEDIATE: Contact platform team
          - Follow manual rotation procedure
          - Create backup PAT for future

          ## 8. Getting Help
          - Ops runbook: docs/operations/jira-pat-rotation-runbook.md
          - Troubleshooting: docs/operations/troubleshooting-guide.md
          - Team contacts: #team-ketchup Slack channel
          - Escalation: Platform team on-call

