        example_skeleton: |
          # docs/training/pat-rotation-overview.md
          # JIRA PAT Rotation: Team Training Overview

          ## Why PAT Rotation?
          - JIRA is deprecating Basic Auth on Nov 30, 2025
          - We must use PAT (Personal Access Token) instead
          - PAT expires every 90 days, so rotation is necessary
          - Automation prevents manual work and human error

          ## How It Works
          1. MCP service creates new PAT via JIRA API
          2. Rotation service validates new PAT works
          3. Old PAT is revoked, new PAT becomes active
          4. Process repeats every 75 days (15-day safety buffer)

          ## Monitoring
          - **Dashboard**: #pat-dashboard (updates every 5 minutes)
          - **Alerts**: #ketchup-alerts (when action needed)
          - **Health Statuses**:
            - ✓ Green: All good, PAT valid >14 days
            - ⚠️ Orange: PAT expiring 7-14 days, rotation in progress
            - ❌ Red: PAT expired or failed, needs immediate action

          ## What You Need to Know
          - Who to alert (on-call engineer, platform team)
          - When to manually intervene (see troubleshooting guide)
          - How to verify rotation succeeded
          - Emergency contacts if system fails

