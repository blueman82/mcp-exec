              # ketchup/ketchup_jira_pat_rotator/slack_dashboard.py
              import asyncio
              from datetime import datetime
              from typing import Optional
              from typedi import Service, Inject
              import logging

              from .metrics_schema import MetricsStorage
              from .slack_formatter import MetricsFormatter
              from ..common.slack_client import SlackClient

              logger = logging.getLogger(__name__)

              @Service()
              class SlackDashboardService:
                  """Posts PAT metrics dashboard to Slack periodically."""

                  DASHBOARD_CHANNEL = "#pat-dashboard"
                  ALERTS_CHANNEL = "#ketchup-alerts"
                  UPDATE_INTERVAL_SECONDS = 300  # 5 minutes

                  def __init__(
                      self,
                      slack_client: SlackClient,
                      metrics_storage: MetricsStorage
                  ):
                      """Initialize dashboard service."""
                      self.slack_client = slack_client
                      self.metrics_storage = metrics_storage
                      self.logger = logger
                      self.formatter = MetricsFormatter()

                  async def run(self) -> None:
                      """Main run loop - update dashboard every 5 minutes."""
                      self.logger.info("Starting Slack dashboard service")

                      while True:
                          try:
                              await self.update_dashboard()
                          except Exception as e:
                              self.logger.error(
                                  f"Error updating Slack dashboard: {e}",
                                  exc_info=True
                              )
                          # Wait before next update
                          await asyncio.sleep(self.UPDATE_INTERVAL_SECONDS)

                  async def update_dashboard(self) -> None:
                      """Fetch metrics and post dashboard to Slack."""
                      self.logger.debug("Updating Slack dashboard")

                      try:
                          # Get latest health metrics (last 1 hour for trend)
                          health_metrics = self.metrics_storage.get_health_metrics(
                              hours=1
                          )

                          if not health_metrics:
                              self.logger.warn("No health metrics available for dashboard")
                              return

                          # Get most recent metrics
                          latest_metrics = health_metrics[0]

                          # Build dashboard blocks
                          blocks = self._build_dashboard_blocks(latest_metrics)

                          # Post to dashboard channel
                          await self.slack_client.post_message(
                              channel=self.DASHBOARD_CHANNEL,
                              blocks=blocks,
                              text="PAT Health Dashboard"
                          )

                          self.logger.debug("Dashboard posted successfully")

                          # If critical, also alert
                          if latest_metrics.system_health_status == "critical":
                              await self._send_critical_alert(latest_metrics)

                      except Exception as e:
                          self.logger.error(f"Failed to update dashboard: {e}")
                          raise

                  def _build_dashboard_blocks(self, metrics) -> list:
                      """Build Slack block structure for dashboard."""
                      blocks = [
                          {
                              "type": "header",
                              "text": {
                                  "type": "plain_text",
                                  "text": "🔐 JIRA PAT Health Dashboard"
                              }
                          },
                          self.formatter.format_health_metrics(metrics),
                          {
                              "type": "context",
                              "elements": [
                                  {
                                      "type": "mrkdwn",
                                      "text": f"Updated: {metrics.timestamp.strftime('%Y-%m-%d %H:%M:%S UTC')}"
                                  }
                              ]
                          }
                      ]
                      return blocks

                  async def _send_critical_alert(self, metrics) -> None:
                      """Send critical alert to #ketchup-alerts."""
                      alert_block = {
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": (
                                  f"🚨 *CRITICAL PAT ALERT*\n"
                                  f"Primary PAT: *EXPIRED*\n"
                                  f"Backup PAT: {'Available' if metrics.backup_pat_days_remaining else 'Not available'}\n"
                                  f"Action Required: Immediately rotate PAT tokens"
                              )
                          }
                      }

                      try:
                          await self.slack_client.post_message(
                              channel=self.ALERTS_CHANNEL,
                              blocks=[alert_block],
                              text="CRITICAL: PAT Expired"
                          )
                          self.logger.warn("Critical alert sent to #ketchup-alerts")
                      except Exception as e:
                          self.logger.error(f"Failed to send critical alert: {e}")

