              # ketchup/ketchup_jira_pat_rotator/slack_formatter.py
              from datetime import datetime
              from typing import Optional

              from .metrics_schema import HealthMetrics, BackupPATMetrics

              class MetricsFormatter:
                  """Format PAT metrics for Slack dashboard display."""

                  # Slack message block colors
                  COLOR_HEALTHY = "#36a64f"   # Green
                  COLOR_WARNING = "#ffa500"   # Orange
                  COLOR_CRITICAL = "#ff0000"  # Red

                  @staticmethod
                  def format_health_metrics(metrics: HealthMetrics) -> dict:
                      """Format health metrics as Slack message block.

                      Returns Slack block dict ready to post.
                      """
                      # Determine color based on health status
                      color_map = {
                          'healthy': MetricsFormatter.COLOR_HEALTHY,
                          'warning': MetricsFormatter.COLOR_WARNING,
                          'critical': MetricsFormatter.COLOR_CRITICAL
                      }
                      color = color_map.get(metrics.system_health_status, '#808080')

                      # Format status emoji
                      status_emoji = {
                          'healthy': '✓',
                          'warning': '⚠️',
                          'critical': '❌'
                      }.get(metrics.system_health_status, '?')

                      # Format primary PAT status
                      if metrics.primary_pat_days_remaining > 0:
                          primary_status = (
                              f"{status_emoji} Primary PAT: "
                              f"{metrics.primary_pat_days_remaining} days remaining"
                          )
                      else:
                          primary_status = (
                              f"❌ Primary PAT: *EXPIRED* "
                              f"({abs(metrics.primary_pat_days_remaining)} days overdue)"
                          )

                      # Format backup PAT status
                      if metrics.backup_pat_days_remaining:
                          backup_status = (
                              f"✓ Backup PAT: {metrics.backup_pat_days_remaining} days "
                              f"remaining"
                          )
                      else:
                          backup_status = "⚠️ No backup PAT configured"

                      # Build Slack block
                      block = {
                          "type": "section",
                          "text": {
                              "type": "mrkdwn",
                              "text": (
                                  f"*PAT Health Status* ({metrics.timestamp.strftime('%H:%M UTC')})\n"
                                  f"{primary_status}\n"
                                  f"{backup_status}\n"
                                  f"Health: *{metrics.system_health_status.upper()}*"
                              )
                          }
                      }

                      # Add color context (works with message wrapper)
                      block['_color'] = color

                      return block

                  @staticmethod
                  def format_backup_pat_status(metrics: BackupPATMetrics) -> str:
                      """Format backup PAT status as readable text."""
                      if not metrics.backup_pat_exists:
                          return "⚠️ No backup PAT - please create one"

                      if not metrics.backup_pat_valid:
                          return "❌ Backup PAT validation failed"

                      if metrics.days_until_expiry is None:
                          return "❓ Backup PAT expiry unknown"

                      if metrics.days_until_expiry > 14:
                          return f"✓ Backup PAT healthy ({metrics.days_until_expiry} days)"
                      elif metrics.days_until_expiry > 0:
                          return (
                              f"⚠️ Backup PAT expiring soon "
                              f"({metrics.days_until_expiry} days)"
                          )
                      else:
                          return "❌ Backup PAT expired"

