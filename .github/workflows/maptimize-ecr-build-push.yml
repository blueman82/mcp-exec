name: "Maptimize: Build and Push to ECR"

on:
  push:
    branches:
      - main
    paths:
      - "projects/maptimize/**"
      - ".github/workflows/maptimize-ecr-build-push.yml"

permissions:
  id-token: write
  contents: read

defaults:
  run:
    working-directory: projects/maptimize

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: projects/maptimize/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --cov=src/maptimize

      - name: Type check
        run: mypy src/

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::483013340174:role/github-actions-maptimize
          aws-region: eu-west-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "483013340174"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: projects/maptimize
          file: projects/maptimize/infrastructure/Dockerfile
          push: true
          tags: |
            483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize:latest
            483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
