        ## IMPLEMENTATION REQUIREMENTS
        Create the VS Code extension package.json with proper contributes, activation events,
        and configuration schema. Sets up TypeScript compilation and webpack bundling.

        ## KEY DECISIONS
        - Extension ID: `meta-mcp-configurator`
        - Activation: `onView:meta-mcp-view` (lazy, only when panel opened)
        - View container: Activity bar icon
        - No external dependencies except @types/vscode
      test_first:
        rationale: "Schema validation ensures manifest correctness before any code"
        tests:
          - name: "package.json has required fields"
            approach: "JSON schema validation"
          - name: "contributes defines viewsContainers and views"
            approach: "Property existence check"
          - name: "activation event is onView"
            approach: "String match"
      success_criteria:
        - "package.json has name, version, engines, main, activationEvents"
        - "contributes.viewsContainers defines activity bar container"
        - "contributes.views defines webview view"
        - "contributes.configuration defines settings schema"
        - "tsconfig.json targets ES2020 with module commonjs (VS Code extension standard)"
        - "webpack.config.js bundles to dist/extension.js"
      test_commands:
        - "cd extension && npm install"
        - "cd extension && npx tsc --noEmit"
        - "node -e \"const p = require('./extension/package.json'); console.assert(p.activationEvents.includes('onView:meta-mcp-view'))\""
      implementation:
        approach: |
          Create minimal VS Code extension scaffolding following EasyMCP patterns.
          Key difference: no Docker/container runtime settings, simpler config.
        key_points:
          - point: "Activity bar view container"
            details: "Single icon in activity bar, opens webview panel"
            reference: "EasyMCP package.json contributes.viewsContainers"
          - point: "Lazy activation"
            details: "Only activate when view is opened to minimize startup impact"
          - point: "Settings schema"
            details: "backendsConfigPath setting for custom backends.json location"
      verification:
        pre_implementation:
          - "No existing extension/ directory in meta-mcp-server"
        post_implementation:
          - "npm install succeeds"
          - "tsc --noEmit passes"
