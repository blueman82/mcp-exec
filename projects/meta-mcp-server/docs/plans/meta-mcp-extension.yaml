# ═══════════════════════════════════════════════════════════════════════════
# META-MCP CONFIGURATOR VS CODE EXTENSION
# ═══════════════════════════════════════════════════════════════════════════
# A VS Code/Cursor extension for visually configuring meta-mcp-server backends
# WITHOUT requiring Docker - supports node, npx, uvx transports only
# ═══════════════════════════════════════════════════════════════════════════
# DATA FLOW REGISTRY
# ═══════════════════════════════════════════════════════════════════════════
# PRODUCERS:
#   Task 1 → package.json (extension manifest, contributes)
#   Task 2 → extension.ts (activate, deactivate exports)
#   Task 3 → environment.ts (detectEnvironment, getConfigPaths)
#   Task 4 → BackendsConfigManager (read/write backends.json)
#   Task 5 → AIToolConfigurator (detect tools, generate snippets, optional auto-config)
#   Task 6 → WebviewViewProvider (resolveWebviewView, postMessage)
#   Task 7 → webviewTemplate.ts (getWebviewHtml)
#   Task 8 → MessageHandler (handleMessage dispatch)
#   Task 9 → ServerList component (render, toggle, delete)
#   Task 10 → AddServerForm component (form, validation, submit)
#   Task 11 → ServerCatalog component (browse curated servers)
#   Task 12 → SetupWizard component (detect tools, copy snippets, auto-config)
# CONSUMERS:
#   Task 2 → [1, 6] (imports provider, reads contributes)
#   Task 6 → [3, 4, 7, 8] (uses env, config, template, handler)
#   Task 8 → [4, 5, 9, 10, 11, 12] (dispatches to all features)
#   Task 12 → [5, 7] (uses AIToolConfigurator, template)
#   Task 13 → [1-12] (integration wiring)
# VALIDATION: All consumers depend_on their producers ✓
# ═══════════════════════════════════════════════════════════════════════════
# SUCCESS CRITERIA CLASSIFICATION
# ═══════════════════════════════════════════════════════════════════════════
# All component tasks have CAPABILITY-only criteria ✓
# Integration criteria isolated to Task 12 ✓
# Criteria are BEHAVIORAL not implementation-specific ✓
# ═══════════════════════════════════════════════════════════════════════════

conductor:
  default_agent: typescript-pro
  worktree_groups:
    - group_id: "foundation"
      description: "Extension scaffolding and core utilities"
      tasks: [1, 2, 3]
      rationale: "Sequential setup - package.json → entry → utils"
    - group_id: "config-management"
      description: "Configuration read/write services"
      tasks: [4, 5]
      rationale: "Can parallelize - backends.json and mcp.json are independent"
    - group_id: "webview-core"
      description: "Webview infrastructure"
      tasks: [6, 7, 8]
      rationale: "Sequential - provider → template → handler"
    - group_id: "ui-components"
      description: "Webview UI components"
      tasks: [9, 10, 11, 12]
      rationale: "Can parallelize - independent UI components (12 depends on 5,7)"
    - group_id: "integration"
      description: "Wire all components together"
      tasks: [13]
      rationale: "Final integration after all components ready"
