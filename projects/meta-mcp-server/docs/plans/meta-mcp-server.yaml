# ═══════════════════════════════════════════════════════════════════════════
# META-MCP SERVER IMPLEMENTATION PLAN
# ═══════════════════════════════════════════════════════════════════════════
# Implements Anthropic's "Code Execution with MCP" pattern for token-efficient
# tool discovery. Hybrid approach: MVP lazy loading with extensibility hooks.
#
# DATA FLOW REGISTRY
# ═══════════════════════════════════════════════════════════════════════════
# PRODUCERS:
#   Task 1 → package.json, tsconfig.json (project config)
#   Task 2 → ServerConfig, ToolDefinition, MCPConnection (types)
#   Task 3 → loadServerManifest(), getServerConfig() (registry functions)
#   Task 4 → ServerPool class, getConnection(), releaseConnection()
#   Task 5 → createStdioConnection(), createDockerConnection()
#   Task 6 → listServersHandler()
#   Task 7 → getServerToolsHandler(), toolCache
#   Task 8 → callToolHandler()
#
# CONSUMERS:
#   Task 3 → [2] types
#   Task 4 → [2] types
#   Task 5 → [2, 4] types, ServerPool
#   Task 6 → [2, 3] types, loadServerManifest
#   Task 7 → [2, 3, 4, 5] types, registry, pool, connections
#   Task 8 → [2, 4, 7] types, pool, toolCache
#   Task 9 → [2, 6, 7, 8] all handlers
#   Task 10 → [9] main server (Node-based corp-jira)
#   Task 11 → [9] main server (Docker-based: splunk-async, new-relic, corp-github)
#   Task 12 → [10, 11] both integration suites (multi-server workflow, pool stress)
#
# VALIDATION: All consumers depend_on their producers ✓
# ═══════════════════════════════════════════════════════════════════════════

conductor:
  default_agent: typescript-pro
  quality_control:
    enabled: true
    review_agent: quality-control
    retry_on_red: 2
    agents:
      mode: intelligent
  worktree_groups:
    - group_id: "foundation-chain"
      description: "Tasks 1→2→3: Project setup, types, registry"
      tasks: [1, 2, 3]
      rationale: "Sequential foundation tasks - types must exist before registry"
      setup_commands: |
        git worktree add ../wt-foundation -b feature/meta-mcp/foundation
        cd ../wt-foundation
    - group_id: "pool-chain"
      description: "Tasks 4→5: Server pool and connection management"
      tasks: [4, 5]
      rationale: "Pool depends on types, connections depend on pool"
      setup_commands: |
        git worktree add ../wt-pool -b feature/meta-mcp/pool
        cd ../wt-pool
    - group_id: "tools-chain"
      description: "Tasks 6→7→8: MCP tool implementations"
      tasks: [6, 7, 8]
      rationale: "Each tool builds on previous - call_tool needs get_tools"
      setup_commands: |
        git worktree add ../wt-tools -b feature/meta-mcp/tools
        cd ../wt-tools
    - group_id: "integration-chain"
      description: "Tasks 9→10→11→12: Main server and comprehensive testing"
      tasks: [9, 10, 11, 12]
      rationale: "Final wiring and validation across all server types"
      setup_commands: |
        git worktree add ../wt-integration -b feature/meta-mcp/integration
        cd ../wt-integration
