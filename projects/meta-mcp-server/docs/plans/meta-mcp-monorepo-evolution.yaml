            reference: "packages/meta-mcp/src/tools/"
          - point: "Import types from @meta-mcp/core"
            details: "ServerConfig, MCPConnection, ToolDefinition from @meta-mcp/core"
            reference: "packages/meta-mcp/src/tools/"
          - point: "Import registry functions from @meta-mcp/core"
