        - "packages/meta-mcp/src/tools/ imports types (ServerConfig, MCPConnection) from @meta-mcp/core"
        - "listServersHandler calls listServers from @meta-mcp/core"
        - "getServerToolsHandler uses ToolCache from @meta-mcp/core"
        - "callToolHandler uses ServerPool from @meta-mcp/core"
