# ═══════════════════════════════════════════════════════════════
# DATA FLOW REGISTRY
# ═══════════════════════════════════════════════════════════════
# PRODUCERS:
#   Task 1 → npm workspace root, packages/ structure
#   Task 2 → @meta-mcp/core types (ServerConfig, MCPConnection, ToolDefinition)
#   Task 3 → @meta-mcp/core registry (loadServerManifest, getServerConfig)
#   Task 4 → @meta-mcp/core pool (ServerPool, createConnection)
#   Task 5 → @meta-mcp/core tool-cache (ToolCache)
#   Task 6 → @meta-mcp/core package.json and exports
#   Task 7 → @meta-mcp/server refactored to use core imports
#   Task 10 → @meta-mcp/exec package skeleton
#   Task 11 → SandboxExecutor class using @anthropic-ai/sandbox-runtime
#   Task 12 → MCPBridge HTTP server
#   Task 13 → execute_code tool handler
#   Task 15 → WrapperGenerator for TypeScript tool wrappers
#
# CONSUMERS:
#   Task 3 → [2] (uses types)
#   Task 4 → [2] (uses types)
#   Task 5 → [2] (uses types)
#   Task 6 → [2, 3, 4, 5] (bundles all core modules)
#   Task 7 → [6] (imports from @meta-mcp/core)
#   Task 8 → [7] (updates server entry)
#   Task 9 → [7, 8] (updates tests)
#   Task 11 → [10] (adds to mcp-exec)
#   Task 12 → [6, 10] (uses core pool + mcp-exec structure)
#   Task 13 → [11, 12] (uses executor + bridge)
#   Task 14 → [13] (creates MCP server with tool)
#   Task 15 → [6, 10] (uses core types + mcp-exec)
#   Task 16 → [15] (uses wrapper generator)
#   Task 17 → [14, 16] (tests full flow)
#   Task 18 → [17] (documents after implementation)
#
# VALIDATION: All consumers depend_on producers ✓
# ═══════════════════════════════════════════════════════════════
# SUCCESS CRITERIA VALIDATION
# ═══════════════════════════════════════════════════════════════
# All criteria derived from key_points ✓
# Same terminology in key_points and criteria ✓
# Component tasks have CAPABILITY-only criteria ✓
# Integration tasks have dual criteria ✓
# ═══════════════════════════════════════════════════════════════

conductor:
  default_agent: typescript-pro
  worktree_groups:
    - group_id: "core-extraction"
      description: "Extract shared infrastructure to @meta-mcp/core"
      tasks: [1, 2, 3, 4, 5, 6]
      rationale: "Foundation packages must be created before consumers can import"

    - group_id: "meta-mcp-refactor"
      description: "Refactor existing meta-mcp to use core imports"
      tasks: [7, 8, 9]
      rationale: "Depends on core package being complete"

    - group_id: "mcp-exec-foundation"
      description: "Create new mcp-exec package with sandbox execution"
      tasks: [10, 11, 12, 13, 14]
      rationale: "New package development, depends on core"

    - group_id: "wrapper-generation"
      description: "TypeScript wrapper generation for MCP tools"
      tasks: [15, 16]
      rationale: "Enhancement to mcp-exec for better DX"

    - group_id: "integration-testing"
      description: "End-to-end testing and documentation"
      tasks: [17, 18]
      rationale: "Final validation after all components complete"

plan:
  metadata:
    feature_name: "Meta-MCP Monorepo Evolution with mcp-exec"
    created: "2025-12-09"
    target: "Transform meta-mcp-server into monorepo with @meta-mcp/core, @meta-mcp/server, and @meta-mcp/exec packages"

  context:
    framework: "TypeScript with @modelcontextprotocol/sdk"
    architecture: "Monorepo with npm workspaces"
    test_framework: "vitest"
    sandbox: "@anthropic-ai/sandbox-runtime for OS-level code isolation"
    existing_patterns:
      - "MCP Server pattern in src/server.ts"
      - "Connection pool with LRU eviction in src/pool/"
      - "Registry with Zod validation in src/registry/"
      - "Tool cache pattern in src/tools/tool-cache.ts"
    new_dependencies:
      - "@anthropic-ai/sandbox-runtime - Anthropic's official sandbox (sandbox-exec on macOS, bubblewrap on Linux)"
      - "esbuild - Fast TypeScript to JavaScript transpilation"

  tasks:
    # ═══════════════════════════════════════════════════════════════
    # PHASE 1: MONOREPO SETUP & CORE EXTRACTION
    # ═══════════════════════════════════════════════════════════════

    - task_number: "1"
      name: "Initialize monorepo structure with npm workspaces"
      agent: typescript-pro
      files:
        - "package.json"
        - "packages/core/package.json"
        - "packages/core/tsconfig.json"
        - "packages/meta-mcp/package.json"
        - "packages/meta-mcp/tsconfig.json"
        - "packages/mcp-exec/package.json"
        - "packages/mcp-exec/tsconfig.json"
        - "tsconfig.base.json"
      depends_on: []
      estimated_time: "30m"

      success_criteria:
        - "Root package.json has workspaces array pointing to packages/*"
        - "packages/core/package.json has name @meta-mcp/core with version 0.1.0"
        - "packages/meta-mcp/package.json has name @meta-mcp/server with version 0.1.0"
        - "packages/mcp-exec/package.json has name @meta-mcp/exec with version 0.1.0"
        - "tsconfig.base.json contains shared compiler options"
        - "Each package tsconfig.json extends tsconfig.base.json"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "npm install"
        - "ls packages/core packages/meta-mcp packages/mcp-exec"

      description: |
        ## TASK DESCRIPTION
        Initialize the monorepo structure using npm workspaces. Create the directory
        structure and package.json files for all three packages.

        ## REQUIREMENTS
        - Root package.json with workspaces configuration
        - Base tsconfig.json with shared compiler options
        - Package-specific tsconfig.json files extending base
        - Proper @meta-mcp/* naming scope

      implementation:
        approach: |
          Create monorepo structure with npm workspaces. The root package.json
          will manage workspaces, and each package will have its own package.json
          and tsconfig.json extending the base configuration.
        key_points:
          - point: "npm workspaces configuration"
            details: "Root package.json with workspaces: ['packages/*']"
            reference: "package.json"
          - point: "tsconfig.base.json with shared options"
            details: "ES2020 target, bundler moduleResolution, strict mode"
            reference: "tsconfig.base.json"
          - point: "@meta-mcp/* package naming"
            details: "Consistent naming: @meta-mcp/core, @meta-mcp/server, @meta-mcp/exec"
            reference: "packages/*/package.json"

      verification:
        automated_tests:
          command: "npm install && npm run build --workspaces --if-present"
          expected_output: "No errors"

      code_quality:
        typescript:
          full_quality_pipeline:
            command: "npx tsc --noEmit"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "initialize monorepo structure with npm workspaces"
        files:
          - "package.json"
          - "tsconfig.base.json"
          - "packages/**"

    - task_number: "2"
      name: "Extract types to @meta-mcp/core"
      agent: typescript-pro
      files:
        - "packages/core/src/types/index.ts"
        - "packages/core/src/types/server-config.ts"
        - "packages/core/src/types/connection.ts"
        - "packages/core/src/types/tool-definition.ts"
      depends_on: [1]
      estimated_time: "20m"

      success_criteria:
        - "ServerConfig interface exists in packages/core/src/types/server-config.ts"
        - "MCPConnection interface exists in packages/core/src/types/connection.ts"
        - "ConnectionState enum exported from packages/core/src/types/connection.ts"
        - "ToolDefinition interface exists in packages/core/src/types/tool-definition.ts"
        - "isUrlTransport function exported from server-config.ts"
        - "packages/core/src/types/index.ts re-exports all types"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "cd packages/core && npx tsc --noEmit"

      description: |
        ## PHASE 0: DEPENDENCY VERIFICATION (EXECUTE FIRST)
        ```bash
        ls packages/core/  # Verify package exists from task 1
        ```

        ## TASK DESCRIPTION
        Extract type definitions from src/types/ to packages/core/src/types/.
        These are the foundational types used by all packages.

      implementation:
        approach: |
          Copy type files from src/types/ to packages/core/src/types/ with minimal
          modifications. Update import paths to be relative within core package.
        key_points:
          - point: "ServerConfig interface with stdio and HTTP transport support"
            details: "Defines command, args, env for stdio; url, headers for HTTP"
            reference: "packages/core/src/types/server-config.ts"
          - point: "MCPConnection interface with lifecycle methods"
            details: "connect(), disconnect(), isConnected(), getTools()"
            reference: "packages/core/src/types/connection.ts"
          - point: "ConnectionState enum for state management"
            details: "Disconnected, Connecting, Connected, Error states"
            reference: "packages/core/src/types/connection.ts"
          - point: "ToolDefinition with serverId augmentation"
            details: "Extends MCP Tool with serverId for multi-server tracking"
            reference: "packages/core/src/types/tool-definition.ts"

      verification:
        automated_tests:
          command: "cd packages/core && npx tsc --noEmit"
          expected_output: "No errors"

      code_quality:
        typescript:
          full_quality_pipeline:
            command: "cd packages/core && npx tsc --noEmit"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "extract types to @meta-mcp/core"
        files:
          - "packages/core/src/types/**"

    - task_number: "3"
      name: "Extract registry to @meta-mcp/core"
      agent: typescript-pro
      files:
        - "packages/core/src/registry/index.ts"
        - "packages/core/src/registry/loader.ts"
        - "packages/core/src/registry/manifest.ts"
      depends_on: [2]
      estimated_time: "25m"

      success_criteria:
        - "loadServerManifest function exists in packages/core/src/registry/loader.ts"
        - "getServerConfig function exists in packages/core/src/registry/loader.ts"
        - "listServers function exists in packages/core/src/registry/loader.ts"
        - "ConfigNotFoundError, ConfigParseError, ConfigValidationError error classes exported"
        - "ServerManifest and ServerManifestEntry types exported from manifest.ts"
        - "Zod schema BackendsConfigSchema validates servers.json format"
        - "imports from '../types/index.js' resolve correctly"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "cd packages/core && npx tsc --noEmit"

      description: |
        ## PHASE 0: DEPENDENCY VERIFICATION (EXECUTE FIRST)
        ```bash
        ls packages/core/src/types/  # Verify types exist from task 2
        ```

        ## TASK DESCRIPTION
        Extract registry/loader functionality to packages/core/src/registry/.
        This handles loading and validating servers.json configuration.

      implementation:
        approach: |
          Copy registry files from src/registry/ to packages/core/src/registry/.
          Update imports to use relative paths within core package.
        key_points:
          - point: "loadServerManifest with Zod validation"
            details: "Loads servers.json, validates with BackendsConfigSchema, caches result"
            reference: "packages/core/src/registry/loader.ts"
          - point: "getServerConfig for single server lookup"
            details: "Returns ServerConfig for given serverId from cached manifest"
            reference: "packages/core/src/registry/loader.ts"
          - point: "Error classes for config handling"
            details: "ConfigNotFoundError, ConfigParseError, ConfigValidationError"
            reference: "packages/core/src/registry/loader.ts"
          - point: "generateManifest for server listing"
            details: "Transforms server configs to manifest entries with name/description/tags"
            reference: "packages/core/src/registry/manifest.ts"

      verification:
        automated_tests:
          command: "cd packages/core && npx tsc --noEmit"
          expected_output: "No errors"

      code_quality:
        typescript:
          full_quality_pipeline:
            command: "cd packages/core && npx tsc --noEmit"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "extract registry to @meta-mcp/core"
        files:
          - "packages/core/src/registry/**"

    - task_number: "4"
      name: "Extract pool to @meta-mcp/core"
      agent: typescript-pro
      files:
        - "packages/core/src/pool/index.ts"
        - "packages/core/src/pool/server-pool.ts"
        - "packages/core/src/pool/connection.ts"
        - "packages/core/src/pool/stdio-transport.ts"
      depends_on: [2]
      estimated_time: "30m"

      success_criteria:
        - "ServerPool class exists with getConnection, releaseConnection, shutdown methods"
        - "createConnection function creates MCPConnection from ServerConfig"
        - "ConnectionError and PoolExhaustedError error classes exported"
        - "SpawnError, TimeoutError, UnexpectedExitError exported from connection.ts"
        - "buildSpawnConfig function handles docker, node, uvx spawn types"
        - "LRU eviction works with maxConnections config (default 20)"
        - "Idle cleanup timer runs every 60 seconds with 5 minute timeout"
        - "imports from '../types/index.js' resolve correctly"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "cd packages/core && npx tsc --noEmit"

      description: |
        ## PHASE 0: DEPENDENCY VERIFICATION (EXECUTE FIRST)
        ```bash
        ls packages/core/src/types/  # Verify types exist from task 2
        ```

        ## TASK DESCRIPTION
        Extract connection pool functionality to packages/core/src/pool/.
        This handles MCP server connection lifecycle and LRU eviction.

      implementation:
        approach: |
          Copy pool files from src/pool/ to packages/core/src/pool/.
          Update imports to use relative paths within core package.
        key_points:
          - point: "ServerPool with LRU eviction"
            details: "Map-based pool with maxConnections limit and idle timeout cleanup"
            reference: "packages/core/src/pool/server-pool.ts"
          - point: "createConnection factory function"
            details: "Creates MCPConnection from ServerConfig, supports stdio and HTTP transport"
            reference: "packages/core/src/pool/connection.ts"
          - point: "buildSpawnConfig for spawn configuration"
            details: "Handles docker, node, uvx spawn types with appropriate commands"
            reference: "packages/core/src/pool/stdio-transport.ts"
          - point: "Error classes for connection handling"
            details: "ConnectionError, PoolExhaustedError, SpawnError, TimeoutError"
            reference: "packages/core/src/pool/"

      verification:
        automated_tests:
          command: "cd packages/core && npx tsc --noEmit"
          expected_output: "No errors"

      code_quality:
        typescript:
          full_quality_pipeline:
            command: "cd packages/core && npx tsc --noEmit"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "extract pool to @meta-mcp/core"
        files:
          - "packages/core/src/pool/**"

    - task_number: "5"
      name: "Extract tool-cache to @meta-mcp/core"
      agent: typescript-pro
      files:
        - "packages/core/src/tools/index.ts"
        - "packages/core/src/tools/tool-cache.ts"
      depends_on: [2]
      estimated_time: "15m"

      success_criteria:
        - "ToolCache class exists with get, has, set, delete, clear, size methods"
        - "ToolCache uses Map<string, ToolDefinition[]> internally"
        - "packages/core/src/tools/index.ts exports ToolCache"
        - "imports from '../types/index.js' resolve correctly"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "cd packages/core && npx tsc --noEmit"

      description: |
        ## PHASE 0: DEPENDENCY VERIFICATION (EXECUTE FIRST)
        ```bash
        ls packages/core/src/types/  # Verify types exist from task 2
        ```

        ## TASK DESCRIPTION
        Extract ToolCache to packages/core/src/tools/.
        This caches tool definitions per server to avoid re-fetching.

      implementation:
        approach: |
          Copy tool-cache.ts from src/tools/ to packages/core/src/tools/.
          Update imports to use relative paths within core package.
        key_points:
          - point: "ToolCache class with Map-based storage"
            details: "Caches ToolDefinition[] keyed by serverId"
            reference: "packages/core/src/tools/tool-cache.ts"
          - point: "Standard cache interface methods"
            details: "get, has, set, delete, clear, size"
            reference: "packages/core/src/tools/tool-cache.ts"

      verification:
        automated_tests:
          command: "cd packages/core && npx tsc --noEmit"
          expected_output: "No errors"

      code_quality:
        typescript:
          full_quality_pipeline:
            command: "cd packages/core && npx tsc --noEmit"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "extract tool-cache to @meta-mcp/core"
        files:
          - "packages/core/src/tools/**"

    - task_number: "6"
      name: "Create @meta-mcp/core package exports"
      agent: typescript-pro
      files:
        - "packages/core/src/index.ts"
        - "packages/core/package.json"
      depends_on: [2, 3, 4, 5]
      estimated_time: "20m"

      success_criteria:
        - "packages/core/src/index.ts exports all types from ./types/index.js"
        - "packages/core/src/index.ts exports ServerPool, createConnection from ./pool/index.js"
        - "packages/core/src/index.ts exports loadServerManifest, getServerConfig, listServers from ./registry/index.js"
        - "packages/core/src/index.ts exports ToolCache from ./tools/index.js"
        - "packages/core/package.json has main: dist/index.js"
        - "packages/core/package.json has types: dist/index.d.ts"
        - "packages/core/package.json has exports field for ESM"
        - "npm run build in packages/core produces dist/ with .js and .d.ts files"
        - "No TODO comments in production code paths."
        - "No placeholder empty structs."

      test_commands:
        - "cd packages/core && npm run build"
        - "ls packages/core/dist/index.js packages/core/dist/index.d.ts"

      description: |
        ## PHASE 0: DEPENDENCY VERIFICATION (EXECUTE FIRST)
        ```bash
        ls packages/core/src/types/ packages/core/src/pool/ packages/core/src/registry/ packages/core/src/tools/
        ```

        ## TASK DESCRIPTION
        Create the main entry point for @meta-mcp/core that exports all
        public APIs. Update package.json with proper exports configuration.

      implementation:
        approach: |
          Create index.ts that re-exports all public APIs from submodules.
          Configure package.json with proper main, types, and exports fields.
        key_points:
          - point: "Barrel exports in index.ts"
            details: "Re-export all public types, classes, and functions"
            reference: "packages/core/src/index.ts"
          - point: "package.json exports configuration"
            details: "main, types, and exports fields for ESM support"
            reference: "packages/core/package.json"
          - point: "Build script produces dist/"
            details: "tsc compiles to dist/ with declaration files"
            reference: "packages/core/package.json"

      verification:
