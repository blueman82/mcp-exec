# Docker Compose for AskSplunk - Local Development (ARM64)
# Supports Apple Silicon Macs and ARM-based development machines

version: '3.9'

services:
  # ChromaDB Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: asksplunk-chromadb-dev
    platform: linux/arm64
    ports:
      - "8000:8000"
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - CHROMA_SERVER_HOST=0.0.0.0
      - CHROMA_SERVER_PORT=8000
      - ALLOW_RESET=true  # Only for development
    networks:
      - asksplunk-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # AskSplunk Slack Bot (local development)
  asksplunk:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: asksplunk-bot-dev
    depends_on:
      chromadb:
        condition: service_healthy
    environment:
      # AWS Configuration
      - AWS_REGION=eu-west-1
      - AWS_DEFAULT_REGION=eu-west-1

      # ChromaDB Configuration
      - CHROMADB_HOST=chromadb
      - CHROMADB_PORT=8000

      # Application Configuration
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

      # AWS credentials (loaded from host or AWS CLI)
      # Note: For production, use IAM roles instead
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_SESSION_TOKEN=${AWS_SESSION_TOKEN}
    volumes:
      # Mount source code for hot reloading in development
      - ./src:/app/src:ro
      - ./docs/schema:/app/docs/schema:ro
    networks:
      - asksplunk-network
    restart: unless-stopped
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  chromadb-data:
    driver: local

networks:
  asksplunk-network:
    driver: bridge
