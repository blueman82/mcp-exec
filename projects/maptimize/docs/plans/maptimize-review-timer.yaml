          expected_output: "Wiki page displays new timer functionality"

      code_quality:
        typescript:
          validation:
            command: "echo 'Verify TypeScript compiles and mcp-exec pattern correct'"
            exit_on_failure: false

      commit:
        type: "feat"
        message: "deploy review timer to Confluence wiki via mcp-exec"
        files:
          - "deploy-to-wiki.ts"

