# nginx.conf
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    
    # Docker DNS resolver - re-resolve every 30s to handle container IP changes
    resolver 127.0.0.11 valid=30s ipv6=off;
    resolver_timeout 5s;
    
    # Consolidated ketchup-app upstream - use variable for dynamic resolution
    upstream ketchup_app {
        least_conn;
        server ketchup-app:8001 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }
    
    server {
        listen 80;
        server_name _;
        
        # All Slack endpoints handled by consolidated app
        location /slack/ {
            proxy_pass http://ketchup_app;
            proxy_read_timeout 3s;  # Slack's 3-second timeout
            proxy_connect_timeout 1s;
            
            # Preserve headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pass Slack headers
            proxy_set_header X-Slack-Request-Timestamp $http_x_slack_request_timestamp;
            proxy_set_header X-Slack-Signature $http_x_slack_signature;
            
            # Connection reuse
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Nginx health check endpoint (for ALB)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Application health check endpoint
        location /health {
            proxy_pass http://ketchup_app;
            proxy_read_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Admin/metrics endpoints (internal only)
        location /admin/ {
            allow 10.0.0.0/8;      # VPC internal
            allow 172.16.0.0/12;   # Docker networks
            deny all;
            
            proxy_pass http://ketchup_app;
            proxy_read_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Handle common scanner requests without logging
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;  # No Content
        }
        
        location = /robots.txt {
            access_log off;
            log_not_found off;
            return 200 "User-agent: *\nDisallow: /\n";
            add_header Content-Type text/plain;
        }
        
        # Security.txt (RFC 9116) - optional
        location = /.well-known/security.txt {
            access_log off;
            log_not_found off;
            return 404;
        }
        
        # Default handler for all other requests
        location / {
            # Return 404 for direct root access to avoid exposing app structure
            return 404;
        }
    }
}