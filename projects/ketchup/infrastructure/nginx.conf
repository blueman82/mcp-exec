# nginx.conf
events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;
    
    # Basic Settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;
    
    # Docker DNS resolver — re-resolves on each request via variable-based proxy_pass.
    # Static upstream blocks resolve once at startup and cache IPs forever,
    # breaking when containers restart and get new IPs. Using a variable
    # forces nginx to use this resolver on every request.
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name _;

        # Variable-based backend — resolved dynamically via Docker DNS on each request.
        # Docker round-robins across replicas (replaces least_conn upstream).
        set $ketchup_app ketchup-app;

        # All Slack endpoints handled by consolidated app
        location /slack/ {
            proxy_pass http://$ketchup_app:8001;
            proxy_read_timeout 3s;  # Slack's 3-second timeout
            proxy_connect_timeout 1s;
            
            # Preserve headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Pass Slack headers
            proxy_set_header X-Slack-Request-Timestamp $http_x_slack_request_timestamp;
            proxy_set_header X-Slack-Signature $http_x_slack_signature;
            
            # Connection reuse
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Nginx health check endpoint (for ALB)
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Application health check endpoint
        location /health {
            proxy_pass http://$ketchup_app:8001;
            proxy_read_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Admin/metrics endpoints (internal only)
        location /admin/ {
            allow 10.0.0.0/8;      # VPC internal
            allow 172.16.0.0/12;   # Docker networks
            deny all;
            
            proxy_pass http://$ketchup_app:8001;
            proxy_read_timeout 10s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        
        # Handle common scanner requests without logging
        location = /favicon.ico {
            access_log off;
            log_not_found off;
            return 204;  # No Content
        }
        
        location = /robots.txt {
            access_log off;
            log_not_found off;
            return 200 "User-agent: *\nDisallow: /\n";
            add_header Content-Type text/plain;
        }
        
        # Security.txt (RFC 9116) - optional
        location = /.well-known/security.txt {
            access_log off;
            log_not_found off;
            return 404;
        }
        
        # Default handler for all other requests
        location / {
            # Return 404 for direct root access to avoid exposing app structure
            return 404;
        }
    }
}