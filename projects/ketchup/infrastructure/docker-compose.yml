services:
  # ChromaDB - Vector database for agent RAG pipeline
  # Stores embeddings for Slack channel history and JIRA documents
  chromadb:
    image: chromadb/chroma:1.5.5
    environment:
      - TZ=Europe/London
    volumes:
      - chromadb_data:/chroma/chroma
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ketchup-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  ketchup-app:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-app:v2.360.424
    env_file:
      - common.env
      - performance.env
      - features.env
      - azure.env
      - agent.env
    environment:
      - KETCHUP_MAINTENANCE_MODE=${KETCHUP_MAINTENANCE_MODE:-false}
      - KETCHUP_MAINTENANCE_MESSAGE=${KETCHUP_MAINTENANCE_MESSAGE:-}
    volumes:
      - ./logs:/var/log
    depends_on:
      mcp-jira:
        condition: service_started
      chromadb:
        condition: service_healthy
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # Unified Scheduler - consolidates 5 singleton scheduler services into one container
  # Replaces: ketchup-metadata-updater, ketchup-status-updater, ketchup-jira-reporter,
  #           ketchup-maintenance-fetcher, ketchup-jira-pat-rotator
  ketchup-unified-scheduler:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.unified-scheduler
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-unified-scheduler:v2.360.424
    env_file:
      - common.env
      - performance.env
      - features.env
      - azure.env
      - agent.env
    volumes:
      - ./logs:/var/log
      - ./logs/unified_scheduler:/var/log/unified_scheduler
    depends_on:
      mcp-jira:
        condition: service_started
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/unified_scheduler_health LAST_RUN_FILE=/tmp/unified_scheduler_last_run MAX_RUN_AGE=4200 MAX_HEALTH_AGE=600 SERVICE_NAME=UnifiedScheduler /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # CSOPM Notifier - Standalone CSOPM notification service (singleton on prod1)
  # Polls JIRA for CSOPM assignments and sends Slack DM notifications
  # Runs 5x daily (controlled via CSOPM_SCHEDULE_TIMES in csopm.env)
  ketchup-csopm-notifier:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.csopm-notifier
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-csopm-notifier:v2.360.424
    env_file:
      - common.env
      - performance.env
      - csopm.env
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      # Health file: /tmp/csopm_notifier_health (format: timestamp:status)
      # Last run file: /tmp/csopm_notifier_last_run
      # MAX_RUN_AGE: 32400 = 9 hours (runs every 8 hours at 08:00 and 16:00 UTC)
      # MAX_HEALTH_AGE: 600 = 10 minutes
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/csopm_notifier_health LAST_RUN_FILE=/tmp/csopm_notifier_last_run MAX_RUN_AGE=32400 MAX_HEALTH_AGE=600 SERVICE_NAME=CSOPMNotifier /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  mcp-jira:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mcp-jira
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/mcp-jira:v2.360.424
    ports:
      - "8081:8081"
    env_file:
      - common.env
      - performance.env
    environment:
      - USE_IPAAS=true
      - PORT=8081
      - JIRA_API_KEY=
      - JIRA_USERNAME=
      - JIRA_PASSWORD=
      - JIRA_IMS_TOKEN=
      - JIRA_USE_PAT_AUTH=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  ketchup-access-monitor:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-access-monitor:v2.360.424
    env_file:
      - common.env
      - performance.env
    environment:
      - ACCESS_REQUEST_MONITOR_INTERVAL=300
      - ACCESS_REQUEST_ALERT_COOLDOWN=3600
    volumes:
      - ./logs/access_monitor:/var/log/access_monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/access_monitor_health MAX_HEALTH_AGE=480 SERVICE_NAME=AccessMonitor /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

# Production network configuration
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.18.0.0/16

# Persistent volumes
volumes:
  chromadb_data:
    driver: local
