services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ketchup-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-app:
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-app:v2.360.365
    env_file:
      - common.env
      - performance.env
    environment:
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - MCP_BASE_URL=http://mcp-jira:8081
      - JIRA_TOOL_PERSIST_CORRECTIONS=true
      - JIRA_TOOL_CORRECTIONS_FILE=/tmp/jira_corrections_cache.json
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=true
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_FEATURE=true
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_GLOBAL=true
      - KETCHUP_USER_JOIN_NOTIFICATIONS_FEATURE=true
      - KETCHUP_USER_JOIN_NOTIFICATIONS_GLOBAL=true
      - KETCHUP_MAINTENANCE_DETECTION=true
      - KETCHUP_EVENTS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/483013340174/ketchup-events-queue
      - TZ=Europe/London
      - EXCLUDED_CSO_CHANNELS=C090V88CB1N,C08CQN1JCSC
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    deploy:
      replicas: 2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Unified Scheduler - consolidates 5 singleton scheduler services into one container
  # Replaces: ketchup-metadata-updater, ketchup-status-updater, ketchup-jira-reporter,
  #           ketchup-maintenance-fetcher, ketchup-jira-pat-rotator
  ketchup-unified-scheduler:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.unified-scheduler
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-unified-scheduler:v2.360.365
    env_file:
      - common.env
      - performance.env
    environment:
      - MCP_BASE_URL=http://mcp-jira:8081
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      # Feature flags for individual tasks
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=true
      - KETCHUP_STATUS_UPDATER_ENABLED=true
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - KETCHUP_METADATA_UPDATER_FEATURE=true
      - KETCHUP_MAINTENANCE_FETCHER_ENABLED=true
      - KETCHUP_JIRA_PAT_ROTATOR_FEATURE=true
      - SLACK_WEBHOOK_URL=https://hooks.slack.com/services/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
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true
      - KETCHUP_EVENTS_QUEUE_URL=https://sqs.eu-west-1.amazonaws.com/483013340174/ketchup-events-queue
      - TZ=Europe/London
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/unified_scheduler_health LAST_RUN_FILE=/tmp/unified_scheduler_last_run MAX_RUN_AGE=4200 MAX_HEALTH_AGE=600 SERVICE_NAME=UnifiedScheduler /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # CSOPM Notifier - Standalone CSOPM notification service (singleton on prod1)
  # Polls JIRA for CSOPM assignments and sends Slack DM notifications
  # Runs at 08:00 and 16:00 UTC daily
  ketchup-csopm-notifier:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.csopm-notifier
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/ketchup-csopm-notifier:v2.360.365
    env_file:
      - common.env
      - performance.env
    environment:
      - MCP_BASE_URL=http://mcp-jira:8081
      # CSOPM feature flag
      - KETCHUP_CSOPM_NOTIFIER_ENABLED=true
      # DynamoDB table for state tracking
      - CSOPM_DYNAMODB_TABLE=ketchup_channel_information
      # CSOPM configuration (can be overridden in docker-compose.local.yml for testing)
      - CSOPM_JIRA_PROJECT=CSOPM
      - CSOPM_RCA_REMINDER_DAYS=7
      - CSOPM_CLOSURE_REMINDER_DAYS=45
      - CSOPM_MAX_PING_COUNT=3
      - CSOPM_SCHEDULE_TIMES=08:00,16:00
      - TZ=Europe/London
    volumes:
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      # Health file: /tmp/csopm_notifier_health (format: timestamp:status)
      # Last run file: /tmp/csopm_notifier_last_run
      # MAX_RUN_AGE: 32400 = 9 hours (runs every 8 hours at 08:00 and 16:00 UTC)
      # MAX_HEALTH_AGE: 600 = 10 minutes
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/csopm_notifier_health LAST_RUN_FILE=/tmp/csopm_notifier_last_run MAX_RUN_AGE=32400 MAX_HEALTH_AGE=600 SERVICE_NAME=CSOPMNotifier /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mcp-jira:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mcp-jira
      platforms:
        - linux/amd64
      x-bake:
        cache-from:
          - type=local,src=/tmp/.buildx-cache
        cache-to:
          - type=local,dest=/tmp/.buildx-cache
    image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/mcp-jira:v2.360.365
    ports:
      - "8081:8081"
    env_file:
      - common.env
      - performance.env
    environment:
      - USE_IPAAS=true
      - PORT=8081
      - JIRA_API_KEY=
      - JIRA_USERNAME=
      - JIRA_PASSWORD=
      - JIRA_IMS_TOKEN=
      - JIRA_USE_PAT_AUTH=true
      - TZ=Europe/London
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

