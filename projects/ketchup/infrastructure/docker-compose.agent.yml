# Agent feature compose override file
# Adds ChromaDB vector storage and agent environment variables
# Usage: docker-compose -f docker-compose.yml -f docker-compose.agent.yml up -d
#
# This file is merged with docker-compose.yml during deployment via the deploy script.
# Services here override or extend the base configuration without modifying the main compose file.

services:
  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: chromadb
    restart: unless-stopped
    # No host port mapping — accessed via Docker network internally.
    # Local dev maps to 8100 in docker-compose.local.yml (avoids DynamoDB conflict).
    # Production maps to 8000 in docker-compose.yml (no DynamoDB).
    volumes:
      # Persistent storage for vector embeddings and metadata
      - chromadb-data:/chroma/chroma
    environment:
      # Enable persistent storage for embeddings across restarts
      - IS_PERSISTENT=TRUE
      # Disable anonymous telemetry
      - ANONYMIZED_TELEMETRY=FALSE
      # Authentication disabled (internal network only)
      - CHROMA_SERVER_AUTHN_PROVIDER=
      - CHROMA_SERVER_AUTH_CREDENTIALS=
      # Disable OpenTelemetry tracing (unnecessary overhead for internal service)
      - CHROMA_OTEL_COLLECTION_ENDPOINT=
      - CHROMA_OTEL_SERVICE_NAME=
      - CHROMA_OTEL_COLLECTION_HEADERS=
      - CHROMA_OTEL_GRANULARITY=
      - TZ=Europe/London
    healthcheck:
      # ChromaDB v2 heartbeat endpoint confirms service is ready
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Extend ketchup-app with agent-specific configuration
  # env_file and environment vars are in the main docker-compose.yml (agent.env)
  ketchup-app:
    depends_on:
      # Wait for ChromaDB to be healthy before starting ketchup-app
      chromadb:
        condition: service_healthy

  # Extend unified-scheduler with agent-specific configuration
  ketchup-unified-scheduler:
    env_file:
      - agent.env
    depends_on:
      # Wait for ChromaDB to be healthy before scheduler starts
      chromadb:
        condition: service_healthy

# Define named volume for ChromaDB data persistence
volumes:
  chromadb-data:
    driver: local
