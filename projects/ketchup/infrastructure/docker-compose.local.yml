# Local development docker-compose - standalone configuration
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ketchup-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ketchup-ngrok
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    env_file:
      - .env  # Reads NGROK_AUTHTOKEN
    ports:
      - "4040:4040"  # ngrok web interface
    depends_on:
      - nginx
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:1.5.5
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"  # Host 8100 to avoid dynamodb-local port conflict
    volumes:
      - chromadb-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
      - TZ=Europe/London
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ketchup-app:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.app-multistage
    image: ketchup-app:local-dev
    env_file:
      - common.env
      - performance.env
      - features.env
      - azure.env
      - agent.env
    # Local overrides (prod values from .env files)
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - KETCHUP_AGENT_ENABLED=true
      - KETCHUP_AGENT_BACKFILL_ENABLED=true
    volumes:
      - ~/.aws:/home/ketchup/.aws:ro
      - ./logs:/var/log
    depends_on:
      mcp-jira:
        condition: service_started
      chromadb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mcp-jira:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mcp-jira
    image: mcp-jira:local-dev
    ports:
      - "8081:8081"  # Expose for testing
    env_file:
      - common.env
      - ../corp_jira_mcp/.env
    # Local overrides (prod values from .env files)
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - USE_IPAAS=true
      - PORT=8081
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - JIRA_USE_PAT_AUTH=true  # Enable PAT authentication for local testing
    volumes:
      - ~/.aws:/home/nodejs/.aws:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  ketchup-access-monitor:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.access-monitor
    image: ketchup-access-monitor:local-dev
    env_file:
      - common.env
      - performance.env
    # Local overrides (prod values from .env files)
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - ACCESS_REQUEST_MONITOR_INTERVAL=300  # 5 minutes
      - ACCESS_REQUEST_ALERT_COOLDOWN=3600  # 1 hour
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs/access_monitor:/var/log/access_monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/infrastructure/healthcheck-access-monitor.sh"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Unified Scheduler - consolidates 5 singleton scheduler services into one container
  # Replaces: ketchup-metadata-updater, ketchup-status-updater, ketchup-jira-reporter,
  #           ketchup-maintenance-fetcher, ketchup-jira-pat-rotator
  ketchup-unified-scheduler:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.unified-scheduler
    image: ketchup-unified-scheduler:local-dev
    env_file:
      - common.env
      - performance.env
      - features.env
      - azure.env
    # Local overrides (prod values from .env files)
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - KETCHUP_STATUS_UPDATER_GLOBAL=false  # Don't process all channels in local dev
      - KETCHUP_HANDOVER_TARGET_CHANNEL=C0AGXRW7KL2 #C03PWLW9P5H - camp-oncall channel.
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/unified_scheduler_health LAST_RUN_FILE=/tmp/unified_scheduler_last_run MAX_RUN_AGE=4200 MAX_HEALTH_AGE=600 SERVICE_NAME=UnifiedScheduler /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # CSOPM Notifier - local dev with shorter thresholds for testing
  ketchup-csopm-notifier:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.csopm-notifier
    image: ketchup-csopm-notifier:local-dev
    env_file:
      - common.env
      - performance.env
      - csopm.env
    # Local testing overrides (prod values from csopm.env)
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - LOG_LEVEL=DEBUG
      - CSOPM_JIRA_PROJECT=CPGNCX
      - CSOPM_RCA_REMINDER_DAYS=0
      - CSOPM_CLOSURE_REMINDER_DAYS=0
      - CSOPM_MAX_PING_COUNT=2
      - CSOPM_SCHEDULE_TIMES=10:16,12:00,15:00,18:00
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "bash", "-c", "HEALTH_FILE=/tmp/csopm_notifier_health LAST_RUN_FILE=/tmp/csopm_notifier_last_run MAX_RUN_AGE=14400 MAX_HEALTH_AGE=600 SERVICE_NAME=CSOPMNotifier /app/infrastructure/healthcheck-scheduler.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ==============================================================================
  # LOCAL TEST SERVICES FOR TDD RECOVERY
  # ==============================================================================

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"  # LocalStack main port
      - "4510-4530:4510-4530"  # External services port range
    environment:
      - SERVICES=s3,sqs,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - HOST_TMP_FOLDER=${TMPDIR}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: localstack-init
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - ./localstack-init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"

volumes:
  chromadb-data:
    driver: local