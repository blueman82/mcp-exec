# Local development docker-compose - standalone configuration
services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ketchup-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ketchup-ngrok
    command:
      - "http"
      - "nginx:80"
      - "--log=stdout"
    env_file:
      - .env  # Reads NGROK_AUTHTOKEN
    ports:
      - "4040:4040"  # ngrok web interface
    depends_on:
      - nginx
    restart: unless-stopped

  ketchup-app:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.app-multistage
    image: ketchup-app:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - MCP_BASE_URL=http://mcp-jira:8081
      - JIRA_TOOL_PERSIST_CORRECTIONS=true
      - JIRA_TOOL_CORRECTIONS_FILE=/tmp/jira_corrections_cache.json
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=true
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - KETCHUP_TRUST_ENDORSEMENT_FEATURE=true   # Enable trust endorsement
      - KETCHUP_TRUST_ENDORSEMENT_GLOBAL=true     # Enabled globally for all channels
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_FEATURE=true  # Enable access request automation
      - KETCHUP_ACCESS_REQUEST_AUTOMATION_GLOBAL=true   # Enable globally for all users
      - KETCHUP_USER_JOIN_NOTIFICATIONS_FEATURE=true   # Enable user join notifications
      - KETCHUP_USER_JOIN_NOTIFICATIONS_GLOBAL=true    # Enable globally for all channels
      - KETCHUP_MAINTENANCE_DETECTION=true  # Enable maintenance detection globally
      - USE_PIPELINE_PROCESSING=true   # Enable pipeline processing for slash commands
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/home/ketchup/.aws:ro
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ketchup-metadata-updater:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.updater
    image: ketchup-metadata-updater:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    restart: unless-stopped

  mcp-jira:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.mcp-jira
    image: mcp-jira:local-dev
    ports:
      - "8081:8081"  # Expose for testing
    env_file:
      - ../corp_jira_mcp/.env
    environment:
      - USE_IPAAS=true
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - PORT=8081
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - JIRA_USE_PAT_AUTH=true  # Enable PAT authentication for local testing
    volumes:
      - ~/.aws:/home/nodejs/.aws:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  ketchup-status-updater:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.status-updater
    image: ketchup-status-updater:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - MCP_BASE_URL=http://mcp-jira:8081
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - KETCHUP_STATUS_UPDATER_FEATURE=true
      - KETCHUP_STATUS_UPDATER_GLOBAL=false  # Don't process all channels in test
      - KETCHUP_STATUS_UPDATER_ENABLED=true
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped

  ketchup-access-monitor:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.access-monitor
    image: ketchup-access-monitor:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - TZ=Europe/London
      - ACCESS_REQUEST_MONITOR_INTERVAL=300  # 5 minutes
      - ACCESS_REQUEST_ALERT_COOLDOWN=3600  # 1 hour
      - MAX_CONCURRENT_REQUESTS=20
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs/access_monitor:/var/log/access_monitor
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/infrastructure/healthcheck-access-monitor.sh"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 60s

  ketchup-jira-reporter:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.jira-reporter
    image: ketchup-jira-reporter:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - MCP_BASE_URL=http://mcp-jira:8081
      - CHECK_INTERVAL_MINUTES=15
      - LOOKBACK_HOURS=24
      - BATCH_SIZE=5
      - PYTHONPATH=/app
      - OPENAI_API_VERSION=2025-01-01-preview
      - AZURE_OPENAI_ENDPOINT=https://ketchup-prod1.openai.azure.com/openai/deployments/gpt-4.1/chat/completions?api-version=2025-01-01-preview
      - KETCHUP_JIRA_REPORTER_FEATURE=true
      - KETCHUP_JIRA_REPORTER_GLOBAL=true
      - USE_PIPELINE_PROCESSING=true
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    depends_on:
      - mcp-jira
    restart: unless-stopped

  ketchup-maintenance-fetcher:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile.maintenance_fetcher
    image: ketchup-maintenance-fetcher:local-dev
    environment:
      - AWS_PROFILE=campaign_prod_v7
      - AWS_REGION=eu-west-1
      - DYNAMODB_TABLE_NAME=ketchup_channel_information
      - AWS_SECRET_NAME=Ketchup_Token_Secrets
      - LOG_LEVEL=INFO
      - PYTHONPATH=/app
      - KETCHUP_MAINTENANCE_FETCHER_ENABLED=true
      - KETCHUP_MAINTENANCE_FETCHER_RUN_ON_START=true
      - TZ=UTC
      - KETCHUP_USE_ASYNC_MCP=true
    volumes:
      - ~/.aws:/root/.aws:ro
      - ./logs:/var/log
    restart: unless-stopped

  # ==============================================================================
  # LOCAL TEST SERVICES FOR TDD RECOVERY
  # ==============================================================================

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: dynamodb-local
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"  # LocalStack main port
      - "4510-4530:4510-4530"  # External services port range
    environment:
      - SERVICES=s3,sqs,secretsmanager
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - DOCKER_HOST=unix:///var/run/docker.sock
      - HOST_TMP_FOLDER=${TMPDIR}
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  localstack-init:
    image: amazon/aws-cli:latest
    container_name: localstack-init
    depends_on:
      - localstack
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ENDPOINT_URL=http://localstack:4566
    volumes:
      - ./localstack-init.sh:/init.sh:ro
    entrypoint: ["sh", "/init.sh"]
    restart: "no"