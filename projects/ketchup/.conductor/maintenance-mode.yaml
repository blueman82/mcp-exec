        <task_description>
        Create FastAPI middleware that intercepts requests during maintenance mode.

        Add import at top:
        ```python
        from starlette.middleware.base import BaseHTTPMiddleware, RequestResponseEndpoint
        ```

        Add class after is_maintenance_mode() function:
        ```python
        class MaintenanceMiddleware(BaseHTTPMiddleware):
            """Return 503 during maintenance mode, except for /health."""

            async def dispatch(
                self, request: Request, call_next: RequestResponseEndpoint
            ) -> Response:
                if is_maintenance_mode() and request.url.path != "/health":
                    return JSONResponse(
                        status_code=503,
                        content={
                            "status": "maintenance",
                            "message": MAINTENANCE_MESSAGE,
                            "retry_after": 300,
                        },
                        headers={"Retry-After": "300"},
                    )
                return await call_next(request)
        ```

        Add after app = FastAPI(...) line:
        ```python
        app.add_middleware(MaintenanceMiddleware)
        ```

        Run ./check --fix after changes.
        </task_description>

