        Create tests/unit/test_maintenance_middleware.py.

        ```python
        """Tests for MaintenanceMiddleware."""

        import os
        from unittest.mock import patch

        import pytest
        from fastapi.testclient import TestClient


        @pytest.fixture
        def app_maintenance_off():
            """App with maintenance mode disabled."""
            with patch.dict(os.environ, {"KETCHUP_MAINTENANCE_MODE": "false"}, clear=False):
                # Must reimport to pick up patched env
                import importlib
                import sys
                if "main" in sys.modules:
                    del sys.modules["main"]
                sys.path.insert(0, "ketchup-app")
                import main
                importlib.reload(main)
                yield main.app


        @pytest.fixture
        def app_maintenance_on():
            """App with maintenance mode enabled."""
            with patch.dict(os.environ, {"KETCHUP_MAINTENANCE_MODE": "true"}, clear=False):
                import importlib
                import sys
                if "main" in sys.modules:
                    del sys.modules["main"]
                sys.path.insert(0, "ketchup-app")
                import main
                importlib.reload(main)
                yield main.app


        def test_maintenance_disabled_allows_requests(app_maintenance_off):
            """Requests allowed when maintenance disabled."""
            client = TestClient(app_maintenance_off)
            response = client.get("/health")
            assert response.status_code == 200


        def test_maintenance_enabled_returns_503(app_maintenance_on):
            """503 returned when maintenance enabled."""
            client = TestClient(app_maintenance_on)
            response = client.get("/readiness")
            assert response.status_code == 503


        def test_health_always_allowed(app_maintenance_on):
            """/health returns 200 even during maintenance."""
            client = TestClient(app_maintenance_on)
            response = client.get("/health")
            assert response.status_code == 200


        def test_response_body_format(app_maintenance_on):
            """Response JSON has required keys."""
            client = TestClient(app_maintenance_on)
            response = client.get("/readiness")
            data = response.json()
            assert data["status"] == "maintenance"
            assert "message" in data
            assert data["retry_after"] == 300


        def test_retry_after_header(app_maintenance_on):
            """Retry-After header is set."""
            client = TestClient(app_maintenance_on)
            response = client.get("/readiness")
            assert response.headers.get("Retry-After") == "300"


        def test_custom_message():
            """Custom message is used in response."""
            custom = "Custom maintenance"
            with patch.dict(os.environ, {
                "KETCHUP_MAINTENANCE_MODE": "true",
                "KETCHUP_MAINTENANCE_MESSAGE": custom,
            }, clear=False):
                import importlib
                import sys
                if "main" in sys.modules:
                    del sys.modules["main"]
                sys.path.insert(0, "ketchup-app")
                import main
                importlib.reload(main)
                client = TestClient(main.app)
                response = client.get("/readiness")
                assert response.json()["message"] == custom
        ```

