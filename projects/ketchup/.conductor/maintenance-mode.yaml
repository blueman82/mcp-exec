        ```python
        """Tests for MaintenanceMiddleware."""
        import os
        from unittest.mock import patch

        import pytest
        from fastapi.testclient import TestClient


        @pytest.fixture
        def client_maintenance_off():
            """Client with maintenance mode disabled."""
            with patch.dict(os.environ, {"KETCHUP_MAINTENANCE_MODE": "false"}):
                # Import after patching to pick up env var
                from ketchup_app.main import app
                yield TestClient(app)


        @pytest.fixture
        def client_maintenance_on():
            """Client with maintenance mode enabled."""
            with patch.dict(os.environ, {"KETCHUP_MAINTENANCE_MODE": "true"}):
                from ketchup_app.main import app
                yield TestClient(app)


        def test_maintenance_mode_disabled_allows_requests(client_maintenance_off):
            """Verify requests allowed when maintenance disabled."""
            response = client_maintenance_off.get("/health")
            assert response.status_code == 200


        def test_maintenance_mode_enabled_returns_503(client_maintenance_on):
            """Verify 503 returned when maintenance enabled."""
            response = client_maintenance_on.get("/readiness")
            assert response.status_code == 503


        def test_maintenance_mode_health_endpoint_always_allowed(client_maintenance_on):
            """Verify /health returns 200 even during maintenance."""
            response = client_maintenance_on.get("/health")
            assert response.status_code == 200


        def test_maintenance_mode_response_body(client_maintenance_on):
            """Verify response JSON contains required keys."""
            response = client_maintenance_on.get("/readiness")
            data = response.json()
            assert "status" in data
            assert "message" in data
            assert "retry_after" in data
            assert data["status"] == "maintenance"


        def test_maintenance_mode_retry_after_header(client_maintenance_on):
            """Verify Retry-After header is set."""
            response = client_maintenance_on.get("/readiness")
            assert response.headers.get("Retry-After") == "300"


        def test_maintenance_mode_custom_message():
            """Verify custom message is used."""
            custom_msg = "Custom maintenance message"
            with patch.dict(os.environ, {
                "KETCHUP_MAINTENANCE_MODE": "true",
                "KETCHUP_MAINTENANCE_MESSAGE": custom_msg,
            }):
                from ketchup_app.main import app
                client = TestClient(app)
                response = client.get("/readiness")
                assert response.json()["message"] == custom_msg
        ```
        </task_description>

