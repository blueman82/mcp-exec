      description: |
        <task_description>
        Create scripts/maintenance.sh for manual maintenance mode control.

        ```bash
        #!/usr/bin/env bash
        set -euo pipefail

        PROD1_SERVER="ketchup-prod1.campaign.adobe.com"
        PROD2_SERVER="ketchup-prod2.campaign.adobe.com"
        PROD_DIR="/opt/ketchup"

        usage() {
            echo "Usage: $0 <on|off|status> [prod1|prod2|both]"
            echo "  on     - Enable maintenance mode"
            echo "  off    - Disable maintenance mode"
            echo "  status - Show current maintenance mode status"
            exit 1
        }

        set_maintenance() {
            local server=$1
            local enabled=$2
            echo "Setting maintenance mode to $enabled on $server..."
            ssh "$server" "cd ${PROD_DIR} && sudo KETCHUP_MAINTENANCE_MODE=$enabled docker-compose up -d ketchup-app"
        }

        get_status() {
            local server=$1
            echo "=== $server ==="
            ssh "$server" "cd ${PROD_DIR} && sudo docker-compose exec ketchup-app printenv KETCHUP_MAINTENANCE_MODE 2>/dev/null || echo 'false'"
        }

        [[ $# -lt 1 ]] && usage

        COMMAND=$1
        TARGET=${2:-both}

        case $TARGET in
            prod1) SERVERS=("$PROD1_SERVER") ;;
            prod2) SERVERS=("$PROD2_SERVER") ;;
            both)  SERVERS=("$PROD1_SERVER" "$PROD2_SERVER") ;;
            *)     usage ;;
        esac

        case $COMMAND in
            on)
                for server in "${SERVERS[@]}"; do
                    set_maintenance "$server" "true"
                done
                ;;
            off)
                for server in "${SERVERS[@]}"; do
                    set_maintenance "$server" "false"
                done
                ;;
            status)
                for server in "${SERVERS[@]}"; do
                    get_status "$server"
                done
                ;;
            *)
                usage
                ;;
        esac
        ```
        </task_description>

