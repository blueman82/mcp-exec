# Minimal pytest.ini - main configuration is in pyproject.toml
# This file exists for backward compatibility when running pytest from tests/
[pytest]
pythonpath = ..
asyncio_mode = auto
markers =
    asyncio: marks tests as async
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    dependency_graph: marks tests for dependency graph functionality
    slow: marks tests as slow running
    no_aws_required: marks integration tests that do not require AWS credentials
filterwarnings =
    ignore::DeprecationWarning
    ignore::RuntimeWarning
