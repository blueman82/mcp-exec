feature: Ketchup Handover Summary
version: 2  # Revised after Codex debate rounds 1 & 2
description: >
  Scheduled task that posts a compact summary of all active incident channels
  to the camp-oncall Slack channel at shift handover times. Fresh data collection
  from Slack messages, JIRA comments, and DynamoDB metadata — no lock contention
  with the status updater. Compact AI prompt produces 1-2 bullet summaries.

design_decisions:
  scheduling: "Dynamic TaskConfig generation from env var list — one config per schedule time"
  data_source: "Fresh read-only collection from 3 sources per channel, own AI prompt, no locks"
  target_channel: "C03PWLW9P5H (camp-oncall), env var driven"
  feature_flag: "KETCHUP_HANDOVER_SUMMARY_ENABLED"
  exemptions: "channel_eligibility.py exempt list + system_channels.py excluded channels"
  message_pattern: "Accumulate (new post each run, no delete-previous)"
  concurrency: "asyncio.Semaphore(4) for parallel AI calls across channels"
  message_window: "12 hours of messages (covers gap between handovers with overlap)"

codex_debate_log:
  round_1:
    - "Dropped forced run_auto_status() — lock contention risk, 54min staleness unacceptable"
    - "Dropped Overview regex extraction — fragile against AI format variation"
    - "Accumulate posts, don't singleton-delete — users reference morning handover in evening"
    - "Dynamic TaskConfig from schedule list — no hardcoded indices"
  round_2:
    - "Q1: Skip processor filtering except FEEDBACK/ACCESS_REQUEST channel exclusion + membership check"
    - "Q2: Use 12h message window via since_ts, not None (avoids fetching entire history)"
    - "Q3: asyncio.Semaphore(4) for AI call concurrency — Azure client has retry but no limiter"

tasks:
  # ── PHASE 1: Configuration & Exemptions ──────────────────────────
  - id: 1
    title: "Create handover config module"
    description: >
      Create packages/core/config/handover_config.py following csopm_config.py pattern.

      Environment variables:
      - KETCHUP_HANDOVER_SCHEDULE_TIMES (default "09:00,17:00") -> List[str]
      - KETCHUP_HANDOVER_TARGET_CHANNEL (default "C03PWLW9P5H") -> str
      - KETCHUP_HANDOVER_SUMMARY_ENABLED (checked at runtime, not parsed here)
      - KETCHUP_HANDOVER_MESSAGE_WINDOW_HOURS (default "12") -> int

      Module exports: HANDOVER_SCHEDULE_TIMES, HANDOVER_TARGET_CHANNEL, HANDOVER_MESSAGE_WINDOW_HOURS
    files:
      create:
        - packages/core/config/handover_config.py
    commit: "feat(handover): add handover config module with env-var-driven schedule times"

  - id: 2
    title: "Add camp-oncall channel exemption"
    description: >
      1. packages/slack/channel_operations/channel_eligibility.py line 110:
         Add "camp-oncall" to exempt_channels list.
      2. packages/core/config/system_channels.py line 15:
         Add "C03PWLW9P5H": "camp-oncall" to DEFAULT_EXCLUDED_CHANNELS.
      3. infrastructure/docker-compose.yml line 46 (ketchup-app EXCLUDED_CSO_CHANNELS):
         Add C03PWLW9P5H to the comma-separated list.
    files:
      modify:
        - packages/slack/channel_operations/channel_eligibility.py
        - packages/core/config/system_channels.py
        - infrastructure/docker-compose.yml
    commit: "feat(handover): add camp-oncall channel exemption"

  - id: 3
    title: "Add environment variables to docker-compose files"
    description: >
      Add to ketchup-unified-scheduler in BOTH docker-compose files:
      - KETCHUP_HANDOVER_SUMMARY_ENABLED=false
      - KETCHUP_HANDOVER_TARGET_CHANNEL=C03PWLW9P5H
      - KETCHUP_HANDOVER_SCHEDULE_TIMES=09:00,17:00
      - KETCHUP_HANDOVER_MESSAGE_WINDOW_HOURS=12

      Files: infrastructure/docker-compose.yml (after line 101 in unified-scheduler env)
             infrastructure/docker-compose.local.yml (in unified scheduler or equivalent service)
    files:
      modify:
        - infrastructure/docker-compose.yml
        - infrastructure/docker-compose.local.yml
    commit: "feat(handover): add handover env vars and feature flag to docker-compose"

  # ── PHASE 2: AI Prompt ───────────────────────────────────────────
  - id: 4
    title: "Create compact handover AI prompt"
    depends_on: []
    description: >
      Create packages/ai/prompts/handover_summary.py with:

      get_handover_system_prompt() -> str:
        "You generate ultra-compact incident summaries for shift handover.
         Output ONLY 1-2 bullet points. No headers, no sections. Max 50 words."

      get_handover_channel_prompt(channel_info, messages, jira_comments) -> str:
        Includes: channel name, customer, jira ticket, messages, jira comments.
        Instructs AI to produce 1-2 bullets summarising current state + next action.

      Key differences from auto_status.py prompt:
      - 1-2 bullets instead of Overview + 4 bullets
      - 50 word limit instead of 150
      - No activity source indicators
      - No self-verification checklist
    files:
      create:
        - packages/ai/prompts/handover_summary.py
    commit: "feat(handover): add compact handover AI prompt"

  # ── PHASE 3: Core Handover Generator ─────────────────────────────
  - id: 5
    title: "Create handover summary generator service"
    depends_on: [1, 4]
    description: >
      Create ketchup_unified_scheduler/services/handover/__init__.py and
      ketchup_unified_scheduler/services/handover/generator.py.

      Core function: async def generate_and_post_handover(container) -> dict

      Flow:
      1. Check feature flag KETCHUP_HANDOVER_SUMMARY_ENABLED, return early if disabled
      2. Resolve services from container:
         - ChannelOperationsProtocol (DynamoDB)
         - SlackChannelMessageOpsProtocol (Slack messages)
         - ChannelMembershipOpsProtocol (membership check)
         - MCPAsyncClientProtocol (JIRA comments)
         - OpenAIHandlerProtocol (AI summarisation)
         - SlackPostingHandlerProtocol (posting)
      3. Get all active channels via query_ops.get_all_active_channels()
      4. Filter out FEEDBACK_CHANNEL, ACCESS_REQUEST_CHANNEL, HANDOVER_TARGET_CHANNEL
      5. Check bot membership in camp-oncall, log error and return if not member
      6. Calculate since_ts = now - HANDOVER_MESSAGE_WINDOW_HOURS (default 12h)
      7. For each channel (concurrency controlled via asyncio.Semaphore(4)):
         a. Check bot membership (skip if not member)
         b. Get channel details from DynamoDB (customer_name, jira_ticket)
         c. Fetch messages via MessagePreparer.prepare_messages_for_auto_status(since_ts=since_ts)
         d. Fetch JIRA comments if jira_ticket != "NOT YET AVAILABLE"
         e. Call OpenAI with handover prompt -> 1-2 bullet summary
         f. Format channel entry: <#channel_id> | Customer | JIRA link + bullets
         g. Skip channel if no messages AND no JIRA comments (nothing to report)
      8. Assemble Block Kit message:
         - Header: "*🔄 Shift Handover Summary*" with timestamp
         - Divider
         - One section block per channel with formatted entry
         - Footer: channel count + "Generated by Ketchup"
      9. If no channels have data: post "No active incidents to report"
      10. Post to HANDOVER_TARGET_CHANNEL
      11. Return {status, channel_count, timestamp}

      Error handling: per-channel try/except — one failing channel doesn't block others.
      Log failures, include in result dict.
    files:
      create:
        - ketchup_unified_scheduler/services/handover/__init__.py
        - ketchup_unified_scheduler/services/handover/generator.py
    commit: "feat(handover): implement handover summary generator with fresh data collection"

  # ── PHASE 4: Scheduler Task Registration ─────────────────────────
  - id: 6
    title: "Create handover task handler and register in unified scheduler"
    depends_on: [1, 5]
    description: >
      Create ketchup_unified_scheduler/tasks/handover_summary_task.py:

      1. async def handover_summary_task(container=None) -> None:
         - Calls generate_and_post_handover(container=container)
         - Logs result, raises RuntimeError on error status

      2. Dynamic TaskConfig factory:
         def get_handover_task_configs() -> list[TaskConfig]:
           """Generate one TaskConfig per schedule time from env var."""
           configs = []
           for i, time_str in enumerate(HANDOVER_SCHEDULE_TIMES):
               configs.append(TaskConfig(
                   name=f"handover_{i}",
                   handler=handover_summary_task,
                   schedule_time=time_str,
                   feature_flag="KETCHUP_HANDOVER_SUMMARY_ENABLED",
               ))
           return configs

      3. Register in ketchup_unified_scheduler/main.py:
         - Import get_handover_task_configs
         - In create_task_registry():
           for config in get_handover_task_configs():
               registry.register(config)
         - Update docstring to reflect 5+N tasks (N = len(schedule_times))
    files:
      create:
        - ketchup_unified_scheduler/tasks/handover_summary_task.py
      modify:
        - ketchup_unified_scheduler/main.py
    commit: "feat(handover): register dynamic handover tasks in unified scheduler"

  # ── PHASE 5: Tests ───────────────────────────────────────────────
  - id: 7
    title: "Add unit tests for handover feature"
    depends_on: [5, 6]
    description: >
      Create tests in tests/unit/handover/:

      test_handover_config.py:
      - Test default schedule times ("09:00,17:00")
      - Test custom env var override ("10:00,18:00")
      - Test single time ("09:00") produces one-element list
      - Test target channel default and override
      - Test message window default (12) and override

      test_handover_generator.py:
      - Test feature flag disabled returns early
      - Test no active channels produces "no incidents" message
      - Test channel with messages + JIRA formats correctly
      - Test channel with missing customer_name uses default
      - Test channel with no messages AND no JIRA is skipped
      - Test FEEDBACK_CHANNEL / ACCESS_REQUEST_CHANNEL excluded
      - Test bot not member of camp-oncall logs error
      - Test bot not member of incident channel skips that channel
      - Test per-channel error doesn't block other channels
      - Test Slack posting called with correct target channel and blocks
      - Test concurrency semaphore limits parallel AI calls

      test_handover_task.py:
      - Test get_handover_task_configs returns correct count from env
      - Test each config has unique name (handover_0, handover_1)
      - Test all configs share same handler and feature flag
      - Test single schedule time produces single config
      - Test three schedule times produces three configs

      test_handover_prompt.py:
      - Test system prompt is concise
      - Test channel prompt includes all three data sources
      - Test prompt enforces 1-2 bullet limit
    files:
      create:
        - tests/unit/handover/__init__.py
        - tests/unit/handover/test_handover_config.py
        - tests/unit/handover/test_handover_generator.py
        - tests/unit/handover/test_handover_task.py
        - tests/unit/handover/test_handover_prompt.py
    commit: "test(handover): add unit tests for config, generator, task, and prompt"

  # ── PHASE 6: Documentation ──────────────────────────────────────
  - id: 8
    title: "Update CLAUDE.md documentation"
    depends_on: [6]
    description: >
      Update CLAUDE.md:
      - Unified scheduler section: 5+N tasks (add handover_0..N)
      - Feature flags: add KETCHUP_HANDOVER_SUMMARY_ENABLED
      - Add KETCHUP_HANDOVER_SCHEDULE_TIMES, KETCHUP_HANDOVER_TARGET_CHANNEL,
        KETCHUP_HANDOVER_MESSAGE_WINDOW_HOURS to environment variables
      - Note camp-oncall (C03PWLW9P5H) in infrastructure section
    files:
      modify:
        - CLAUDE.md
    commit: "docs(handover): update CLAUDE.md with handover summary feature"

testing:
  unit:
    - "cd tests/setup && make test-fast"
    - "cd tests/setup && make test-parallel"
  lint:
    - "./check"
  manual:
    - "Set KETCHUP_HANDOVER_SUMMARY_ENABLED=true in docker-compose.local.yml"
    - "Set KETCHUP_HANDOVER_TARGET_CHANNEL to a test channel"
    - "Set KETCHUP_HANDOVER_SCHEDULE_TIMES to a time 2 min from now"
    - "Run unified scheduler locally, verify handover posts to test channel"
    - "Verify message contains channel links, customer names, JIRA links, bullets"
    - "Verify camp-oncall channel exemption (bot stays after eligibility check)"

risks:
  - risk: "AI calls for 50 channels take too long"
    mitigation: "Semaphore(4) limits concurrency; per-channel timeout; skip on failure"
  - risk: "No active channels at handover time"
    mitigation: "Post 'No active incidents' message"
  - risk: "Bot not member of camp-oncall"
    mitigation: "Membership check before posting; log error; don't crash"
  - risk: "Schedule times env var has unexpected format"
    mitigation: "Validation in config module; fail fast at import time"
  - risk: "12h message window too large for quiet channels"
    mitigation: "MessagePreparer handles empty results gracefully; channel skipped if no data"
