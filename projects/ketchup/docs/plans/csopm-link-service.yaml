        <task_description>
        Create the service that creates follow-up tickets and links them to CSOPM.

        Workflow:
        1. Modal submit handler extracts: project_key, issue_type_id, summary, description
        2. Extracts csopm_ticket_key from private_metadata
        3. Calls FollowUpTicketCreator.create_and_link()
        4. Creator creates new ticket via MCP
        5. Creator links new ticket <-> CSOPM with 'Relates' link type
        6. Returns result to handler
        7. Handler sends confirmation/error message to user

        FollowUpTicketCreator.create_and_link():
        1. Build issue fields from form data
        2. Call MCPClient.create_issue(project_key, issue_type_id, summary, description)
        3. If success, call MCPClient.link_issues(new_key, csopm_key, 'Relates')
        4. Return result object

        Link type: "Relates" (id: 10003)
        - Bidirectional: "relates to" <-> "relates to"
        - Both CSOPM and follow-up will show the link

        Error handling:
        - If ticket creation fails, return error without attempting link
        - If linking fails, return partial success (ticket created but not linked)
        - Log all errors for debugging
        </task_description>

