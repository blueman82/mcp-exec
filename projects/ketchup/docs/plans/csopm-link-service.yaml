# CSOPM Link Service Implementation Plan
# =====================================
#
# PRODUCERS:
#   Task 1 → CSOPMAssignmentTracker (DynamoDB tracking)
#   Task 2 → CSOPMPollingTask (TaskConfig for scheduler)
#   Task 3 → AsyncMCPClient.create_issue(), AsyncMCPClient.link_issues()
#   Task 4 → UserProjectDiscoveryService
#   Task 5 → SlackUserLookupService (LDAP → Slack ID)
#   Task 6 → CSOPMNotificationService (Slack DM)
#   Task 7 → CSOPMLinkModalBuilder
#   Task 8 → FollowUpTicketCreator
#
# CONSUMERS:
#   Task 2 → [1] (uses assignment tracker)
#   Task 6 → [5] (uses Slack user lookup)
#   Task 7 → [3, 4] (uses MCP client, project discovery)
#   Task 8 → [3, 7] (uses MCP client, modal data)
#   Task 9 → [1, 2, 5, 6, 7, 8] (integrates all services)
#   Task 10 → [1-9] (tests all components)
#
# VALIDATION: All consumers depend_on producers ✓

conductor:
  default_agent: fastapi-pro
  worktree_groups:
    - group_id: "phase1-foundation"
      tasks: [1, 2, 3]
      rationale: "Foundation: assignment tracking, polling task, MCP extensions"
    - group_id: "phase2-notification"
      tasks: [4, 5, 6]
      rationale: "Notification: project discovery, Slack lookup, DM service"
    - group_id: "phase3-interactive"
      tasks: [7, 8]
      rationale: "Interactive: modal builder, ticket creation"
    - group_id: "phase4-integration"
      tasks: [9, 10]
      rationale: "Integration: registration, testing"

planner_compliance:
  planner_version: "4.0.0"
  strict_enforcement: true
  required_features: [dependency_checks, test_commands, success_criteria, data_flow_registry]

data_flow_registry:
  producers:
    CSOPMAssignmentTracker:
      - task: 1
        description: "Creates DynamoDB-backed assignment tracking service"
    CSOPMPollingTask:
      - task: 2
        description: "Creates TaskConfig for unified scheduler CSOPM polling"
    AsyncMCPClientExtensions:
      - task: 3
        description: "Adds create_issue, link_issues, get_issuetype wrappers to AsyncMCPClient"
    UserProjectDiscoveryService:
      - task: 4
        description: "Creates service to discover user's accessible JIRA projects"
    SlackUserLookupService:
      - task: 5
        description: "Creates email-to-Slack-ID lookup service"
    CSOPMNotificationService:
      - task: 6
        description: "Creates Slack DM notification service for CSOPM assignments"
    CSOPMLinkModalBuilder:
      - task: 7
        description: "Creates Slack modal for follow-up ticket creation"
    FollowUpTicketCreator:
      - task: 8
        description: "Creates service for JIRA ticket creation and bidirectional linking"
  consumers:
    CSOPMAssignmentTracker:
      - task: 2
        description: "Polling task uses tracker to avoid re-notifying"
      - task: 9
        description: "Integration registers tracker in TypedDI"
    AsyncMCPClientExtensions:
      - task: 7
        description: "Modal uses get_issuetype for dynamic forms"
      - task: 8
        description: "Ticket creator uses create_issue and link_issues"
    UserProjectDiscoveryService:
      - task: 7
        description: "Modal uses project discovery for dropdown"
    SlackUserLookupService:
      - task: 6
        description: "Notification service uses Slack lookup"
    CSOPMNotificationService:
      - task: 9
        description: "Integration registers notification in scheduler"
    CSOPMLinkModalBuilder:
      - task: 9
        description: "Integration registers modal handlers"
    FollowUpTicketCreator:
      - task: 9
        description: "Integration registers ticket creator"

plan:
  metadata:
    feature_name: "CSOPM Link Service"
    created: "2026-01-05"
    target: "Notify CSOPM ticket assignees via Slack DM, allow them to create follow-up tickets in any accessible project with bidirectional linking"
    estimated_tasks: 10
    complexity: "high"

  context:
    framework: "Python/FastAPI"
    test_framework: "pytest"
    slack_sdk: "Block Kit"
    jira_integration: "corp-jira MCP"
    scheduler: "ketchup_unified_scheduler"
    di_framework: "TypedDI"

  business_requirements:
    trigger: "CSOPM ticket assignment change detected"
    notify: "JIRA assignee via Slack DM"
    project_selection: "Dynamic - query user's recent JIRA activity to discover accessible projects"
    fallback: "Pre-configured project list + free-text entry for users with no JIRA history"
    linking: "Bidirectional using 'Relates' link type"
    tracking: "DynamoDB table to prevent duplicate notifications"

  technical_discoveries:
    jira_user_format: "assignee.name field contains LDAP username (e.g., 'fontaine')"
    project_discovery_jql: 'assignee = "{username}" OR reporter = "{username}" ORDER BY updated DESC'
    link_type: "Relates (id: 10003) - bidirectional 'relates to' ↔ 'relates to'"
    mcp_tools_available:
      - "search_jira_issues - JQL search"
      - "create_jira_issue - Create new issues"
      - "link_issues - Link two issues"
      - "get_jira_issuetype - Get project issue types"
      - "get_jira_issuetype_metadata - Get required fields for issue creation"
      - "get_project_config - Get project metadata"

  tasks:
    # ========================================
    # PHASE 1: FOUNDATION
    # ========================================

    - task_number: "1"
      name: "Create CSOPM Assignment Tracker Service"
      agent: "fastapi-pro"
      files:
        - "ketchup_unified_scheduler/services/csopm_link/assignment_tracker.py"
        - "packages/db/csopm_assignment_store.py"
      depends_on: []

      success_criteria:
        - "CSOPMAssignmentStore class created with DynamoDB operations for tracking notified assignments"
        - "Methods: is_notified(ticket_key, assignee), mark_notified(ticket_key, assignee, timestamp)"
        - "DynamoDB table name configurable via CSOPM_ASSIGNMENT_TABLE env var, default 'ketchup_csopm_assignments'"
        - "TTL attribute set on records (30 days default) for automatic cleanup"
        - "Composite key: ticket_key (PK), assignee_username (SK) for efficient lookups"
        - "CSOPMAssignmentTracker facade class wraps store with business logic"
        - "Tracker.should_notify(ticket_key, assignee) returns True only if not previously notified"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "No unused variables"
        - "All imports resolve correctly"

      test_commands:
        - "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup/tests/setup && make test-parallel ARGS='-k test_csopm_assignment'"

      runtime_metadata:
        dependency_checks:
          - command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c 'from packages.db.dynamodb_base import DynamoDBBase; print(\"Import OK\")'"
            description: "Verify DynamoDB base class is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c "from packages.db.dynamodb_base import DynamoDBBase"
            ls packages/db/
          </commands>
        </dependency_verification>
        <task_description>
        Create the assignment tracking infrastructure to prevent duplicate notifications.

        When a CSOPM ticket is assigned, we need to notify the assignee ONCE. If the polling
        cycle runs again before the user takes action, we should NOT re-notify.

        Architecture:
        1. CSOPMAssignmentStore (packages/db/) - Low-level DynamoDB operations
           - Table: ketchup_csopm_assignments
           - Schema: ticket_key (PK), assignee_username (SK), notified_at, ttl
           - TTL: 30 days (cleanup old records automatically)

        2. CSOPMAssignmentTracker (ketchup_unified_scheduler/services/csopm_link/)
           - Business logic facade
           - should_notify() - Check if we should send notification
           - record_notification() - Mark as notified after sending

        Follow patterns from:
        - packages/db/channel_store.py for DynamoDB operations
        - packages/db/user_store.py for store patterns
        </task_description>

      implementation:
        approach: |
          Create two classes following existing patterns:
          1. CSOPMAssignmentStore - extends DynamoDBBase for table operations
          2. CSOPMAssignmentTracker - business logic layer
        key_points:
          - point: "CSOPMAssignmentStore extends DynamoDBBase"
            details: "Use existing DynamoDB patterns from packages/db/ for consistent error handling and logging"
            reference: "packages/db/channel_store.py"
          - point: "Composite key for efficient lookups"
            details: "PK: ticket_key, SK: assignee_username allows querying all assignments for a ticket"
            reference: "DynamoDB best practices"
          - point: "TTL for automatic cleanup"
            details: "Set ttl attribute to 30 days from notified_at to automatically remove old records"
            reference: "AWS DynamoDB TTL feature"
          - point: "CSOPMAssignmentTracker as facade"
            details: "Simple interface: should_notify(), record_notification() hiding DynamoDB complexity"
            reference: "packages/db/user_store.py pattern"

      code_quality:
        python:
          lint_check:
            command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && ruff check ketchup_unified_scheduler/services/csopm_link/ packages/db/csopm_assignment_store.py"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "add CSOPM assignment tracking service for duplicate notification prevention"
        files:
          - "ketchup_unified_scheduler/services/csopm_link/**"
          - "packages/db/csopm_assignment_store.py"

    - task_number: "2"
      name: "Create CSOPM Polling Task for Unified Scheduler"
      agent: "fastapi-pro"
      files:
        - "ketchup_unified_scheduler/tasks/csopm_link_task.py"
        - "ketchup_unified_scheduler/services/csopm_link/polling_service.py"
      depends_on: [1]

      success_criteria:
        - "CSOPMPollingService polls CSOPM project for recently assigned tickets"
        - "JQL query: 'project = CSOPM AND assignee CHANGED AFTER -{interval}m ORDER BY updated DESC'"
        - "Service extracts assignee.name (LDAP username) and assignee.emailAddress from each ticket"
        - "Service uses CSOPMAssignmentTracker.should_notify() to filter already-notified assignments"
        - "Returns list of (ticket_key, assignee_username, assignee_email, ticket_summary) tuples"
        - "get_csopm_link_task_config() returns TaskConfig with 15-minute interval"
        - "Feature flag: KETCHUP_CSOPM_LINK_FEATURE"
        - "csopm_link_task async function follows jira_report_task pattern"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "No unused variables"
        - "All imports resolve correctly"

      test_commands:
        - "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup/tests/setup && make test-parallel ARGS='-k test_csopm_link_task or test_csopm_polling'"

      runtime_metadata:
        dependency_checks:
          - command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c 'from ketchup_unified_scheduler.task_config import TaskConfig; print(\"Import OK\")'"
            description: "Verify TaskConfig is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c "from ketchup_unified_scheduler.task_config import TaskConfig"
            cat ketchup_unified_scheduler/tasks/jira_report_task.py
          </commands>
        </dependency_verification>
        <task_description>
        Create the CSOPM polling task that runs in the unified scheduler.

        The polling service:
        1. Queries CSOPM project for tickets with recent assignee changes
        2. JQL: 'project = CSOPM AND assignee CHANGED AFTER -15m'
        3. For each ticket, extracts assignee info (username, email)
        4. Checks with assignment tracker if we should notify
        5. Returns list of assignments needing notification

        The task config:
        - 15-minute interval (same as metadata_updater)
        - Feature flag: KETCHUP_CSOPM_LINK_FEATURE
        - Follows jira_report_task.py pattern exactly

        Key JIRA fields to extract:
        - key (ticket key like CSOPM-12345)
        - summary (ticket title)
        - assignee.name (LDAP username)
        - assignee.emailAddress (for Slack lookup)
        - assignee.displayName (for notification message)
        </task_description>

      implementation:
        approach: |
          Follow the jira_report_task.py pattern for task structure.
          Create CSOPMPollingService for the business logic.
        key_points:
          - point: "JQL for assignee changes"
            details: "Use 'assignee CHANGED AFTER -15m' to catch recent assignments within polling interval"
            reference: "JIRA JQL documentation"
          - point: "Extract assignee fields"
            details: "assignee.name contains LDAP username (e.g., 'fontaine'), emailAddress for Slack lookup"
            reference: "Discovered in testing: assignee.name = LDAP username"
          - point: "Integration with assignment tracker"
            details: "Call tracker.should_notify() before adding to notification list"
            reference: "Task 1 CSOPMAssignmentTracker"
          - point: "TaskConfig pattern"
            details: "Return TaskConfig with name='csopm_link', interval_minutes=15, feature_flag='KETCHUP_CSOPM_LINK_FEATURE'"
            reference: "ketchup_unified_scheduler/tasks/jira_report_task.py:44-57"

      code_quality:
        python:
          lint_check:
            command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && ruff check ketchup_unified_scheduler/tasks/csopm_link_task.py ketchup_unified_scheduler/services/csopm_link/"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "add CSOPM polling task for unified scheduler"
        files:
          - "ketchup_unified_scheduler/tasks/csopm_link_task.py"
          - "ketchup_unified_scheduler/services/csopm_link/polling_service.py"

    - task_number: "3"
      name: "Extend MCP Client with Issue Creation and Linking"
      agent: "fastapi-pro"
      files:
        - "packages/integrations/async_mcp_client.py"
      depends_on: []

      success_criteria:
        - "AsyncMCPClient.create_issue(project_key, issue_type_id, summary, description, fields) method added"
        - "AsyncMCPClient.link_issues(inward_key, outward_key, link_type='Relates') method added"
        - "AsyncMCPClient.get_issuetype(project_key) method added returning available issue types"
        - "AsyncMCPClient.get_issuetype_metadata(project_key, issue_type_id) method added for field requirements"
        - "All methods use existing rate_limiter.acquire() pattern"
        - "All methods use existing _call_mcp_tool() pattern"
        - "Error handling follows existing patterns (log errors, return None or raise)"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "No unused variables"
        - "All imports resolve correctly"

      test_commands:
        - "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup/tests/setup && make test-parallel ARGS='-k test_mcp_client'"

      runtime_metadata:
        dependency_checks:
          - command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c 'from packages.integrations.async_mcp_client import AsyncMCPClient; print(\"Import OK\")'"
            description: "Verify AsyncMCPClient imports correctly"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c "from packages.integrations.async_mcp_client import AsyncMCPClient"
            cat packages/integrations/async_mcp_client.py | head -100
          </commands>
        </dependency_verification>
        <task_description>
        Extend the MCP client with methods needed for follow-up ticket creation and linking.

        The corp-jira MCP server provides these tools that we need wrappers for:
        1. create_jira_issue - Create new issues
        2. link_issues - Link two issues together
        3. get_jira_issuetype - Get issue types for a project
        4. get_jira_issuetype_metadata - Get required fields for issue creation

        New methods to add to AsyncMCPClient:

        1. create_issue(project_key, issue_type_id, summary, description, fields=None)
           - Calls create_jira_issue MCP tool
           - Returns created issue key or None on failure

        2. link_issues(inward_key, outward_key, link_type='Relates')
           - Calls link_issues MCP tool
           - Returns True on success, False on failure

        3. get_issuetype(project_key)
           - Calls get_jira_issuetype MCP tool
           - Returns list of {id, name, description} dicts

        4. get_issuetype_metadata(project_key, issue_type_id)
           - Calls get_jira_issuetype_metadata MCP tool
           - Returns field metadata for creating issues of that type

        Follow existing patterns in async_mcp_client.py for error handling and rate limiting.
        </task_description>

      implementation:
        approach: |
          Add new methods to AsyncMCPClient following the existing search_issues pattern.
        key_points:
          - point: "create_issue method"
            details: "Call _call_mcp_tool('create_jira_issue', {...}) with project, issuetype, summary, description, fields"
            reference: "packages/integrations/async_mcp_client.py (search_issues pattern)"
          - point: "link_issues method"
            details: "Call _call_mcp_tool('link_issues', {inwardIssue, outwardIssue, linkType})"
            reference: "MCP tool schema: link_issues"
          - point: "get_issuetype method"
            details: "Call _call_mcp_tool('get_jira_issuetype', {projectIdOrKey})"
            reference: "MCP tool schema: get_jira_issuetype"
          - point: "Rate limiting"
            details: "All new methods must call await self.rate_limiter.acquire() before MCP call"
            reference: "packages/integrations/async_mcp_client.py (rate_limiter pattern)"

      code_quality:
        python:
          lint_check:
            command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && ruff check packages/integrations/async_mcp_client.py"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "add create_issue, link_issues, get_issuetype methods to AsyncMCPClient"
        files:
          - "packages/integrations/async_mcp_client.py"

    # ========================================
    # PHASE 2: NOTIFICATION
    # ========================================

    - task_number: "4"
      name: "Create User Project Discovery Service"
      agent: "fastapi-pro"
      files:
        - "ketchup_unified_scheduler/services/csopm_link/project_discovery.py"
      depends_on: [3]

      success_criteria:
        - "UserProjectDiscoveryService class queries user's accessible JIRA projects"
        - "discover_projects(username) method uses JQL: 'assignee = \"{username}\" OR reporter = \"{username}\"'"
        - "Extracts unique project keys from query results (max 100 issues sampled)"
        - "Returns list of {key, name} dicts sorted alphabetically by key"
        - "get_fallback_projects() returns pre-configured list when user has no JIRA history"
        - "Fallback projects configurable via CSOPM_FALLBACK_PROJECTS env var"
        - "Default fallback: ['CPGNREQ', 'CPGNTT', 'CPGNCX', 'NEO', 'CSOPM']"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "No unused variables"
        - "All imports resolve correctly"

      test_commands:
        - "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup/tests/setup && make test-parallel ARGS='-k test_project_discovery'"

      runtime_metadata:
        dependency_checks:
          - command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c 'from packages.integrations.async_mcp_client import AsyncMCPClient; print(\"Import OK\")'"
            description: "Verify AsyncMCPClient with new methods is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c "from packages.integrations.async_mcp_client import AsyncMCPClient"
          </commands>
        </dependency_verification>
        <task_description>
        Create service to discover which JIRA projects a user has access to.

        Discovery approach (proven to work in testing):
        1. Query: assignee = "{username}" OR reporter = "{username}"
        2. Extract unique project.key values from results
        3. Return sorted list of accessible projects

        For users with no JIRA history (new users), use fallback list:
        - CPGNREQ (Campaign Requests)
        - CPGNTT (Campaign Trouble Tickets)
        - CPGNCX (Campaign CX)
        - NEO (Adobe Campaign Classic)
        - CSOPM (CSO Problem Management)

        The service should:
        1. Try discovery first
        2. If empty results, return fallback list
        3. Optionally merge discovery + fallback for comprehensive list

        Configuration via env vars:
        - CSOPM_FALLBACK_PROJECTS: Comma-separated project keys
        - CSOPM_MAX_DISCOVERY_RESULTS: Max issues to sample (default 100)
        </task_description>

      implementation:
        approach: |
          Create UserProjectDiscoveryService that uses MCPClient.search_issues()
          with user activity JQL to discover accessible projects.
        key_points:
          - point: "JQL for user activity"
            details: "assignee = \"{username}\" OR reporter = \"{username}\" ORDER BY updated DESC"
            reference: "Tested successfully with corp-jira MCP"
          - point: "Extract unique projects"
            details: "Loop through results, extract fields.project.key, deduplicate with set()"
            reference: "Tested: returns projects like ['CSOPM', 'CPGNREQ', 'CPGNTT']"
          - point: "Fallback configuration"
            details: "CSOPM_FALLBACK_PROJECTS env var, split by comma, default Campaign-related projects"
            reference: "Similar to VALID_JIRA_PROJECTS in packages/core/jira_constants.py"
          - point: "Merge strategy"
            details: "Return discovery results + fallback, deduplicated, sorted"
            reference: "Ensures new users see common projects"

      code_quality:
        python:
          lint_check:
            command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && ruff check ketchup_unified_scheduler/services/csopm_link/project_discovery.py"
            exit_on_failure: true

      commit:
        type: "feat"
        message: "add user project discovery service for CSOPM link"
        files:
          - "ketchup_unified_scheduler/services/csopm_link/project_discovery.py"

    - task_number: "5"
      name: "Create Slack User Lookup Service"
      agent: "fastapi-pro"
      files:
        - "packages/slack/user_operations/slack_user_lookup.py"
      depends_on: []

      success_criteria:
        - "SlackUserLookupService class looks up Slack user ID from email address"
        - "lookup_by_email(email) method uses Slack users.lookupByEmail API"
        - "Returns Slack user ID string or None if not found"
        - "Caches results in-memory to avoid repeated API calls"
        - "lookup_by_ldap(ldap_username) convenience method appends @adobe.com domain"
        - "Handles rate limiting with exponential backoff"
        - "Logs warnings for users not found in Slack"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "No unused variables"
        - "All imports resolve correctly"

      test_commands:
        - "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup/tests/setup && make test-parallel ARGS='-k test_slack_user_lookup'"

      runtime_metadata:
        dependency_checks:
          - command: "cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c 'from packages.slack.core.slack_async_client import SlackAsyncClient; print(\"Import OK\")'"
            description: "Verify SlackAsyncClient is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cd /Users/harrison/Documents/Github/camp-ops-emea/projects/ketchup && . .venv/bin/activate && PYTHONPATH=. python -c "from packages.slack.core.slack_async_client import SlackAsyncClient"
            cat packages/slack/user_operations/user_ops.py | head -60
          </commands>
        </dependency_verification>
        <task_description>
        Create service to look up Slack user IDs from email addresses.

        When we get a CSOPM ticket assignee, we have their email (e.g., fontaine@adobe.com).
        We need to convert this to a Slack user ID to send them a DM.

        Slack API: users.lookupByEmail
        - Input: email
        - Output: user object with id field

        Service features:
        1. lookup_by_email(email) - Primary lookup method
        2. lookup_by_ldap(username) - Convenience wrapper adding @adobe.com
        3. In-memory cache to avoid repeated lookups
        4. Rate limiting with exponential backoff
        5. Graceful handling of users not in Slack

        Follow patterns from:
        - packages/slack/user_operations/user_ops.py (SlackUserOps)
        - packages/slack/core/slack_async_client.py (base class)
        </task_description>

      implementation:
        approach: |
          Create SlackUserLookupService extending SlackAsyncClient,
          adding email-to-Slack-ID lookup capability.
        key_points:
          - point: "Slack users.lookupByEmail API"
            details: "POST to /users.lookupByEmail with email parameter, returns user.id"
            reference: "Slack Web API documentation"
          - point: "In-memory cache"
            details: "Dict[email, slack_id] to cache successful lookups"
