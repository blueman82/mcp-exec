# CSOPM Assignment Notification System - Implementation Plan
# Generated: 2026-01-06
# Based on design session with 7 approved sections
#
# PRODUCERS: Task 1 → CSOPMNotifierProtocol, Task 2 → SlackUserOps.get_slack_id_by_email
# PRODUCERS: Task 3 → CSOPMStateTracker, Task 4 → CSOPMJIRAPoller
# PRODUCERS: Task 5 → CSOPMSlackNotifier, Task 6 → CSOPMReminderService
# CONSUMERS: Task 7 → [1,2,3,4,5,6], Task 8 → [1,2,3,4,5,6,7]
# VALIDATION: All consumers depend_on producers ✓

conductor:
  default_agent: python-backend-tdd-agent
  worktree_groups:
    - group_id: "foundation"
      tasks: [1, 2]
      rationale: "Protocol and email lookup - foundation for all services"
    - group_id: "core-services"
      tasks: [3, 4, 5, 6]
      rationale: "Core service implementations can be parallelized"
    - group_id: "integration"
      tasks: [7, 8]
      rationale: "TypedDI wiring and FastAPI endpoints"
    - group_id: "infrastructure"
      tasks: [9, 10, 11]
      rationale: "Docker, deployment, and testing"
planner_compliance:
  planner_version: "4.0.0"
  strict_enforcement: true
  required_features:
    - dependency_checks
    - test_commands
    - success_criteria
    - data_flow_registry
data_flow_registry:
  producers:
    CSOPMNotifierProtocol:
      - task: 1
        description: "Defines protocol interface for all CSOPM services"
    get_slack_id_by_email:
      - task: 2
        description: "New method in SlackUserOps for email→Slack ID lookup"
    CSOPMStateTracker:
      - task: 3
        description: "DynamoDB state management for notifications"
    CSOPMJIRAPoller:
      - task: 4
        description: "JIRA polling via MCP client"
    CSOPMSlackNotifier:
      - task: 5
        description: "Slack DM sending and button handling"
    CSOPMReminderService:
      - task: 6
        description: "7-day and 45-day reminder logic"
    CSOPMNotifierContainer:
      - task: 7
        description: "TypedDI container setup"
  consumers:
    CSOPMNotifierProtocol:
      - task: 3
        description: "StateTracker implements protocol"
      - task: 4
        description: "JIRAPoller implements protocol"
      - task: 5
        description: "SlackNotifier implements protocol"
      - task: 6
        description: "ReminderService implements protocol"
    get_slack_id_by_email:
      - task: 5
        description: "SlackNotifier uses for assignee lookup"
    CSOPMStateTracker:
      - task: 5
        description: "SlackNotifier uses for state queries"
      - task: 6
        description: "ReminderService uses for state updates"
      - task: 7
        description: "Container wires StateTracker"
    CSOPMJIRAPoller:
      - task: 7
        description: "Container wires JIRAPoller"
    CSOPMSlackNotifier:
      - task: 7
        description: "Container wires SlackNotifier"
    CSOPMReminderService:
      - task: 7
        description: "Container wires ReminderService"
    CSOPMNotifierContainer:
      - task: 8
        description: "Main entry point uses container"
plan:
  metadata:
    feature_name: "CSOPM Assignment Notification System"
    created: "2026-01-06"
    target: "Automated CSOPM ticket notification with 3-ping retry, 7/45-day reminders, and metrics tracking"
    estimated_tasks: 11
    estimated_time: "3-4 days with parallelization"
  context:
    framework: "Python 3.12 + FastAPI"
    test_framework: "pytest + pytest-asyncio"
    package_manager: "uv"
    infrastructure: "Docker on EC2 (prod1/prod2)"
  tasks:
    # ============================================================
    # PHASE 1: FOUNDATION (Sequential)
    # ============================================================
    - task_number: "1"
      name: "Create CSOPM Notifier Protocol Definitions"
      agent: "python-backend-tdd-agent"
      files:
        - "packages/core/typed_di/service_registrations/protocols/csopm_protocols.py"
        - "packages/core/typed_di/protocols.py"
        - "tests/unit/typed_di/test_csopm_protocols.py"
      depends_on: []
      success_criteria:
        - "CSOPMJIRAPollerProtocol defines poll_for_new_assignments() returning List[CSOPMTicket]"
        - "CSOPMStateTrackerProtocol defines get_notification_record(), update_notification_status(), record_followup()"
        - "CSOPMSlackNotifierProtocol defines send_assignment_dm(), send_reminder_dm(), handle_button_action()"
        - "CSOPMReminderServiceProtocol defines check_rca_reminders(), check_closure_reminders()"
        - "CSOPMMetricsProtocol defines increment_counter() with counter_name parameter"
        - "All protocols re-exported in packages/core/typed_di/protocols.py"
        - "No TODO comments in production code"
        - "No placeholder structs"
        - "All imports resolve"
      test_commands:
        - "cd tests/setup && make test-typed-di"
        - "uv run pytest tests/unit/typed_di/test_csopm_protocols.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "PYTHONPATH=. uv run python -c 'from packages.core.typed_di.protocols import *'"
            description: "Verify protocol imports"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            ls packages/core/typed_di/service_registrations/protocols/
            grep -l "Protocol" packages/core/typed_di/service_registrations/protocols/*.py
          </commands>
        </dependency_verification>
        <task_description>
          Define TypedDI protocols for all CSOPM notifier services following existing patterns
          in slack_protocols.py and service_protocols.py. Each protocol should use
          @runtime_checkable decorator and define async methods.
        </task_description>
      implementation:
        approach: |
          Follow existing protocol patterns in packages/core/typed_di/service_registrations/protocols/.
          Define data classes for CSOPMTicket, NotificationRecord, and FollowupRecord.
          Use typing.Protocol with @runtime_checkable for all service protocols.
        key_points:
          - point: "CSOPMTicket dataclass"
            details: "Fields: key, summary, assignee_username, created_at, status, exigence_id"
            reference: "packages/core/typed_di/service_registrations/protocols/csopm_protocols.py"
          - point: "NotificationRecord dataclass"
            details: "Fields: ticket_key, notification_status, ping_count, assignee_slack_id, rca_reminder_sent, closure_reminder_sent"
            reference: "packages/core/typed_di/service_registrations/protocols/csopm_protocols.py"
          - point: "Protocol async method signatures"
            details: "All methods must be async def with proper return type hints"
            reference: "packages/core/typed_di/service_registrations/protocols/slack_protocols.py"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add CSOPM notifier protocol definitions for TypedDI"
        files:
          - "packages/core/typed_di/**"
          - "tests/unit/typed_di/**"
      status: "failed"
    - task_number: "2"
      name: "Add Email-to-Slack Lookup Method"
      agent: "python-backend-tdd-agent"
      files:
        - "packages/slack/user_operations/user_ops.py"
        - "tests/unit/slack/user_operations/test_user_ops_email.py"
      depends_on: []
      success_criteria:
        - "SlackUserOps.get_slack_id_by_email() calls Slack users.lookupByEmail API"
        - "Email lookup checks DynamoDB cache (EMAIL_TO_SLACK#{email}) before API call"
        - "Successful lookups stored in DynamoDB permanently (no TTL)"
        - "Method uses @with_exponential_backoff decorator for retry"
        - "Returns Optional[str] - Slack user ID or None if not found"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "uv run pytest tests/unit/slack/user_operations/test_user_ops_email.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "grep -n 'lookupByEmail' packages/slack/user_operations/user_ops.py || echo 'Not found - will add'"
            description: "Check if method exists"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            grep -n "get_user_names" packages/slack/user_operations/user_ops.py | head -5
            grep -n "with_exponential_backoff" packages/slack/user_operations/user_ops.py
          </commands>
        </dependency_verification>
        <task_description>
          Extend SlackUserOps with get_slack_id_by_email() method following the existing
          get_user_names() pattern. Implement 3-level lookup: memory cache → DynamoDB → Slack API.
          Cache results in DynamoDB with PK=EMAIL_TO_SLACK#{email}, SK=METADATA.
        </task_description>
      implementation:
        approach: |
          Follow the existing multi-level caching pattern in get_user_names().
          Use Slack's users.lookupByEmail endpoint for API calls.
          Store results permanently in DynamoDB (no TTL as per design decision).
        key_points:
          - point: "get_slack_id_by_email async method"
            details: "Parameters: email (str), Returns: Optional[str] Slack user ID"
            reference: "packages/slack/user_operations/user_ops.py"
          - point: "DynamoDB cache schema"
            details: "PK: EMAIL_TO_SLACK#{email}, SK: METADATA, slack_user_id: str, cached_at: ISO timestamp"
            reference: "packages/db/dynamodb_store.py"
          - point: "Backoff decorator"
            details: "Apply @with_exponential_backoff(max_retries=3) to _fetch_slack_id_by_email_internal"
            reference: "packages/core/resilience/backoff.py"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add email-to-Slack user ID lookup with DynamoDB caching"
        files:
          - "packages/slack/user_operations/**"
          - "tests/unit/slack/user_operations/**"
      status: "failed"
    # ============================================================
    # PHASE 2: CORE SERVICES (Parallel - 4 tasks)
    # ============================================================
    - task_number: "3"
      name: "Implement CSOPMStateTracker Service"
      agent: "python-backend-tdd-agent"
      files:
        - "ketchup_csopm_notifier/services/state_tracker.py"
        - "tests/unit/csopm_notifier/test_state_tracker.py"
      depends_on:
        - 1
      success_criteria:
        - "CSOPMStateTracker implements CSOPMStateTrackerProtocol"
        - "get_notification_record() queries DynamoDB with PK=CSOPM_NOTIFICATION#{ticket_key}"
        - "update_notification_status() uses DynamoDB update_item with proper type descriptors"
        - "record_followup() creates SK=FOLLOWUP#{followup_key} records"
        - "get_all_active_notifications() returns records where notification_status != 'escalated'"
        - "handle_reassignment() updates assignee fields and resets ping_count"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "uv run pytest tests/unit/csopm_notifier/test_state_tracker.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "PYTHONPATH=. uv run python -c 'from packages.db.dynamodb_store import DynamoDBStore'"
            description: "Verify DynamoDB store import"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            grep -n "put_item\|update_item\|query" packages/db/dynamodb_store.py | head -10
            cat packages/db/operations/base_operations.py | head -50
          </commands>
        </dependency_verification>
        <task_description>
          Implement DynamoDB state tracking for CSOPM notifications.
          Follow the existing operations pattern in packages/db/operations/.
          Use proper DynamoDB type descriptors ({"S": value}, {"N": str(num)}, {"BOOL": bool}).
        </task_description>
      implementation:
        approach: |
          Create CSOPMStateTracker in ketchup_csopm_notifier/services/state_tracker.py.
          Inject DynamoDBStore via constructor. Use client.put_item(), client.update_item(),
          client.query() methods with proper type descriptors.
        key_points:
          - point: "DynamoDB type descriptors"
            details: "All values must use {'S': str}, {'N': str(num)}, {'BOOL': bool}, {'L': list}"
            reference: "packages/db/dynamodb_store.py:265"
          - point: "Query pattern for active notifications"
            details: "Scan with FilterExpression for notification_status != escalated"
            reference: "packages/db/operations/channel_operations.py"
          - point: "Reassignment handling"
            details: "Update assignee_jira_username, assignee_slack_id, reset ping_count=1, append to assignee_history"
            reference: "Design Section 4"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add CSOPMStateTracker for DynamoDB notification state management"
        files:
          - "ketchup_csopm_notifier/**"
          - "tests/unit/csopm_notifier/**"
    - task_number: "4"
      name: "Implement CSOPMJIRAPoller Service"
      agent: "python-backend-tdd-agent"
      files:
        - "ketchup_csopm_notifier/services/jira_poller.py"
        - "tests/unit/csopm_notifier/test_jira_poller.py"
      depends_on:
        - 1
      success_criteria:
        - "CSOPMJIRAPoller implements CSOPMJIRAPollerProtocol"
        - "poll_for_new_assignments() uses JQL: project = CSOPM AND assignee IS NOT EMPTY AND status = 'New'"
        - "Calls AsyncMCPClient.search_issues() via search_jira_issues MCP tool"
        - "Parses response.data.issues into List[CSOPMTicket] dataclass instances"
        - "check_for_reassignment() compares current assignee to stored record"
        - "Extracts exigence_id from ticket description using regex pattern"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "uv run pytest tests/unit/csopm_notifier/test_jira_poller.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "PYTHONPATH=. uv run python -c 'from packages.integrations.async_mcp_client import AsyncMCPClient'"
            description: "Verify MCP client import"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            grep -n "search_issues" packages/integrations/async_mcp_client.py | head -5
            grep -n "search_jira_issues" ketchup_unified_scheduler/services/jira_reporter/ticket_discovery.py
          </commands>
        </dependency_verification>
        <task_description>
          Implement JIRA polling via MCP client following the pattern in
          ketchup_unified_scheduler/services/jira_reporter/ticket_discovery.py.
          Filter for NEW status CSOPM tickets with assignees.
        </task_description>
      implementation:
        approach: |
          Create CSOPMJIRAPoller in ketchup_csopm_notifier/services/jira_poller.py.
          Inject AsyncMCPClient via constructor. Use search_issues() method with JQL.
          Parse JIRA response into CSOPMTicket dataclass instances.
        key_points:
          - point: "JQL query construction"
            details: "project = CSOPM AND assignee IS NOT EMPTY AND status = 'New' AND created >= -1d ORDER BY created DESC"
            reference: "Design Section 3"
          - point: "Response parsing"
            details: "Access result.data.issues, extract fields: key, summary, status.name, assignee.name, created"
            reference: "packages/integrations/async_mcp_client.py"
          - point: "Exigence ID extraction"
            details: "Regex pattern for 5-6 digit ID in description URL: r'/events/(\\d{5,6})/'"
            reference: "Design Section 5"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add CSOPMJIRAPoller for MCP-based JIRA ticket discovery"
        files:
          - "ketchup_csopm_notifier/**"
          - "tests/unit/csopm_notifier/**"
    - task_number: "5"
      name: "Implement CSOPMSlackNotifier Service"
      agent: "python-backend-tdd-agent"
      files:
        - "ketchup_csopm_notifier/services/slack_notifier.py"
        - "ketchup_csopm_notifier/blocks/notification_blocks.py"
        - "tests/unit/csopm_notifier/test_slack_notifier.py"
      depends_on:
        - 1
        - 2
        - 3
      success_criteria:
        - "CSOPMSlackNotifier implements CSOPMSlackNotifierProtocol"
        - "send_assignment_dm() uses SlackUserOps.get_slack_id_by_email() to resolve assignee"
        - "DM contains Block Kit with buttons: Acknowledge, Create Follow-up, Done, View in JIRA"
        - "handle_acknowledge() updates state to 'ack', posts JIRA comment, increments metric"
        - "handle_create_followup() opens modal with dynamic project/issue type fields"
        - "handle_done() posts batch comment if follow-ups exist, simple statement otherwise"
        - "Increments csopm_notifications_sent metric on successful DM"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "pytest tests/unit/csopm_notifier/test_slack_notifier.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "PYTHONPATH=. uv run python -c 'from packages.slack.messages.posting import SlackPostingHandler'"
            description: "Verify Slack posting import"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            grep -n "post_message\|chat_postMessage" packages/slack/messages/posting.py | head -5
            ls packages/slack/blockkits/
          </commands>
        </dependency_verification>
        <task_description>
          Implement Slack notification service with Block Kit messages and button handlers.
          Follow existing patterns in packages/slack/interactive_elements/.
          Create reusable block builders in ketchup_csopm_notifier/blocks/.
        </task_description>
      implementation:
        approach: |
          Create CSOPMSlackNotifier using SlackPostingHandler for DM sending.
          Build Block Kit messages with action buttons using Slack's block kit format.
          Implement button action handlers following payload_processor.py patterns.
        key_points:
          - point: "Block Kit message structure"
            details: "Section with ticket info, Actions block with 4 buttons, each with unique action_id prefix 'csopm_'"
            reference: "packages/slack/blockkits/handlers/"
          - point: "Email to Slack ID resolution"
            details: "Build email as {jira_username}@adobe.com, call get_slack_id_by_email()"
            reference: "Task 2 - SlackUserOps extension"
          - point: "JIRA comment on acknowledge"
            details: "Call AsyncMCPClient.create_issue_comment() with acknowledgment message"
            reference: "packages/integrations/async_mcp_client.py"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add CSOPMSlackNotifier for DM notifications with interactive buttons"
        files:
          - "ketchup_csopm_notifier/**"
          - "tests/unit/csopm_notifier/**"
    - task_number: "6"
      name: "Implement CSOPMReminderService"
      agent: "python-backend-tdd-agent"
      files:
        - "ketchup_csopm_notifier/services/reminder_service.py"
        - "tests/unit/csopm_notifier/test_reminder_service.py"
      depends_on:
        - 1
        - 3
      success_criteria:
        - "CSOPMReminderService implements CSOPMReminderServiceProtocol"
        - "check_rca_reminders() finds tickets 7+ days old with rca_reminder_sent=false"
        - "check_closure_reminders() finds tickets 45+ days old with closure_reminder_sent=false"
        - "RCA reminder uses 3-ping approach with rca_ping_count tracking"
        - "Closure reminder checks linked tickets via JQL linkedIssues() function"
        - "Snooze functionality updates closure_snoozed_until timestamp"
        - "Close button calls transition_jira_status_by_name to 'Closed'"
        - "Increments csopm_closed_via_reminder when closure_reminder_sent was true"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "pytest tests/unit/csopm_notifier/test_reminder_service.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "grep -n 'transition_jira_status' packages/integrations/async_mcp_client.py || echo 'Check MCP tools'"
            description: "Verify JIRA transition capability"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            grep -n "timedelta\|days" ketchup_unified_scheduler/services/ -r | head -5
          </commands>
        </dependency_verification>
        <task_description>
          Implement 7-day RCA and 45-day closure reminder logic.
          Calculate days since ticket_created_at for reminder triggers.
          Check linked tickets status before closure reminder.
        </task_description>
      implementation:
        approach: |
          Calculate reminder eligibility using datetime comparison with ticket_created_at.
          Query linked tickets via JQL: issuekey in linkedIssues("{key}") AND status != "Closed".
          Implement 3-ping retry for both reminder types.
        key_points:
          - point: "Day calculation from ticket creation"
            details: "days_old = (now - ticket_created_at).days, trigger at 7 and 45"
            reference: "Design Section 4"
          - point: "Linked ticket check JQL"
            details: "issuekey in linkedIssues('{ticket_key}') AND status NOT IN ('Closed', 'Done')"
            reference: "Design Section 4"
          - point: "3-ping escalation for reminders"
            details: "rca_ping_count and closure_ping_count tracked separately, escalate at 3"
            reference: "Design Section 4"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Add CSOPMReminderService for 7-day RCA and 45-day closure reminders"
        files:
          - "ketchup_csopm_notifier/**"
          - "tests/unit/csopm_notifier/**"
    # ============================================================
    # PHASE 3: INTEGRATION (Sequential)
    # ============================================================
    - task_number: "7"
      name: "Wire TypedDI Container and Service Registration"
      agent: "python-integration-specialist"
      files:
        - "ketchup_csopm_notifier/container.py"
        - "packages/core/typed_di/service_registrations/registrations/csopm_services.py"
        - "tests/unit/csopm_notifier/test_container.py"
      depends_on:
        - 1
        - 2
        - 3
        - 4
        - 5
        - 6
      success_criteria:
        - "CSOPMNotifierContainer class creates TypedServiceRegistry with all CSOPM services"
        - "Services registered: CSOPMJIRAPoller, CSOPMStateTracker, CSOPMSlackNotifier, CSOPMReminderService"
        - "Dependencies resolved in correct order via topological sort"
        - "Container provides get_service() method for protocol-based resolution"
        - "Registration follows pattern in packages/core/typed_di/service_registrations/registrations/"
        - "No TODO comments in production code"
        - "All imports resolve"
      test_commands:
        - "pytest tests/unit/csopm_notifier/test_container.py -v"
      runtime_metadata:
        dependency_checks:
          - command: "ls packages/core/typed_di/service_registrations/registrations/"
            description: "List existing registration modules"
        documentation_targets: []
      description: |
        <dependency_verification priority="execute_first">
          <commands>
            cat packages/core/typed_di_integration.py | head -100
            grep -n "register" packages/core/typed_di/service_registrations/registrations/basic_infrastructure.py | head -10
          </commands>
        </dependency_verification>
        <task_description>
          Create TypedDI container wiring for all CSOPM services.
          Follow the pattern in typed_di_integration.py for async initialization.
          Register services with factory functions that resolve dependencies.
        </task_description>
      implementation:
        approach: |
          Create container.py with async get_csopm_container() function.
          Register each service with its dependencies using container.register_factory().
          Resolve shared dependencies (DynamoDBStore, AsyncMCPClient, SlackUserOps) from parent container.
        key_points:
          - point: "Factory registration pattern"
            details: "Use register_factory(Protocol, async factory_func) for lazy initialization"
            reference: "packages/core/typed_di/registry.py"
          - point: "Dependency resolution order"
            details: "StateTracker first, then JIRAPoller, SlackNotifier depends on both, ReminderService last"
            reference: "packages/core/typed_di/resolver.py"
          - point: "Shared dependency reuse"
            details: "Resolve DynamoDBStore, AsyncMCPClient from existing registrations, don't recreate"
            reference: "packages/core/typed_di_integration.py"
      code_quality:
        python:
          full_quality_pipeline:
            command: "./check --fix"
            exit_on_failure: true
      commit:
        type: "feat"
        message: "Wire TypedDI container for CSOPM notifier services"
        files:
          - "ketchup_csopm_notifier/**"
          - "packages/core/typed_di/**"
          - "tests/unit/csopm_notifier/**"
    - task_number: "8"
      name: "Create Main Entry Point and Scheduler"
      agent: "python-backend-tdd-agent"
      files:
        - "ketchup_csopm_notifier/main.py"
        - "ketchup_csopm_notifier/scheduler.py"
        - "tests/unit/csopm_notifier/test_scheduler.py"
      depends_on:
