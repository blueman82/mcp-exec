# CSOPM Assignment Notification System - Implementation Plan
# Generated: 2026-01-06
# Based on design session with 7 approved sections
#
# PRODUCERS: Task 1 → CSOPMNotifierProtocol, Task 2 → SlackUserOps.get_slack_id_by_email
# PRODUCERS: Task 3 → CSOPMStateTracker, Task 4 → CSOPMJIRAPoller
# PRODUCERS: Task 5 → CSOPMSlackNotifier, Task 6 → CSOPMReminderService
# CONSUMERS: Task 7 → [1,2,3,4,5,6], Task 8 → [1,2,3,4,5,6,7]
# VALIDATION: All consumers depend_on producers ✓

conductor:
  default_agent: python-backend-tdd-agent
  worktree_groups:
    - group_id: "foundation"
      tasks: [1, 2]
      rationale: "Protocol and email lookup - foundation for all services"
    - group_id: "core-services"
      tasks: [3, 4, 5, 6]
      rationale: "Core service implementations can be parallelized"
    - group_id: "integration"
      tasks: [7, 8]
      rationale: "TypedDI wiring and FastAPI endpoints"
    - group_id: "infrastructure"
      tasks: [9, 10, 11]
      rationale: "Docker, deployment, and testing"
planner_compliance:
  planner_version: "4.0.0"
  strict_enforcement: true
  required_features:
    - dependency_checks
    - test_commands
    - success_criteria
    - data_flow_registry
data_flow_registry:
  producers:
    CSOPMNotifierProtocol:
      - task: 1
        description: "Defines protocol interface for all CSOPM services"
    get_slack_id_by_email:
      - task: 2
        description: "New method in SlackUserOps for email→Slack ID lookup"
    CSOPMStateTracker:
      - task: 3
        description: "DynamoDB state management for notifications"
    CSOPMJIRAPoller:
      - task: 4
        description: "JIRA polling via MCP client"
    CSOPMSlackNotifier:
      - task: 5
        description: "Slack DM sending and button handling"
    CSOPMReminderService:
      - task: 6
        description: "7-day and 45-day reminder logic"
    CSOPMNotifierContainer:
      - task: 7
        description: "TypedDI container setup"
  consumers:
    CSOPMNotifierProtocol:
      - task: 3
        description: "StateTracker implements protocol"
      - task: 4
        description: "JIRAPoller implements protocol"
      - task: 5
        description: "SlackNotifier implements protocol"
      - task: 6
        description: "ReminderService implements protocol"
    get_slack_id_by_email:
      - task: 5
        description: "SlackNotifier uses for assignee lookup"
    CSOPMStateTracker:
      - task: 5
        description: "SlackNotifier uses for state queries"
      - task: 6
        description: "ReminderService uses for state updates"
      - task: 7
        description: "Container wires StateTracker"
    CSOPMJIRAPoller:
      - task: 7
        description: "Container wires JIRAPoller"
    CSOPMSlackNotifier:
      - task: 7
        description: "Container wires SlackNotifier"
    CSOPMReminderService:
      - task: 7
        description: "Container wires ReminderService"
    CSOPMNotifierContainer:
      - task: 8
        description: "Main entry point uses container"
