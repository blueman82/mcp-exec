# CSOPM Shared Services Refactor Plan
# Move CSOPM shared code from ketchup_csopm_notifier/ to packages/slack/csopm/
#
# PRODUCERS:
#   Task 1 → packages/slack/csopm/__init__.py (package structure)
#   Task 2 → CSOPMNotificationBlocks in packages/
#   Task 3 → CSOPMStateTracker in packages/
#   Task 4 → CSOPMButtonActionHandler in packages/
#   Task 5 → Updated CSOPMHandler integration
#
# CONSUMERS:
#   Task 6-7 → [1, 2, 3, 4] (TypedDI + dependency_setup)
#   Task 8-9 → [2, 3, 4] (ketchup_csopm_notifier refactor)
#   Task 10-13 → [2, 3, 4, 5] (test updates)
#   Task 14-18 → [all previous] (cleanup & docs)
#
# VALIDATION: All consumers depend_on producers ✓

conductor:
  default_agent: general-purpose
  worktree_groups:
    - group_id: "foundation"
      tasks: [1, 2, 3, 4]
      rationale: "Create new packages/slack/csopm/ structure with moved code"
    - group_id: "integration"
      tasks: [5, 6, 7]
      rationale: "Wire up TypedDI and dependency resolution"
    - group_id: "notifier-refactor"
      tasks: [8, 9]
      rationale: "Update ketchup_csopm_notifier to import from packages/"
    - group_id: "tests"
      tasks: [10, 11, 12, 13]
      rationale: "Update test imports and locations"
    - group_id: "cleanup-docs"
      tasks: [14, 15, 16, 17, 18]
      rationale: "Cleanup, documentation, and recall memories"
    - group_id: "validation"
      tasks: [19, 20, 21]
      rationale: "Final validation and production readiness"

planner_compliance:
  planner_version: "4.0.0"
  strict_enforcement: true
  required_features: [dependency_checks, test_commands, success_criteria, data_flow_registry]

data_flow_registry:
  producers:
    packages_slack_csopm_init:
      - task: 1
        description: "Creates packages/slack/csopm/ package structure"
    CSOPMNotificationBlocks_packages:
      - task: 2
        description: "Moves CSOPMNotificationBlocks to packages/slack/csopm/blocks.py"
    CSOPMStateTracker_packages:
      - task: 3
        description: "Moves CSOPMStateTracker to packages/slack/csopm/state.py"
    CSOPMButtonActionHandler:
      - task: 4
        description: "Creates button action handler in packages/slack/csopm/actions.py"
    CSOPMHandler_updated:
      - task: 5
        description: "Updates CSOPMHandler to use new packages imports"
  consumers:
    packages_slack_csopm_init:
      - task: 2
        description: "Blocks module imports from package"
      - task: 3
        description: "State module imports from package"
      - task: 4
        description: "Actions module imports from package"
    CSOPMNotificationBlocks_packages:
      - task: 4
        description: "Actions use blocks for confirmation messages"
      - task: 8
        description: "ketchup_csopm_notifier imports blocks from packages/"
    CSOPMStateTracker_packages:
      - task: 4
        description: "Actions use state tracker for status updates"
      - task: 6
        description: "TypedDI registers state tracker from new location"
    CSOPMButtonActionHandler:
      - task: 5
        description: "CSOPMHandler delegates to button action handler"
      - task: 6
        description: "TypedDI registers button handler"

plan:
  metadata:
    feature_name: "CSOPM Shared Services Refactor"
    created: "2025-01-07"
    target: "Move CSOPM shared code to packages/slack/csopm/ for container architecture compliance"
    estimated_lines: 2400
    rationale: |
      The current architecture violates the ketchup container pattern where each ketchup_*/ module
      must be self-contained. CSOPMHandler (in packages/) depends on CSOPMSlackNotifier
      (in ketchup_csopm_notifier/), causing silent registration failures in ketchup-app.

      Solution: Extract shared CSOPM services to packages/slack/csopm/ so both ketchup-app
      and ketchup_csopm_notifier can import from the shared location.

  context:
    framework: "Python 3.12"
    test_framework: "pytest + unittest"
    key_files:
      - ketchup_csopm_notifier/services/slack_notifier.py
      - ketchup_csopm_notifier/services/state_tracker.py
      - ketchup_csopm_notifier/blocks/notification_blocks.py
      - packages/slack/interactive_elements/csopm_handler.py
      - packages/core/typed_di/service_registrations/registrations/csopm_services.py

  tasks:
    # ============================================
    # PHASE 1: FOUNDATION - Create package structure
    # ============================================

    - task_number: "1"
      name: "Create packages/slack/csopm/ package structure"
      agent: "python-pro"
      files:
        - "packages/slack/csopm/__init__.py"
      depends_on: []

      success_criteria:
        - "packages/slack/csopm/__init__.py exists with proper exports"
        - "Package exports CSOPMNotificationBlocks, CSOPMStateTracker, CSOPMButtonActionHandler"
        - "No TODO comments in production code"
        - "All imports resolve correctly"

      test_commands:
        - "python -c 'from packages.slack.csopm import *'"

      runtime_metadata:
        dependency_checks:
          - command: "ls packages/slack/"
            description: "Verify packages/slack/ exists"
        documentation_targets:
          - "packages/slack/csopm/README.md"

      description: |
        <dependency_verification priority="execute_first">
          <commands>ls packages/slack/</commands>
        </dependency_verification>
        <task_description>
        Create the new packages/slack/csopm/ package structure.
        This will house all shared CSOPM code that both ketchup-app and
        ketchup_csopm_notifier need to import.

        Create __init__.py with placeholder exports that will be populated
        by subsequent tasks.
        </task_description>

      implementation:
        approach: |
          Create new Python package following existing packages/slack/ patterns.
          Use __all__ for explicit exports.
        key_points:
          - point: "Create packages/slack/csopm/__init__.py"
            details: "Empty initially, will be updated as modules are added"
            reference: "packages/slack/interactive_elements/__init__.py"
          - point: "Follow existing package patterns"
            details: "Match structure of packages/slack/blockkits/"
            reference: "packages/slack/blockkits/__init__.py"

      commit:
        type: "feat"
        message: "Create packages/slack/csopm/ package structure for shared CSOPM services"
        files:
          - "packages/slack/csopm/**"

    - task_number: "2"
      name: "Move CSOPMNotificationBlocks to packages/slack/csopm/blocks.py"
      agent: "python-pro"
      files:
        - "packages/slack/csopm/blocks.py"
        - "packages/slack/csopm/__init__.py"
      depends_on: [1]

      success_criteria:
        - "CSOPMNotificationBlocks class exists in packages/slack/csopm/blocks.py"
        - "All 6 block builder methods preserved: build_assignment_notification, build_rca_reminder, build_closure_reminder, build_acknowledgment_confirmation, build_create_followup_modal, get_fallback_text"
        - "All 6 ACTION_* constants preserved"
        - "No external dependencies beyond standard library and packages.core"
        - "__init__.py exports CSOPMNotificationBlocks"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from packages.slack.csopm.blocks import CSOPMNotificationBlocks'"
        - "python -c 'from packages.slack.csopm import CSOPMNotificationBlocks'"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.slack.csopm import *'"
            description: "Verify package imports work"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.slack.csopm import *'</commands>
        </dependency_verification>
        <task_description>
        Move CSOPMNotificationBlocks from ketchup_csopm_notifier/blocks/notification_blocks.py
        to packages/slack/csopm/blocks.py.

        This is a pure UI builder class with no external dependencies - only uses
        standard library (datetime, typing) and packages.core.typed_di.protocols for CSOPMTicket.

        Preserve all 6 class methods and 6 ACTION_* constants exactly.
        </task_description>

      implementation:
        approach: |
          Copy the entire CSOPMNotificationBlocks class (687 lines) to new location.
          Update imports to use packages.core.typed_di.protocols for CSOPMTicket.
          Update __init__.py to export CSOPMNotificationBlocks.
        key_points:
          - point: "Copy CSOPMNotificationBlocks class verbatim"
            details: "All 6 @classmethod builders and 6 ACTION_* constants"
            reference: "ketchup_csopm_notifier/blocks/notification_blocks.py:33-686"
          - point: "Update CSOPMTicket import"
            details: "from packages.core.typed_di.protocols import CSOPMTicket"
            reference: "packages/core/typed_di/protocols.py"
          - point: "Export from __init__.py"
            details: "Add CSOPMNotificationBlocks to __all__ and import"
            reference: "packages/slack/csopm/__init__.py"

      commit:
        type: "refactor"
        message: "Move CSOPMNotificationBlocks to packages/slack/csopm/blocks.py"
        files:
          - "packages/slack/csopm/blocks.py"
          - "packages/slack/csopm/__init__.py"

    - task_number: "3"
      name: "Move CSOPMStateTracker to packages/slack/csopm/state.py"
      agent: "python-pro"
      files:
        - "packages/slack/csopm/state.py"
        - "packages/slack/csopm/__init__.py"
      depends_on: [1]

      success_criteria:
        - "CSOPMStateTracker class exists in packages/slack/csopm/state.py"
        - "All 14 methods preserved including DynamoDB operations"
        - "Protocol compliance with CSOPMStateTrackerProtocol maintained"
        - "DynamoDB key generation methods work correctly"
        - "__init__.py exports CSOPMStateTracker"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from packages.slack.csopm.state import CSOPMStateTracker'"
        - "python -c 'from packages.slack.csopm import CSOPMStateTracker'"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.db.dynamo_operations import DynamoDBAsyncClient'"
            description: "Verify DynamoDB client is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.db.dynamo_operations import DynamoDBAsyncClient'</commands>
        </dependency_verification>
        <task_description>
        Move CSOPMStateTracker from ketchup_csopm_notifier/services/state_tracker.py
        to packages/slack/csopm/state.py.

        This class handles DynamoDB persistence for CSOPM notification records.
        It has 14 methods for CRUD operations on notification and followup records.

        Dependencies:
        - DynamoDBAsyncClient from packages.db
        - CSOPMStateTrackerProtocol, NotificationRecord, FollowupRecord from protocols
        </task_description>

      implementation:
        approach: |
          Copy the entire CSOPMStateTracker class (661 lines) to new location.
          Update imports to use packages.* paths.
          Ensure protocol compliance is maintained.
        key_points:
          - point: "Copy CSOPMStateTracker class verbatim"
            details: "All 14 methods including _make_pk, _make_followup_sk, and item converters"
            reference: "ketchup_csopm_notifier/services/state_tracker.py:40-660"
          - point: "Update DynamoDB imports"
            details: "from packages.db.dynamo_operations import DynamoDBAsyncClient"
            reference: "packages/db/dynamo_operations.py"
          - point: "Maintain protocol compliance"
            details: "Implements CSOPMStateTrackerProtocol from packages.core.typed_di.protocols"
            reference: "packages/core/typed_di/protocols.py"

      commit:
        type: "refactor"
        message: "Move CSOPMStateTracker to packages/slack/csopm/state.py"
        files:
          - "packages/slack/csopm/state.py"
          - "packages/slack/csopm/__init__.py"

    - task_number: "4"
      name: "Create CSOPMButtonActionHandler in packages/slack/csopm/actions.py"
      agent: "python-pro"
      files:
        - "packages/slack/csopm/actions.py"
        - "packages/slack/csopm/__init__.py"
      depends_on: [1, 2, 3]

      success_criteria:
        - "CSOPMButtonActionHandler class exists in packages/slack/csopm/actions.py"
        - "handle_button_action dispatcher method works"
        - "All 5 action handlers preserved: _handle_acknowledge, _handle_create_followup, _handle_done, _handle_snooze, _handle_close_ticket"
        - "Uses CSOPMNotificationBlocks from packages/slack/csopm/blocks"
        - "Uses CSOPMStateTracker protocol for optional state updates"
        - "__init__.py exports CSOPMButtonActionHandler"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from packages.slack.csopm.actions import CSOPMButtonActionHandler'"
        - "python -c 'from packages.slack.csopm import CSOPMButtonActionHandler'"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.slack.csopm.blocks import CSOPMNotificationBlocks'"
            description: "Verify blocks module is available"
          - command: "python -c 'from packages.slack.csopm.state import CSOPMStateTracker'"
            description: "Verify state module is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>
            python -c 'from packages.slack.csopm.blocks import CSOPMNotificationBlocks'
            python -c 'from packages.slack.csopm.state import CSOPMStateTracker'
          </commands>
        </dependency_verification>
        <task_description>
        Extract button action handling logic from CSOPMSlackNotifier into a new
        CSOPMButtonActionHandler class in packages/slack/csopm/actions.py.

        This extracts the 6 button-related methods (~460 lines):
        - handle_button_action() - dispatcher
        - _handle_acknowledge()
        - _handle_create_followup()
        - _handle_done()
        - _handle_snooze()
        - _handle_close_ticket()

        Dependencies:
        - SlackPostingHandler for confirmations
        - AsyncMCPClient for JIRA operations
        - CSOPMStateTrackerProtocol (optional) for state updates
        - CSOPMNotificationBlocks for building confirmation blocks
        </task_description>

      implementation:
        approach: |
          Extract button handling methods from CSOPMSlackNotifier.
          Create new CSOPMButtonActionHandler class with same constructor pattern.
          Import blocks and state from sibling modules.
        key_points:
          - point: "Extract handle_button_action dispatcher"
            details: "Routes action_id to specific _handle_* methods"
            reference: "ketchup_csopm_notifier/services/slack_notifier.py:305-360"
          - point: "Extract 5 _handle_* methods"
            details: "_handle_acknowledge, _handle_create_followup, _handle_done, _handle_snooze, _handle_close_ticket"
            reference: "ketchup_csopm_notifier/services/slack_notifier.py:362-741"
          - point: "Use local imports for blocks"
            details: "from packages.slack.csopm.blocks import CSOPMNotificationBlocks"
            reference: "packages/slack/csopm/blocks.py"
          - point: "Accept optional state_tracker"
            details: "state_tracker: Optional[CSOPMStateTrackerProtocol] = None"
            reference: "packages/core/typed_di/protocols.py"

      commit:
        type: "feat"
        message: "Create CSOPMButtonActionHandler for shared button action handling"
        files:
          - "packages/slack/csopm/actions.py"
          - "packages/slack/csopm/__init__.py"

    # ============================================
    # PHASE 2: INTEGRATION - Wire up TypedDI
    # ============================================

    - task_number: "5"
      name: "Update CSOPMHandler to use packages/slack/csopm/"
      agent: "python-pro"
      files:
        - "packages/slack/interactive_elements/csopm_handler.py"
      depends_on: [4]

      success_criteria:
        - "CSOPMHandler imports CSOPMButtonActionHandler from packages.slack.csopm"
        - "CSOPMHandler delegates button actions to CSOPMButtonActionHandler"
        - "handle_block_action method uses new handler"
        - "Modal handling preserved (uses SlackPostingHandler directly)"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from packages.slack.interactive_elements.csopm_handler import CSOPMHandler'"
        - "cd tests/setup && make test-unit TESTS=tests/unit/slack/interactive_elements/test_csopm_handler.py"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.slack.csopm import CSOPMButtonActionHandler'"
            description: "Verify button handler is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.slack.csopm import CSOPMButtonActionHandler'</commands>
        </dependency_verification>
        <task_description>
        Update CSOPMHandler to use the new CSOPMButtonActionHandler from packages/slack/csopm/.

        Current state: CSOPMHandler imports CSOPMSlackNotifierProtocol and calls
        self._notifier.handle_button_action()

        New state: CSOPMHandler imports CSOPMButtonActionHandler and calls
        self._button_handler.handle_button_action()

        This removes the dependency on ketchup_csopm_notifier.
        </task_description>

      implementation:
        approach: |
          Replace CSOPMSlackNotifierProtocol dependency with CSOPMButtonActionHandler.
          Update constructor to accept button_handler instead of notifier.
          Update handle_block_action to delegate to button_handler.
        key_points:
          - point: "Replace notifier with button_handler"
            details: "Change __init__ parameter from slack_notifier to button_handler"
            reference: "packages/slack/interactive_elements/csopm_handler.py:61-78"
          - point: "Update handle_block_action delegation"
            details: "Call self._button_handler.handle_button_action() instead of self._notifier"
            reference: "packages/slack/interactive_elements/csopm_handler.py:80-142"
          - point: "Keep modal handling"
            details: "Modal opening and submission handling stays in CSOPMHandler"
            reference: "packages/slack/interactive_elements/csopm_handler.py:144-463"

      commit:
        type: "refactor"
        message: "Update CSOPMHandler to use CSOPMButtonActionHandler from packages/"
        files:
          - "packages/slack/interactive_elements/csopm_handler.py"

    - task_number: "6"
      name: "Update TypedDI registrations for new CSOPM locations"
      agent: "python-pro"
      files:
        - "packages/core/typed_di/service_registrations/registrations/csopm_services.py"
      depends_on: [2, 3, 4]

      success_criteria:
        - "CSOPMStateTracker registered from packages.slack.csopm.state"
        - "CSOPMButtonActionHandler registered from packages.slack.csopm.actions"
        - "CSOPMHandler registered with button_handler dependency"
        - "No ImportError silent failures for packages/ imports"
        - "Protocol aliases maintained for backward compatibility"
        - "No TODO comments in production code"

      test_commands:
        - "cd tests/setup && make test-typed-di"
        - "python -c 'from packages.core.typed_di.service_registrations.registrations.csopm_services import register_csopm_services'"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.slack.csopm import CSOPMStateTracker, CSOPMButtonActionHandler'"
            description: "Verify CSOPM modules are importable"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.slack.csopm import CSOPMStateTracker, CSOPMButtonActionHandler'</commands>
        </dependency_verification>
        <task_description>
        Update csopm_services.py to register services from new packages/slack/csopm/ location.

        Current state: Imports from ketchup_csopm_notifier/* with silent ImportError catch.
        New state: Imports from packages.slack.csopm.* which are always available.

        Split registrations:
        - Core CSOPM services (StateTracker, ButtonActionHandler, Handler) - always register
        - Scheduler services (JIRAPoller, ReminderService) - only in ketchup_csopm_notifier container
        </task_description>

      implementation:
        approach: |
          Refactor register_csopm_services() to:
          1. Always register core services from packages.slack.csopm
          2. Optionally register scheduler services from ketchup_csopm_notifier (with ImportError handling)
        key_points:
          - point: "Import core services from packages/"
            details: "from packages.slack.csopm import CSOPMStateTracker, CSOPMButtonActionHandler"
            reference: "packages/slack/csopm/__init__.py"
          - point: "Register CSOPMStateTracker unconditionally"
            details: "No ImportError catch needed for packages/ imports"
            reference: "packages/core/typed_di/service_registrations/registrations/csopm_services.py"
          - point: "Register CSOPMButtonActionHandler"
            details: "New registration for button action handling"
            reference: "packages/slack/csopm/actions.py"
          - point: "Keep scheduler services optional"
            details: "JIRAPoller, ReminderService only in ketchup_csopm_notifier"
            reference: "ketchup_csopm_notifier/services/"

      commit:
        type: "refactor"
        message: "Update TypedDI registrations for CSOPM services in packages/"
        files:
          - "packages/core/typed_di/service_registrations/registrations/csopm_services.py"

    - task_number: "7"
      name: "Update dependency_setup.py for new CSOPM resolution"
      agent: "python-pro"
      files:
        - "packages/slack/channel_events/request_processing/dependency_setup.py"
      depends_on: [5, 6]

      success_criteria:
        - "CSOPMHandler resolved via TypedDI container"
        - "No direct imports from ketchup_csopm_notifier"
        - "CSOPMHandler instantiation uses CSOPMButtonActionHandler"
        - "State tracker optionally injected when available"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from packages.slack.channel_events.request_processing.dependency_setup import setup_dependencies'"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.core.typed_di.registry import TypedServiceRegistry'"
            description: "Verify TypedDI is available"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.core.typed_di.registry import TypedServiceRegistry'</commands>
        </dependency_verification>
        <task_description>
        Update dependency_setup.py to resolve CSOPMHandler from the TypedDI container
        instead of manually constructing it with direct imports from ketchup_csopm_notifier.

        Current state (broken): Direct import of CSOPMSlackNotifier from ketchup_csopm_notifier
        fails because that module isn't in ketchup-app container.

        New state: Resolve CSOPMHandler from container, which internally uses
        CSOPMButtonActionHandler from packages/slack/csopm/.
        </task_description>

      implementation:
        approach: |
          Replace manual CSOPMHandler construction with container resolution.
          Remove all direct imports from ketchup_csopm_notifier.
        key_points:
          - point: "Remove ketchup_csopm_notifier imports"
            details: "Delete: from ketchup_csopm_notifier.services.slack_notifier import CSOPMSlackNotifier"
            reference: "packages/slack/channel_events/request_processing/dependency_setup.py"
          - point: "Resolve CSOPMHandler from container"
            details: "csopm_handler = await container.aget(CSOPMHandler)"
            reference: "packages/slack/channel_events/request_processing/dependency_setup.py:375-398"
          - point: "Let TypedDI wire dependencies"
            details: "Container handles CSOPMButtonActionHandler injection"
            reference: "packages/core/typed_di/service_registrations/registrations/csopm_services.py"

      commit:
        type: "refactor"
        message: "Update dependency_setup.py to resolve CSOPMHandler from TypedDI"
        files:
          - "packages/slack/channel_events/request_processing/dependency_setup.py"

    # ============================================
    # PHASE 3: REFACTOR ketchup_csopm_notifier
    # ============================================

    - task_number: "8"
      name: "Refactor CSOPMSlackNotifier to import from packages/"
      agent: "python-pro"
      files:
        - "ketchup_csopm_notifier/services/slack_notifier.py"
      depends_on: [2, 4]

      success_criteria:
        - "CSOPMSlackNotifier imports CSOPMNotificationBlocks from packages.slack.csopm"
        - "CSOPMSlackNotifier imports CSOPMButtonActionHandler from packages.slack.csopm"
        - "Button handling delegated to CSOPMButtonActionHandler"
        - "Notification sending methods (send_assignment_dm, send_reminder_dm) preserved"
        - "resolve_slack_user_id preserved"
        - "No duplicated button handling code"
        - "No TODO comments in production code"

      test_commands:
        - "python -c 'from ketchup_csopm_notifier.services.slack_notifier import CSOPMSlackNotifier'"
        - "cd tests/setup && make test-unit TESTS=tests/unit/csopm_notifier/test_slack_notifier.py"

      runtime_metadata:
        dependency_checks:
          - command: "python -c 'from packages.slack.csopm import CSOPMNotificationBlocks, CSOPMButtonActionHandler'"
            description: "Verify packages imports work"
        documentation_targets: []

      description: |
        <dependency_verification priority="execute_first">
          <commands>python -c 'from packages.slack.csopm import CSOPMNotificationBlocks, CSOPMButtonActionHandler'</commands>
        </dependency_verification>
        <task_description>
        Refactor CSOPMSlackNotifier to import shared code from packages/slack/csopm/
        instead of having local copies.

        After refactor, CSOPMSlackNotifier will:
        1. Import CSOPMNotificationBlocks from packages.slack.csopm.blocks
        2. Import CSOPMButtonActionHandler from packages.slack.csopm.actions
        3. Delegate handle_button_action to CSOPMButtonActionHandler
