openapi: 3.1.0
info:
  title: Bravo API
  description: |
    Bravo - "Championing Our Data" - Jira hygiene nudge system.

    Monitors Jira tickets for watched assignees, detects incomplete documentation,
    and nudges engineers via Slack to add updates.
  version: 0.1.0
  contact:
    name: Campaign Operations Team

servers:
  - url: http://localhost:8000
    description: Local development
  - url: http://bravo-api:8000
    description: Docker internal

tags:
  - name: Health
    description: Health and status endpoints
  - name: Admin
    description: Administrative operations
  - name: Polling
    description: Jira polling operations
  - name: Nudge
    description: Nudge management
  - name: Tickets
    description: Watched ticket operations

paths:
  # ============ HEALTH ============
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /health/detailed:
    get:
      tags: [Health]
      summary: Detailed health with component status
      operationId: healthDetailed
      responses:
        '200':
          description: Detailed health status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailedHealthResponse'

  # ============ ADMIN ============
  /admin/stats:
    get:
      tags: [Admin]
      summary: System statistics
      operationId: getStats
      responses:
        '200':
          description: System statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'

  /admin/config:
    get:
      tags: [Admin]
      summary: Get current configuration
      operationId: getConfig
      responses:
        '200':
          description: Current configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'
    patch:
      tags: [Admin]
      summary: Update configuration
      operationId: updateConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigUpdateRequest'
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigResponse'

  /admin/poll/trigger:
    post:
      tags: [Admin]
      summary: Manually trigger a poll cycle
      operationId: triggerPoll
      responses:
        '202':
          description: Poll triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollTriggerResponse'

  /admin/logs:
    get:
      tags: [Admin]
      summary: Get recent logs
      operationId: getLogs
      parameters:
        - name: level
          in: query
          schema:
            type: string
            enum: [DEBUG, INFO, WARNING, ERROR]
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
      responses:
        '200':
          description: Recent logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogsResponse'

  # ============ POLLING ============
  /polling/state:
    get:
      tags: [Polling]
      summary: Get current poll state
      operationId: getPollState
      responses:
        '200':
          description: Current poll state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollStateResponse'

  /polling/history:
    get:
      tags: [Polling]
      summary: Get poll history
      operationId: getPollHistory
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Poll history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PollHistoryResponse'

  # ============ TICKETS ============
  /tickets:
    get:
      tags: [Tickets]
      summary: List watched tickets
      operationId: listTickets
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TicketStatus'
        - name: assignee
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of watched tickets
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'

  /tickets/{ticket_key}:
    get:
      tags: [Tickets]
      summary: Get ticket details
      operationId: getTicket
      parameters:
        - name: ticket_key
          in: path
          required: true
          schema:
            type: string
            example: CPGNCX-12345
      responses:
        '200':
          description: Ticket details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketResponse'
        '404':
          description: Ticket not found

    delete:
      tags: [Tickets]
      summary: Stop watching a ticket
      operationId: deleteTicket
      parameters:
        - name: ticket_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Ticket removed from watch list

  /tickets/{ticket_key}/evaluate:
    post:
      tags: [Tickets]
      summary: Manually evaluate ticket for nudge
      operationId: evaluateTicket
      parameters:
        - name: ticket_key
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Evaluation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationResponse'

  # ============ NUDGE ============
  /nudge:
    get:
      tags: [Nudge]
      summary: List nudge events
      operationId: listNudges
      parameters:
        - name: ticket_key
          in: query
          schema:
            type: string
        - name: assignee
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/NudgeStatus'
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: List of nudge events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NudgeListResponse'

  /nudge/{nudge_id}:
    get:
      tags: [Nudge]
      summary: Get nudge event details
      operationId: getNudge
      parameters:
        - name: nudge_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Nudge event details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NudgeResponse'

  /nudge/send:
    post:
      tags: [Nudge]
      summary: Manually send a nudge
      operationId: sendNudge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendNudgeRequest'
      responses:
        '200':
          description: Nudge sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NudgeResponse'

  # ============ ASSIGNEES ============
  /assignees:
    get:
      tags: [Admin]
      summary: List watched assignees
      operationId: listAssignees
      responses:
        '200':
          description: List of watched assignees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssigneeListResponse'

  /assignees/{jira_id}:
    get:
      tags: [Admin]
      summary: Get assignee details
      operationId: getAssignee
      parameters:
        - name: jira_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Assignee details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssigneeResponse'

    patch:
      tags: [Admin]
      summary: Update assignee preferences
      operationId: updateAssignee
      parameters:
        - name: jira_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssigneeUpdateRequest'
      responses:
        '200':
          description: Assignee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssigneeResponse'


components:
  schemas:
    # ============ HEALTH ============
    HealthResponse:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        version:
          type: string
          example: "0.1.0"
        timestamp:
          type: string
          format: date-time

    DetailedHealthResponse:
      allOf:
        - $ref: '#/components/schemas/HealthResponse'
        - type: object
          properties:
            components:
              type: object
              properties:
                database:
                  $ref: '#/components/schemas/ComponentHealth'
                jira:
                  $ref: '#/components/schemas/ComponentHealth'
                slack:
                  $ref: '#/components/schemas/ComponentHealth'
                llm:
                  $ref: '#/components/schemas/ComponentHealth'

    ComponentHealth:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, degraded, unhealthy]
        latency_ms:
          type: integer
        last_check:
          type: string
          format: date-time

    # ============ STATS ============
    StatsResponse:
      type: object
      properties:
        tickets:
          type: object
          properties:
            total_watched:
              type: integer
            by_status:
              type: object
              additionalProperties:
                type: integer
            by_project:
              type: object
              additionalProperties:
                type: integer
        nudges:
          type: object
          properties:
            total_sent:
              type: integer
            today:
              type: integer
            response_rate:
              type: number
              format: float
        polling:
          type: object
          properties:
            last_poll:
              type: string
              format: date-time
            polls_today:
              type: integer
            avg_tickets_per_poll:
              type: number

    # ============ CONFIG ============
    ConfigResponse:
      type: object
      properties:
        poll_interval_minutes:
          type: integer
          example: 60
        projects:
          type: array
          items:
            type: string
          example: [CPGNCX, AMSE, CPGNREQ]
        org_groups:
          type: array
          items:
            type: string
          example: [ORG-VALLET-ALL, ORG-BRONSHTE-ALL]
        gates:
          type: object
          properties:
            g1_enabled:
              type: boolean
            g2_stale_hours:
              type: integer
            g3_response_hours:
              type: integer
            g4_resolution_hours:
              type: integer
        llm:
          type: object
          properties:
            threshold:
              type: number
              example: 3.0
            model:
              type: string
              example: gpt-4

    ConfigUpdateRequest:
      type: object
      properties:
        poll_interval_minutes:
          type: integer
        gates:
          type: object
        llm:
          type: object

    # ============ POLLING ============
    PollTriggerResponse:
      type: object
      properties:
        poll_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running]
        message:
          type: string

    PollStateResponse:
      type: object
      properties:
        last_cursor:
          type: string
          format: date-time
        last_poll_at:
          type: string
          format: date-time
        tickets_fetched:
          type: integer
        next_poll_at:
          type: string
          format: date-time

    PollHistoryResponse:
      type: object
      properties:
        polls:
          type: array
          items:
            type: object
            properties:
              poll_id:
                type: string
                format: uuid
              started_at:
                type: string
                format: date-time
              completed_at:
                type: string
                format: date-time
              tickets_fetched:
                type: integer
              tickets_new:
                type: integer
              tickets_updated:
                type: integer
              nudges_triggered:
                type: integer
              status:
                type: string
                enum: [completed, failed, partial]

    # ============ TICKETS ============
    TicketStatus:
      type: string
      enum: [ACQUIRED, ACTIVE, SNOOZED, RESOLVED]

    TicketResponse:
      type: object
      required: [ticket_key, status]
      properties:
        ticket_key:
          type: string
          example: CPGNCX-12345
        jira_id:
          type: string
        project:
          type: string
        summary:
          type: string
        assignee_jira_id:
          type: string
        assignee_name:
          type: string
        status:
          $ref: '#/components/schemas/TicketStatus'
        jira_status:
          type: string
        first_seen_at:
          type: string
          format: date-time
        last_polled_at:
          type: string
          format: date-time
        last_assignee_comment_at:
          type: string
          format: date-time
          nullable: true
        snoozed_until:
          type: string
          format: date-time
          nullable: true
        gate_results:
          type: object
          properties:
            g1_passed:
              type: boolean
            g2_passed:
              type: boolean
            g3_passed:
              type: boolean
            g4_passed:
              type: boolean
        llm_scores:
          type: object
          nullable: true
          properties:
            clarity:
              type: number
            completeness:
              type: number
            root_cause:
              type: number
            actionability:
              type: number
            average:
              type: number

    TicketListResponse:
      type: object
      properties:
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/TicketResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    EvaluationResponse:
      type: object
      properties:
        ticket_key:
          type: string
        gate_results:
          type: object
        llm_scores:
          type: object
          nullable: true
        nudge_triggered:
          type: boolean
        nudge_reason:
          type: string
          nullable: true

    # ============ NUDGE ============
    NudgeStatus:
      type: string
      enum: [SENT, ACKNOWLEDGED, SNOOZED, RESPONDED, POSTED, CANCELLED]

    NudgeResponse:
      type: object
      properties:
        nudge_id:
          type: string
          format: uuid
        ticket_key:
          type: string
        assignee_jira_id:
          type: string
        status:
          $ref: '#/components/schemas/NudgeStatus'
        trigger_reason:
          type: string
          description: Which gate failed or LLM score below threshold
        slack_channel:
          type: string
        slack_ts:
          type: string
        message_content:
          type: string
        created_at:
          type: string
          format: date-time
        responded_at:
          type: string
          format: date-time
          nullable: true
        jira_comment_posted:
          type: string
          nullable: true
          description: The comment text posted to Jira (if any)

    NudgeListResponse:
      type: object
      properties:
        nudges:
          type: array
          items:
            $ref: '#/components/schemas/NudgeResponse'
        total:
          type: integer

    SendNudgeRequest:
      type: object
      required: [ticket_key]
      properties:
        ticket_key:
          type: string
        reason:
          type: string
          description: Manual nudge reason

    # ============ ASSIGNEES ============
    AssigneeResponse:
      type: object
      properties:
        jira_id:
          type: string
        jira_display_name:
          type: string
        slack_user_id:
          type: string
        email:
          type: string
        quiet_hours_start:
          type: string
          example: "18:00"
          nullable: true
        quiet_hours_end:
          type: string
          example: "09:00"
          nullable: true
        default_snooze_minutes:
          type: integer
          default: 240
        timezone:
          type: string
          example: "Europe/London"
        nudge_count:
          type: integer
        last_nudge_at:
          type: string
          format: date-time
          nullable: true

    AssigneeListResponse:
      type: object
      properties:
        assignees:
          type: array
          items:
            $ref: '#/components/schemas/AssigneeResponse'
        total:
          type: integer

    AssigneeUpdateRequest:
      type: object
      properties:
        quiet_hours_start:
          type: string
        quiet_hours_end:
          type: string
        default_snooze_minutes:
          type: integer
        timezone:
          type: string

    # ============ LOGS ============
    LogsResponse:
      type: object
      properties:
        logs:
          type: array
          items:
            type: object
            properties:
              timestamp:
                type: string
                format: date-time
              level:
                type: string
              message:
                type: string
              context:
                type: object
