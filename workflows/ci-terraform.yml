name: Terraform CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: [self-hosted, Linux, X64, jenkins]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform version
        run: terraform version

      - name: Terraform fmt (check)
        run: terraform fmt -check -recursive terraform

      - name: Terraform validate (each dir containing .tf)
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d terraform ]; then
            echo "No ./terraform directory found; skipping."
            exit 0
          fi

          mapfile -t TF_DIRS < <(
            find terraform -type f -name '*.tf' -print0 \
            | xargs -0 -n1 dirname \
            | sort -u
          )

          if [ "${#TF_DIRS[@]}" -eq 0 ]; then
            echo "No Terraform files found under ./terraform; skipping."
            exit 0
          fi

          for dir in "${TF_DIRS[@]}"; do
            echo "Validating: ${dir}"
            terraform -chdir="${dir}" init -backend=false -input=false -no-color
            terraform -chdir="${dir}" validate -no-color
          done
