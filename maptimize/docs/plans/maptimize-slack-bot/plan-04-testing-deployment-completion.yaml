        file_content_readme: |
          # Maptimize Slack Bot MVP

          Secure, stateless Slack bot providing ephemeral access to Maptimize process documentation via mentions and slash commands. Responds with wiki links in user-only ephemeral messages.

          ## Features

          - **@maptimize mention**: Mention the bot in any channel or DM
          - **/maptimize slash command**: Use the command in any channel or DM
          - **Ephemeral responses**: Messages visible only to the user who triggered them
          - **Socket Mode**: Secure persistent WebSocket connection (no port exposure)
          - **AWS Secrets Manager**: Token management without .env files
          - **EC2 deployment**: Lightweight t3.micro instance on Debian 12
          - **Docker containerization**: Reproducible deployment with docker-compose
          - **CI/CD automation**: GitHub Actions → ECR → EC2 auto-update

          ## Architecture

          ```
          Slack Events (WebSocket)
          ↓
          Socket Mode Handler (slack-bolt)
          ↓
          Event Router (@mention, /command)
          ↓
          Config Loader (processes.json) + Secret Fetcher (AWS Secrets Manager)
          ↓
          Message Formatter (mrkdwn)
          ↓
          Ephemeral Response to User
          ```

          ## Tech Stack

          - **Language**: Python 3.11+
          - **Framework**: slack-bolt[async] (Socket Mode WebSocket)
          - **Deployment**: Docker on AWS EC2 t3.micro (Debian 12)
          - **CI/CD**: GitHub Actions → AWS ECR
          - **Secrets**: AWS Secrets Manager (no .env files)
          - **Logging**: json-file driver with rotation
          - **Testing**: pytest with pytest-asyncio, >80% coverage

          ## Quick Start (Local Development)

          ### Prerequisites
          - Python 3.11+
          - Docker & docker-compose
          - AWS CLI configured with profile `campaign_prod_v7`
          - Slack app created with tokens in AWS Secrets Manager

          ### Setup
          ```bash
          # Clone and enter directory
          git clone ...
          cd maptimize

          # Create virtual environment
          python -m venv venv
          source venv/bin/activate  # or venv\Scripts\activate on Windows

          # Install dependencies
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

          # Run tests
          python -m pytest --cov=src

          # Start bot locally (uses AWS_PROFILE)
          export AWS_PROFILE=campaign_prod_v7
          python -m maptimize.bot

          # Or with docker-compose
          docker-compose up
          ```

          ## Deployment

          See [docs/DEPLOYMENT.md](docs/DEPLOYMENT.md) for complete step-by-step instructions.

          **Quick summary:**
          1. Set up AWS infrastructure: `docs/AWS_SETUP.md`
          2. Configure Slack app: `infrastructure/SLACK_APP_SETUP.md`
          3. Launch EC2 instance: `./infrastructure/launch-ec2.sh`
          4. Complete post-launch setup: `infrastructure/ec2-setup.md`
          5. Verify bot: `/maptimize` in Slack

          ## Project Structure

          ```
          maptimize/
          ├── src/maptimize/
          │   ├── bot.py              # Main slack-bolt application
          │   ├── config.py            # Secrets Manager + config loading
          │   ├── handlers.py          # Event handlers
          │   ├── formatter.py         # mrkdwn message formatting
          │   ├── utils.py             # Utilities and logging
          │   └── __init__.py
          ├── tests/                   # Comprehensive test suite
          │   ├── test_*.py            # Unit tests
          │   ├── test_integration.py  # Integration tests
          │   └── conftest.py          # pytest configuration
          ├── infrastructure/          # Deployment files
          │   ├── Dockerfile           # Container image
          │   ├── docker-compose.yml   # Development
          │   ├── docker-compose.production.yml
          │   ├── maptimize.service    # systemd service
          │   ├── deploy.sh            # Deployment script
          │   ├── user-data.sh         # EC2 initialization
          │   ├── launch-ec2.sh        # EC2 launch script
          │   ├── iam/                 # IAM policy files
          │   └── ec2-setup.md         # Post-launch setup
          ├── config/
          │   └── processes.json       # Hardcoded processes
          ├── docs/
          │   ├── DEPLOYMENT.md        # Deployment guide
          │   ├── AWS_SETUP.md         # AWS infrastructure setup
          │   ├── TROUBLESHOOTING.md   # Troubleshooting guide
          │   └── ARCHITECTURE.md      # Technical architecture
          ├── .github/workflows/       # GitHub Actions CI/CD
          │   └── ecr-build-push.yml
          ├── pyproject.toml           # Project configuration
          ├── conftest.py              # pytest configuration
          └── README.md                # This file

          ## Troubleshooting

          See [docs/TROUBLESHOOTING.md](docs/TROUBLESHOOTING.md) for common issues and solutions.

          ## Development

          ### Code Quality
          ```bash
          # Format code
          python -m black .

          # Type checking
          python -m mypy src/

          # Linting
          python -m ruff check .

          # Run tests
          python -m pytest --cov=src
          ```

          ### Pre-commit Hooks
          Install pre-commit hooks to run checks automatically:
          ```bash
          pip install pre-commit
          pre-commit install
          ```

          ## Security Notes

          - No .env files (secrets fetched from AWS Secrets Manager at runtime)
          - No port exposure (Socket Mode uses outbound WebSocket)
          - Non-root Docker user (UID 1000)
          - IAM instance role with minimal permissions
          - SSSD/SUDO integration for enterprise LDAP

          ## References

          - [slack-bolt documentation](https://slack.dev/bolt-python/)
          - [Slack Socket Mode](https://api.slack.com/apis/connections/socket)
          - [AWS Secrets Manager](https://docs.aws.amazon.com/secretsmanager/)
          - [Docker documentation](https://docs.docker.com/)

          ## License

          [Your license here]

          ## Contributing

          See [CONTRIBUTING.md](CONTRIBUTING.md) for guidelines.

