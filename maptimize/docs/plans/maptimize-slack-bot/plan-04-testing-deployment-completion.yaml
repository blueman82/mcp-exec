        example_skeleton: |
          # tests/test_aws_setup.py
          import boto3
          import json
          import pytest
          from botocore.exceptions import ClientError

          @pytest.fixture
          def aws_session():
              """Provide AWS session for testing."""
              return boto3.Session(region_name='eu-west-1')

          def test_secrets_manager_secret_exists(aws_session):
              """Test that Slack tokens secret exists in Secrets Manager."""
              client = aws_session.client('secretsmanager')
              try:
                  response = client.get_secret_value(
                      SecretId='maptimize/slack-tokens'
                  )
                  secret = json.loads(response['SecretString'])
                  assert 'bot_token' in secret
                  assert 'app_token' in secret
                  assert secret['bot_token'].startswith('xoxb-')
                  assert secret['app_token'].startswith('xapp-')
              except ClientError as e:
                  pytest.skip(f"Secrets Manager secret not found: {e}")

          def test_ecr_repository_exists(aws_session):
              """Test that ECR repository exists."""
              client = aws_session.client('ecr')
              try:
                  response = client.describe_repositories(
                      repositoryNames=['maptimize']
                  )
                  assert len(response['repositories']) == 1
                  assert response['repositories'][0]['repositoryName'] == 'maptimize'
              except ClientError as e:
                  pytest.skip(f"ECR repository not found: {e}")

          def test_iam_role_exists(aws_session):
              """Test that IAM role exists."""
              client = aws_session.client('iam')
              try:
                  response = client.get_role(RoleName='maptimize-instance-role')
                  assert response['Role']['RoleName'] == 'maptimize-instance-role'
              except ClientError as e:
                  pytest.skip(f"IAM role not found: {e}")

