          # Maptimize Deployment Guide

          Complete step-by-step guide for deploying Maptimize bot to production.

          ## Prerequisites Checklist

          - [ ] AWS account access (483013340174)
          - [ ] AWS CLI configured with profile
          - [ ] Slack app created with tokens
          - [ ] SSH key pair for EC2 access
          - [ ] Git repository access
          - [ ] GitHub Actions secrets configured

          ## Step 1: AWS Infrastructure Setup

          Follow [docs/AWS_SETUP.md](AWS_SETUP.md):
          - Create Secrets Manager secret
          - Create IAM role and policies
          - Create instance profile
          - Create ECR repository

          ## Step 2: Configure Slack App

          Follow [infrastructure/SLACK_APP_SETUP.md](../infrastructure/SLACK_APP_SETUP.md):
          - Create app at api.slack.com
          - Configure Bot Token Scopes
          - Configure App-Level Token Scopes
          - Configure Event Subscriptions
          - Configure Slash Command
          - Store tokens in Secrets Manager

          ## Step 3: Launch EC2 Instance

          ```bash
          # Make launch script executable
          chmod +x infrastructure/launch-ec2.sh

          # Launch instance (requires AWS CLI configured)
          ./infrastructure/launch-ec2.sh

          # Note the instance IP address from output
          ```

          ## Step 4: Post-Launch Setup

          Follow [infrastructure/ec2-setup.md](../infrastructure/ec2-setup.md):
          - SSH to instance
          - Copy SSSD configuration
          - Copy docker-compose file
          - Copy systemd service
          - Start service

          ## Step 5: Verify Deployment

          ```bash
          # SSH to instance
          ssh -i /path/to/key.pem admin@<instance-ip>

          # Check service status
          systemctl status maptimize

          # View logs
          docker-compose -f /opt/maptimize/docker-compose.production.yml logs -f

          # Wait for bot to be ready (check for "Socket Mode connected")
          ```

          ## Step 6: Test Slack Integration

          1. Go to Slack workspace
          2. Mention the bot: `@maptimize`
          3. Or use slash command: `/maptimize`
          4. You should see an ephemeral message with the Service Review Process link

          ## Monitoring

          ### Check Bot Status
          ```bash
          # Via EC2 SSH
          systemctl status maptimize
          docker-compose -f /opt/maptimize/docker-compose.production.yml logs -f

          # Via CloudWatch Logs (if configured)
          aws logs tail /aws/ec2/maptimize --follow
          ```

          ### Health Check
          ```bash
          docker ps | grep maptimize-bot
          docker inspect <container-id> | grep -A 5 '"Health"'
          ```

          ## Updating Bot (CI/CD)

          The GitHub Actions workflow automatically:
          1. Builds Docker image on push to main
          2. Pushes image to ECR
          3. EC2 pulls new image on systemd restart

          ### Manual Update

          ```bash
          # SSH to EC2 instance
          ssh admin@<instance-ip>

          # Pull new image and restart
          cd /opt/maptimize
          systemctl restart maptimize

          # Verify
          docker-compose -f infrastructure/docker-compose.production.yml logs
          ```

          ## Rollback (Using Commit SHA Tags)

          If the latest image has issues:

          ```bash
          # Get previous commit SHA
          git log --oneline -5

          # Update docker-compose to use specific SHA tag
          # Edit infrastructure/docker-compose.production.yml:
          # image: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize:abc123def456

          # Restart
          systemctl restart maptimize
          ```

          ## Troubleshooting

          See [docs/TROUBLESHOOTING.md](TROUBLESHOOTING.md) for common issues.

        file_content_troubleshooting: |
          # Troubleshooting Guide

          ## Bot Not Responding to Mentions

          ### Check 1: Bot is Running
          ```bash
          systemctl status maptimize
          docker ps | grep maptimize
          ```

          If not running:
          ```bash
          systemctl start maptimize
          systemctl status maptimize
          ```

          ### Check 2: Slack App Configuration
          - Verify bot is invited to the channel: `/invite @maptimize`
          - Verify bot token has `app_mentions:read` scope
          - Verify Event Subscriptions include `app_mention`

          ### Check 3: Logs
          ```bash
          docker-compose -f /opt/maptimize/docker-compose.production.yml logs
          systemctl -u maptimize -n 50
          ```

          Look for:
          - "Socket Mode connected" (bot is connected to Slack)
          - "mention_received" (event was received)
          - "error" messages (any errors processing)

          ## Slash Command Not Working

          ### Check 1: Command Registered
          - Go to Slack app settings: api.slack.com/apps/
          - Navigate to "Slash Commands"
          - Verify `/maptimize` command exists

          ### Check 2: Bot Permissions
          - Verify bot has `commands` scope
          - Verify `commands` is in Bot Token Scopes

          ### Check 3: Try Command
          ```
          /maptimize
          ```

          Should see ephemeral message.

          ## AWS Secrets Manager Errors

          ### Error: "Failed to fetch Slack tokens"

          Check that secret exists:
          ```bash
          aws secretsmanager get-secret-value \
            --secret-id maptimize/slack-tokens \
            --region eu-west-1
          ```

          If not found, create it:
          ```bash
          aws secretsmanager create-secret \
            --name maptimize/slack-tokens \
            --secret-string '{...}' \
            --region eu-west-1
          ```

          ### Error: "EC2 instance cannot access Secrets Manager"

          Verify IAM role is attached:
          ```bash
          aws ec2 describe-instances --instance-ids <instance-id> \
            --query 'Reservations[0].Instances[0].IamInstanceProfile'
          ```

          Check IAM policy:
          ```bash
          aws iam get-role-policy \
            --role-name maptimize-instance-role \
            --policy-name secrets-manager
          ```

          ## Docker Container Issues

          ### Container keeps restarting

          ```bash
          # Check logs
          docker logs <container-id>

          # Check health
          docker inspect <container-id> | grep -A 10 '"Health"'

          # Manual restart
          docker restart <container-id>
          ```

          ### Out of disk space

          ```bash
          # Check disk usage
          df -h

          # Clean up Docker
          docker system prune

          # Check log size (json-file driver)
          du -sh /var/lib/docker/containers/*/
          ```

          ## Network Issues

          ### Cannot connect to Slack

          Check internet connectivity:
          ```bash
          ping api.slack.com
          curl https://api.slack.com/
          ```

          Check firewall rules:
          - Ensure outbound HTTPS (port 443) is allowed
          - Socket Mode uses secure WebSocket

          ### Check systemd service networking

          ```bash
          systemctl show -p EnvironmentFiles= maptimize
          systemctl show -p Environment= maptimize
          ```

          ## ECR Image Pull Failures

          ### Check image exists

          ```bash
          aws ecr describe-images \
            --repository-name maptimize \
            --region eu-west-1
          ```

          ### Check ECR credentials

          ```bash
          aws ecr get-authorization-token --region eu-west-1
          ```

          ### Manual image pull and test

          ```bash
          docker pull 483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize:latest
          docker run -it --env AWS_REGION=eu-west-1 <image-id> /bin/bash
          ```

          ## Getting Help

          1. Check logs: `docker logs` or `systemctl journal`
          2. Verify configuration: AWS console, Slack API dashboard
          3. Test locally: `docker-compose up` locally
          4. Check documentation: See README.md and docs/

