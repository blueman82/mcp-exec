        file_content_aws_setup: |
          # AWS Infrastructure Setup for Maptimize

          ## Prerequisites
          - AWS CLI configured with appropriate credentials
          - Permission to create IAM roles, Secrets Manager secrets, and ECR repos
          - Slack bot and app tokens available

          ## 1. Create Secrets Manager Secret

          Store Slack tokens (replace with actual tokens from Slack):
          ```bash
          aws secretsmanager create-secret \
            --name maptimize/slack-tokens \
            --secret-string '{
              "bot_token": "xoxb-your-bot-token-here",
              "app_token": "xapp-your-app-token-here"
            }' \
            --region eu-west-1
          ```

          Verify:
          ```bash
          aws secretsmanager get-secret-value \
            --secret-id maptimize/slack-tokens \
            --region eu-west-1
          ```

          ## 2. Create IAM Role

          Create role with trust policy:
          ```bash
          aws iam create-role \
            --role-name maptimize-instance-role \
            --assume-role-policy-document file://infrastructure/iam/trust-policy.json
          ```

          Attach policies:
          ```bash
          # Secrets Manager policy
          aws iam put-role-policy \
            --role-name maptimize-instance-role \
            --policy-name secrets-manager \
            --policy-document file://infrastructure/iam/secrets-policy.json

          # ECR policy
          aws iam put-role-policy \
            --role-name maptimize-instance-role \
            --policy-name ecr-access \
            --policy-document file://infrastructure/iam/ecr-policy.json

          # PCL deny policy (security boundary)
          aws iam put-role-policy \
            --role-name maptimize-instance-role \
            --policy-name pcl-deny \
            --policy-document file://infrastructure/iam/pcl-deny-policy.json
          ```

          Create instance profile:
          ```bash
          aws iam create-instance-profile \
            --instance-profile-name maptimize-instance-profile

          aws iam add-role-to-instance-profile \
            --instance-profile-name maptimize-instance-profile \
            --role-name maptimize-instance-role
          ```

          ## 3. Create ECR Repository

          Create repository:
          ```bash
          aws ecr create-repository \
            --repository-name maptimize \
            --region eu-west-1
          ```

          Verify:
          ```bash
          aws ecr describe-repositories \
            --repository-names maptimize \
            --region eu-west-1
          ```

          Note the repository URL for later: `<account-id>.dkr.ecr.eu-west-1.amazonaws.com/maptimize`

          ## 4. GitHub Actions IAM Role (for CI/CD)

          For GitHub Actions to push to ECR, create role with OIDC:
          ```bash
          # Create OIDC provider (one-time setup)
          aws iam create-open-id-connect-provider \
            --url https://token.actions.githubusercontent.com \
            --client-id-list sts.amazonaws.com \
            --thumbprint-list 6938fd4d98bab03faadb97b34396831e3780aea1

          # Create GitHub Actions role
          aws iam create-role \
            --role-name github-actions-maptimize \
            --assume-role-policy-document file://infrastructure/iam/github-actions-trust.json

          # Attach ECR push policy
          aws iam put-role-policy \
            --role-name github-actions-maptimize \
            --policy-name ecr-push \
            --policy-document file://infrastructure/iam/github-actions-ecr-policy.json
          ```

          ## 5. Verification

          ### Check Secrets Manager
          ```bash
          aws secretsmanager list-secrets --filters Key=name,Values=maptimize --region eu-west-1
          ```

          ### Check IAM Role
          ```bash
          aws iam get-role --role-name maptimize-instance-role
          aws iam list-role-policies --role-name maptimize-instance-role
          ```

          ### Check ECR
          ```bash
          aws ecr describe-repositories --repository-names maptimize --region eu-west-1
          ```

          ### Test Secret Retrieval (Local)
          ```bash
          export AWS_PROFILE=campaign_prod_v7
          python -c "from maptimize.config import get_slack_tokens; print(get_slack_tokens())"
          ```

          ## Next Steps

          1. Launch EC2 instance: `./infrastructure/launch-ec2.sh`
          2. Complete post-launch setup: See `infrastructure/ec2-setup.md`
          3. Verify bot is responding: Check logs in systemd journal
          4. Test Slack integration: Mention bot in channel or use /maptimize

