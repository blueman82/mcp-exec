          from slack_bolt.app import App
          from slack_bolt.adapter.socket_mode import SocketModeHandler
          import os
          from maptimize.config import get_slack_tokens
          from maptimize.handlers import handle_mention, handle_command

          # Get tokens (works in both EC2 and local with AWS_PROFILE)
          BOT_TOKEN, APP_TOKEN = get_slack_tokens()

          # Initialize slack-bolt app
          app = App(token=BOT_TOKEN)

          # Register handlers
          @app.event("app_mention")
          def on_app_mention(body, say):
              handle_mention(body, say)

          @app.command("/maptimize")
          def on_slash_command(ack, body, say):
              ack()
              handle_command(body, say)

          # Socket Mode handler
          if __name__ == "__main__":
              handler = SocketModeHandler(app, APP_TOKEN)
              handler.start()

