            reference: "slack-bolt Socket Mode documentation"
          - point: "No Request URL needed for Socket Mode (bot initiates connection)"
            reference: "Advantage: no firewall rules needed"
          - point: "Tokens must be stored in AWS Secrets Manager"
            reference: "User requirement: no .env files"

