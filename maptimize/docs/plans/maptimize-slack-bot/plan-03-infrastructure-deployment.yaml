        - ".github/workflows/ecr-build-push.yml"
      depends_on: [20]
      estimated_time: "30m"

      description: |
        Complete GitHub Actions workflow for building Docker image and pushing
        to ECR. Test workflow locally and ensure image builds successfully.
        Verify ECR repository is created and accessible.

      test_first:
        test_file: "tests/test_github_workflow.py"
        structure:
          - "test that workflow file is valid YAML"
          - "test that workflow has build job"
          - "test that ECR push step is present"

        example_skeleton: |
          # tests/test_github_workflow.py
          import yaml
          from pathlib import Path

          def test_workflow_file_valid():
              """Verify GitHub Actions workflow is valid YAML."""
              workflow_path = Path('.github/workflows/ecr-build-push.yml')
              with open(workflow_path, 'r') as f:
                  config = yaml.safe_load(f)
              assert 'jobs' in config
              assert 'build-and-push' in config['jobs']

          def test_workflow_has_ecr_login():
              """Verify workflow includes ECR authentication."""
              workflow_path = Path('.github/workflows/ecr-build-push.yml')
              with open(workflow_path, 'r') as f:
                  content = f.read()
              assert 'ecr' in content.lower()
              assert 'login' in content.lower()

      implementation:
        approach: |
          1. Verify GitHub Actions workflow in .github/workflows/
          2. Test Docker build locally: docker build -f infrastructure/Dockerfile .
          3. Verify ECR repository exists: aws ecr describe-repositories --repository-names maptimize
          4. Create repository if needed: aws ecr create-repository --repository-name maptimize
          5. Push test image manually: docker tag maptimize:latest <ecr-url>/maptimize:latest && docker push
          6. Verify image is accessible in ECR

        workflow_yaml_complete: |
          name: Build and Push to ECR

          on:
            push:
              branches:
                - main

          jobs:
            build-and-push:
              runs-on: ubuntu-latest
              permissions:
                id-token: write
                contents: read

              steps:
                - name: Checkout code
                  uses: actions/checkout@v4

                - name: Set up Docker Buildx
                  uses: docker/setup-buildx-action@v3

                - name: Configure AWS credentials
                  uses: aws-actions/configure-aws-credentials@v4
                  with:
                    role-to-assume: arn:aws:iam::483013340174:role/github-actions-maptimize
                    aws-region: eu-west-1

                - name: Login to Amazon ECR
                  id: login-ecr
                  uses: aws-actions/amazon-ecr-login@v2

                - name: Build and push image
                  uses: docker/build-push-action@v5
                  with:
                    context: .
                    file: ./infrastructure/Dockerfile
                    push: true
                    tags: |
                      ${{ steps.login-ecr.outputs.registry }}/maptimize:latest
                      ${{ steps.login-ecr.outputs.registry }}/maptimize:${{ github.sha }}

        key_points:
          - point: "GitHub OIDC role authentication (no long-lived credentials)"
            reference: "AWS best practice for GitHub Actions"
          - point: "ECR repository URL: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize"
            reference: "Replace in workflow if account ID differs"
          - point: "Two tags: latest and commit SHA for rollback capability"
            reference: "Production best practice"

      verification:
        success_criteria:
          - "Workflow file is valid YAML"
          - "ECR repository exists"
          - "Test image builds successfully"
          - "Image pushes to ECR"
          - "Image is accessible via docker pull"

      commit:
