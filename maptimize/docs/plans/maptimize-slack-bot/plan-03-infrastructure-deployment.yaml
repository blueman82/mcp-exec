      description: |
        Document Slack app configuration requirements. Specify OAuth scopes,
        event subscriptions, and slash command setup. Enables independent
        Slack app creation without relying on shared app.

      implementation:
        approach: |
          1. Document app creation steps
          2. List required Bot Token Scopes
          3. List required App-Level Token Scopes
          4. Document Event Subscriptions configuration
          5. Document Slash Command setup
          6. Provide token generation instructions
          7. Note about storing tokens in Secrets Manager

        file_content: |
          # Slack App Setup for Maptimize Bot

          ## Creating the App

          1. Go to https://api.slack.com/apps
          2. Click "Create New App"
          3. Choose "From scratch"
          4. App name: "Maptimize"
          5. Select workspace
          6. Click "Create App"

          ## Bot Token Scopes

          Navigate to "OAuth & Permissions" > "Scopes" > "Bot Token Scopes"

          Add these scopes:
          - `app_mentions:read` - Read mentions of the bot
          - `commands` - Register slash commands
          - `chat:write` - Send messages
          - `users:read` - Read user information

          ## App-Level Token Scopes

          Navigate to "App-Level Tokens" > "Generate Token and Scopes"

          Token name: "socket-mode"

          Add these scopes:
          - `connections:write` - Required for Socket Mode

          ## Event Subscriptions

          Navigate to "Event Subscriptions" and enable it.

          Request URL:
          - Will be filled in by Socket Mode (no URL needed)
          - Enable "Socket Mode"

          Subscribe to bot events:
          - `app_mention` - When bot is mentioned

          ## Slash Commands

          Navigate to "Slash Commands" > "Create New Command"

          Command: `/maptimize`
          Request URL: (leave blank - Socket Mode handles this)
          Short description: "Show Maptimize processes"
          Usage hint: "[optional]"

          ## Retrieve Tokens

          1. Bot token: "OAuth & Permissions" > "Bot User OAuth Token" (starts with xoxb-)
          2. App token: "App-Level Tokens" > copy the token (starts with xapp-)

          ## Store in AWS Secrets Manager

          ```bash
          aws secretsmanager create-secret \
            --name maptimize/slack-tokens \
            --secret-string '{
              "bot_token": "xoxb-...",
              "app_token": "xapp-..."
            }' \
            --region eu-west-1
          ```

          ## Verify

          Test the app locally:
          ```bash
          export AWS_PROFILE=campaign_prod_v7
          python -m maptimize.bot
          ```

          In Slack workspace:
          - Mention bot: @maptimize
          - Use slash command: /maptimize

        key_points:
