          - Configure AWS OIDC authentication (no long-lived credentials)
          - Push image to ECR with latest and commit SHA tags
          - Verify ECR repository created and accessible
          - Test workflow locally with docker build
          - Document rollback procedure using commit SHA tag
        files:
          - ".github/workflows/ecr-build-push.yml"

