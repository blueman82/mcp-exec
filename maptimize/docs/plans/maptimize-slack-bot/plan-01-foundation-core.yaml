plan:
  metadata:
    feature_name: "Maptimize Slack Bot MVP"
    created: "2025-11-19"
    target: "Secure, stateless Slack bot providing ephemeral access to Maptimize process documentation via @mentions and /maptimize slash commands"
    estimated_tasks: 25
    technology_stack: "Python 3.11+, slack-bolt async, Socket Mode WebSockets, AWS EC2, Docker Compose, GitHub Actions → ECR"
    estimated_total_time: "12-16 hours"

  context:
    framework: "slack-bolt (Python async) with Socket Mode WebSockets"
    architecture: "Stateless event-driven architecture. Bot receives events (mentions/commands) via persistent WebSocket, fetches hardcoded process config, formats ephemeral mrkdwn response, returns to user only."
    test_framework: "pytest with pytest-asyncio"
    deployment_target: "AWS EC2 t3.micro (Debian 12), Docker containers, json-file logging, systemd auto-restart"
    ci_cd: "GitHub Actions GHEC → AWS ECR (483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize)"
    key_constraints:
      - "No version pinning on dependencies (bare requirements)"
      - "No .env files locally (AWS CLI profiles + programmatic secret fetching from Secrets Manager)"
      - "No CloudWatch (json-file logging with rotation only)"
      - "No external monitoring/scanning tools (Trivy, etc.)"
      - "IAM policies must mirror AskSplunk (except no DynamoDB)"
      - "SSSD/SUDO integration required for EC2 LDAP access"
      - "Socket Mode required (persistent WebSocket, no port exposure)"
      - "Ephemeral messages only (visible to user who triggered bot)"
    aws_account: "483013340174 (eu-west-1)"
    slack_setup_required: true

  worktree_groups:
    - group_id: "chain-1"
      description: "Foundation setup tasks (pyproject, structure, config files)"
      tasks: [1, 2, 3, 4, 5, 6]
      branch: "feature/maptimize-slack-bot/chain-1"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Setup tasks must establish project structure and configuration before implementation can begin"
      blocking: true
      estimated_time: "2 hours"

    - group_id: "chain-2"
      description: "Core implementation (config module → bot → handlers → formatter → tests)"
      tasks: [7, 8, 9, 10, 13]
      branch: "feature/maptimize-slack-bot/chain-2"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Tests written first (TDD), then implementation. Bot depends on config, handlers depend on bot and formatter."
      blocking: true
      estimated_time: "5 hours"
      depends_on_worktree: ["chain-1"]

    - group_id: "independent-3"
      description: "Hardcoded process configuration"
      tasks: [11]
      branch: "feature/maptimize-slack-bot/independent-3"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Static JSON config file, no dependencies on other code"
      blocking: false
      estimated_time: "15m"

    - group_id: "independent-4"
      description: "Utility functions module"
      tasks: [12]
      branch: "feature/maptimize-slack-bot/independent-4"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Utility functions for logging and validation, can be developed independently"
      blocking: false
      estimated_time: "30m"

    - group_id: "chain-5"
      description: "Infrastructure files (Docker, compose, IAM policies)"
      tasks: [14, 15, 16, 17, 18]
      branch: "feature/maptimize-slack-bot/chain-5"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Docker files depend on project structure; IAM policies referenced in deploy scripts"
      blocking: true
      estimated_time: "3 hours"
      depends_on_worktree: ["chain-1"]

    - group_id: "chain-6"
      description: "Deployment scripts and CI/CD pipeline"
      tasks: [19, 20, 22]
      branch: "feature/maptimize-slack-bot/chain-6"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "systemd service depends on Docker structure; deploy script uses EC2 setup; GitHub Actions uses ECR repo"
      blocking: true
      estimated_time: "2.5 hours"
      depends_on_worktree: ["chain-5"]

    - group_id: "independent-7"
      description: "Documentation for Slack app setup"
      tasks: [21]
      branch: "feature/maptimize-slack-bot/independent-7"
      execution_model: "parallel"
      isolation: "separate-worktree"
      rationale: "Documentation can be written in parallel; no code dependencies"
      blocking: false
      estimated_time: "20m"

    - group_id: "chain-8"
      description: "Final testing, AWS setup, and deployment documentation"
      tasks: [23, 24, 25]
      branch: "feature/maptimize-slack-bot/chain-8"
      execution_model: "sequential"
      isolation: "separate-worktree"
      rationale: "Integration tests depend on complete codebase; AWS setup depends on IAM policies; deployment guide depends on all previous work"
      blocking: true
      estimated_time: "2 hours"
      depends_on_worktree: ["chain-2", "chain-6"]

