  development_environment:
    python:
      required_version: "3.11+"
      venv_setup: |
        python -m venv venv
        source venv/bin/activate  # macOS/Linux
        # or venv\Scripts\activate  # Windows

      type_checking:
        tool: "mypy"
        required: true
        config_location: "pyproject.toml [tool.mypy] section"
        validation_command: "python -m mypy src/"

      testing:
        tool: "pytest with pytest-asyncio"
        required: true
        config_location: "pyproject.toml [tool.pytest.ini_options] section"
        validation_command: "python -m pytest --collect-only"

      validation_commands:
        - "python --version"
        - "python -m pip --version"
        - "python -c \"import slack_bolt; print('slack-bolt OK')\""
        - "python -m mypy src/"
        - "python -m pytest --collect-only"

  common_pitfalls_reference:
    purpose: |
      Critical mistakes that occur in Slack bot projects. Review BEFORE starting to avoid.

    async_context_manager_python:
      pitfall: "Missing __aexit__ in async context managers"
      why: "Causes RuntimeError when using 'async with' - connection never closes"
      detection: |
        grep -r "async def __aenter__" src/
        # Then verify each file also has __aexit__
      fix: |
        class DatabaseConnection:
            async def __aenter__(self):
                # ... connect
                return self

            async def __aexit__(self, exc_type, exc_val, exc_tb):
                # REQUIRED - must exist
                await self.connection.close()

    bot_initialization_order:
      pitfall: "Using bot.user.id or self.user.id before on_ready() called"
      why: "Slack API hasn't initialized user info yet - causes NoneType errors"
      fix: |
        class SlackHandler:
            def __init__(self):
                self.bot_user_id = None  # Initialize as None

            def on_ready(self, body):
                # Called when bot connects
                self.bot_user_id = body['user_id']

            def handle_message(self, message):
                # Now safe to use
                if message['user'] == self.bot_user_id:
                    return  # ignore own messages

    import_patterns_python:
      pitfall: "Using 'from src.bot...' instead of 'from bot...'"
      why: "Breaks when running from different directories (tests, scripts)"
      detection: "grep -r \"from src\\.\" ."
      fix: |
        # CORRECT (assuming src/ in PYTHONPATH via pytest.ini)
        from bot.handlers import MessageHandler
        from config import get_secrets

        # pyproject.toml must have:
        # [tool.pytest.ini_options]
        # pythonpath = ["src"]

    event_handler_error_handling:
      pitfall: "Unhandled exceptions in Slack event handlers"
      why: "Crashes entire bot - one message error kills the app"
      fix: |
        @app.event("app_mention")
        def handle_mention(body, say, logger):
            try:
                user_id = body['user']
                # ... process
                say(text="Response", response_type="ephemeral")
            except Exception as e:
                logger.error(f"Error in mention handler: {e}", exc_info=True)
                # Try to notify user but don't crash
                try:
                    say(text="An error occurred", response_type="ephemeral")
                except Exception:
                    pass  # If notification fails, at least don't crash

    version_pinning:
      pitfall: "Adding version constraints to dependencies"
      why: "User explicitly prohibited - causes fragility and upgrade issues"
      detection: "grep \">=\\|==\\|<=\" pyproject.toml"
      fix: |
        # CORRECT - bare requirements
        dependencies = [
            "slack-bolt[async]",
            "slack-sdk",
            "aioboto3",
            "boto3",
            "botocore",
            "python-dotenv",
            "structlog",
        ]

        # WRONG - version pinning
        # dependencies = [
        #     "slack-bolt[async]>=1.18.0",
        #     "boto3==1.26.0",
        # ]

    env_files:
      pitfall: "Creating local .env files with tokens"
      why: "User prohibited - security risk and inconsistent with Adobe's practices"
      fix: |
        # CORRECT - programmatic fetching at runtime
        import boto3

        def get_slack_tokens():
            session = boto3.Session(profile_name=os.getenv('AWS_PROFILE'))
            client = session.client('secretsmanager', region_name='eu-west-1')
            secret = client.get_secret_value(SecretId='maptimize/slack-tokens')
            data = json.loads(secret['SecretString'])
            return data['bot_token'], data['app_token']

        # WRONG - local .env file
        # load_dotenv()
        # bot_token = os.getenv('SLACK_BOT_TOKEN')

  tasks:
    - task_number: 1
      name: "Development environment setup and validation"
      agent: "python-pro"
      worktree_group: "chain-1"
      files:
        - "pyproject.toml"
        - "conftest.py"
        - "pytest.ini"
      depends_on: []
      estimated_time: "30m"

      description: |
        Set up Python development environment with virtual environment, basic project
        structure, and validate all tools work correctly. This task MUST complete
        before any other implementation tasks can begin.

      test_first:
        test_file: "conftest.py"
        structure:
          - "pytest configuration with pythonpath pointing to src/"
          - "asyncio_mode set to auto for async test support"
          - "Basic fixtures for test environment"

        mocks: []
        fixtures:
          - "event_loop fixture for async tests"
          - "mock_logger fixture for testing log output"

        assertions:
          - "pytest --collect-only finds test files"
          - "async test execution works"

        example_skeleton: |
          # conftest.py
          import pytest
          import sys
          import logging
          from pathlib import Path

          # Add src/ to path for imports
          sys.path.insert(0, str(Path(__file__).parent / "src"))

          @pytest.fixture
          def event_loop():
              """Provide event loop for async tests."""
              import asyncio
              loop = asyncio.new_event_loop()
              yield loop
              loop.close()

          @pytest.fixture
          def mock_logger(mocker):
              """Provide mock logger for testing log messages."""
              return mocker.patch('structlog.get_logger')

      implementation:
        approach: |
          1. Create pyproject.toml with Python 3.11+ requirement
          2. Define dev dependencies (pytest, pytest-asyncio, pytest-cov)
          3. Create conftest.py with pytest configuration
          4. Create pytest.ini with test discovery settings
          5. Verify imports and dependencies can be resolved
          6. Create basic directory structure (src/, tests/, infrastructure/, config/)

        code_structure: |
          # pyproject.toml structure
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"

          [project]
          name = "maptimize"
          version = "0.1.0"
          requires-python = ">=3.11"

          [project.optional-dependencies]
          dev = [...]

          [tool.pytest.ini_options]
          pythonpath = ["src"]
          testpaths = ["tests"]

          [tool.mypy]
          python_version = "3.11"
          ...

        key_points:
          - point: "pythonpath in pytest.ini must include src/"
            reference: "This enables correct imports without 'from src.' prefix"
          - point: "asyncio_mode = auto for proper async test execution"
            reference: "pytest-asyncio documentation"
          - point: "mypy configuration must include mypy_path = src"
            reference: "Enables type checking with proper module resolution"

      code_quality:
        python:
          formatter:
            tool: "black"
            command: "python -m black ."
            blocking: true
          linter:
            tool: "ruff"
            command: "python -m ruff check ."
            blocking: false
          type_checker:
            tool: "mypy"
            command: "python -m mypy src/"
            blocking: true

      verification:
        manual_testing:
          - step: "Verify virtual environment"
            command: "python -m venv venv && source venv/bin/activate"
          - step: "Verify pytest installed"
            command: "python -m pytest --version"
          - step: "Verify mypy installed"
            command: "python -m mypy --version"

        automated_tests:
          command: "python -m pytest --collect-only"
          expected_output: "collected 0 items (no tests yet)"

        success_criteria:
          - "pyproject.toml is valid and parseable"
          - "pytest can collect tests"
          - "mypy configuration is valid"
          - "conftest.py loads without errors"
          - "Virtual environment setup works"

      commit:
        type: "chore"
        message: "setup: initialize Python project with development environment"
        body: |
          - Create pyproject.toml with build system and dev dependencies
          - Add conftest.py with pytest and asyncio configuration
          - Create pytest.ini with test discovery settings
          - Create basic directory structure (src/, tests/, infrastructure/, config/)
          - Configure mypy for type checking with proper pythonpath
        files:
          - "pyproject.toml"
          - "conftest.py"
          - "pytest.ini"

    - task_number: 2
      name: "Create pyproject.toml with bare dependencies"
      agent: "python-pro"
      worktree_group: "chain-1"
      files:
        - "pyproject.toml"
      depends_on: [1]
      estimated_time: "15m"

      description: |
        Define project metadata and dependencies in pyproject.toml. Strictly follow
        AskSplunk pattern: bare requirements with NO version pinning. Install slack-bolt[async]
        with Socket Mode support, async AWS clients, and structlog for logging.

      test_first:
        test_file: "tests/test_dependencies.py"
        structure:
          - "test that pyproject.toml is valid TOML"
          - "test that all required modules can be imported"
          - "test that no version constraints are present in dependencies"

        example_skeleton: |
          # tests/test_dependencies.py
          import tomllib
          from pathlib import Path

          def test_pyproject_valid_toml():
              """Verify pyproject.toml is valid TOML."""
              pyproject_path = Path(__file__).parent.parent / "pyproject.toml"
              with open(pyproject_path, 'rb') as f:
                  config = tomllib.load(f)
              assert config['project']['name'] == 'maptimize'

          def test_no_version_pinning():
              """Ensure no version constraints in dependencies."""
              pyproject_path = Path(__file__).parent.parent / "pyproject.toml"
              with open(pyproject_path, 'r') as f:
                  content = f.read()
              # Check for version operators
              assert '>=' not in content.split('[project]')[1].split('dependencies')[1]
              assert '==' not in content.split('[project]')[1].split('dependencies')[1]

      implementation:
        approach: |
          1. Define project metadata (name, version, requires-python, description)
          2. List runtime dependencies as bare requirements (NO version constraints)
          3. Define development dependencies (pytest, mypy, black, ruff)
          4. Include build system configuration (hatchling)
          5. Include tool configurations (pytest, mypy, black, ruff)

        code_structure: |
          [build-system]
          requires = ["hatchling"]
          build-backend = "hatchling.build"

          [project]
          name = "maptimize"
          version = "0.1.0"
          description = "Slack bot for Maptimize process documentation access"
          requires-python = ">=3.11"
          dependencies = [
              "slack-bolt[async]",
              # ... more dependencies
          ]

          [project.optional-dependencies]
          dev = [
              "pytest",
              "pytest-asyncio",
              # ... more dev dependencies
          ]

        key_points:
          - point: "Bare dependencies - NO >=, ==, or <= operators"
            reference: "AskSplunk pyproject.toml pattern"
          - point: "Include slack-bolt[async] for Socket Mode support"
            reference: "slack-bolt documentation for async and Socket Mode"
          - point: "boto3 and aioboto3 for AWS Secrets Manager access"
            reference: "For programmatic token fetching at runtime"

        critical_patterns:
          correct_dependencies: |
            # CORRECT - bare requirements
            dependencies = [
                "slack-bolt[async]",
                "slack-sdk",
                "aioboto3",
                "boto3",
                "botocore",
                "python-dotenv",
                "structlog",
            ]

          wrong_version_pinning: |
            # WRONG - DO NOT DO THIS
            dependencies = [
                "slack-bolt[async]>=1.18.0",
                "boto3==1.26.0",
                "structlog>=23.0",
            ]

      verification:
        success_criteria:
          - "pyproject.toml is valid TOML"
          - "All dependencies listed without version constraints"
          - "build-system section is present"
          - "Tool configuration sections (pytest, mypy, black, ruff) are present"
          - "requires-python = >=3.11 is set"

      commit:
        type: "chore"
        message: "setup: define project dependencies in pyproject.toml"
        body: |
          - Add project metadata (name, version, description, requires-python)
          - Define runtime dependencies with NO version pinning:
            - slack-bolt[async] for Socket Mode Slack integration
            - aioboto3 for async AWS Secrets Manager access
            - structlog for structured logging
          - Define development dependencies (pytest, mypy, black, ruff)
          - Configure build system (hatchling)
          - Add tool configurations for pytest, mypy, black, ruff
        files:
          - "pyproject.toml"

    - task_number: 3
      name: "Create GitHub Actions ECR workflow file"
      agent: "deployment-engineer"
      worktree_group: "chain-1"
      files:
        - ".github/workflows/ecr-build-push.yml"
      depends_on: [2]
      estimated_time: "20m"

      description: |
        Create GitHub Actions workflow that builds Docker image and pushes to ECR.
        Based on AskSplunk pattern. Triggers on push to main branch, builds image,
        authenticates to ECR, and pushes with latest tag.

      test_first:
        test_file: "tests/test_github_actions.py"
        structure:
          - "test that workflow file exists"
          - "test that workflow is valid YAML"
          - "test that required steps are present"

        example_skeleton: |
          # tests/test_github_actions.py
          import yaml
          from pathlib import Path

          def test_ecr_workflow_exists():
              """Verify ECR workflow file exists."""
              workflow_path = Path(__file__).parent.parent / ".github" / "workflows" / "ecr-build-push.yml"
              assert workflow_path.exists()

          def test_ecr_workflow_valid_yaml():
              """Verify workflow YAML is valid."""
              workflow_path = Path(__file__).parent.parent / ".github" / "workflows" / "ecr-build-push.yml"
              with open(workflow_path, 'r') as f:
                  config = yaml.safe_load(f)
              assert 'jobs' in config
              assert 'build-and-push' in config['jobs']

      implementation:
        approach: |
          1. Create .github/workflows directory structure
          2. Define workflow triggers (push to main)
          3. Set up build job with checkout, setup buildx, login to ECR
          4. Build Docker image with tags (latest, git short SHA)
          5. Push image to ECR repository

        code_structure: |
          name: Build and Push to ECR

          on:
            push:
              branches:
                - main

          jobs:
            build-and-push:
              runs-on: ubuntu-latest
              steps:
                - uses: actions/checkout@v3
                - name: Set up Docker Buildx
                  uses: docker/setup-buildx-action@v2
                - name: Login to ECR
                  # AWS CLI login
                - name: Build and push
                  uses: docker/build-push-action@v4

        key_points:
          - point: "Reference AskSplunk ECR_WORKFLOW_SETUP.md for exact pattern"
            reference: "asksplunk/docs/ECR_WORKFLOW_SETUP.md"
          - point: "ECR repository: maptimize (not asksplunk)"
            reference: "AWS account 483013340174, region eu-west-1"
          - point: "Push to: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize"
            reference: "Update from AskSplunk pattern"

      verification:
        success_criteria:
          - "Workflow file is valid YAML"
          - "Contains build-and-push job"
          - "ECR login step present"
          - "Docker build step present"
          - "Push step with correct ECR repository URL"

      commit:
        type: "chore"
        message: "ci: create GitHub Actions workflow for ECR build and push"
        body: |
          - Create .github/workflows/ecr-build-push.yml
          - Trigger on push to main branch
          - Build Docker image with latest and git SHA tags
          - Authenticate to ECR and push image
          - Repository: 483013340174.dkr.ecr.eu-west-1.amazonaws.com/maptimize
        files:
          - ".github/workflows/ecr-build-push.yml"

    - task_number: 4
      name: "Create project directory structure"
      agent: "python-pro"
      worktree_group: "chain-1"
      files:
        - "src/maptimize/__init__.py"
        - "src/maptimize/py.typed"
        - "tests/__init__.py"
        - "infrastructure/.gitkeep"
        - "config/.gitkeep"
        - ".dockerignore"
        - ".gitignore"
      depends_on: [1]
      estimated_time: "10m"

      description: |
        Create the complete directory structure for the project. Set up src/ for
        package code, tests/ for test files, infrastructure/ for Docker and deployment
        files, config/ for process definitions. Add py.typed marker for PEP 561 compliance.

      test_first:
        test_file: "tests/test_structure.py"
        structure:
          - "test that required directories exist"
          - "test that py.typed file exists in package"

        example_skeleton: |
          # tests/test_structure.py
          from pathlib import Path

          def test_directory_structure():
              """Verify required directories exist."""
              required_dirs = [
                  'src/maptimize',
                  'tests',
                  'infrastructure',
                  'config'
              ]
              for dir_path in required_dirs:
                  assert Path(dir_path).exists()

          def test_py_typed_exists():
              """Verify py.typed marker for type hints."""
              py_typed = Path('src/maptimize/py.typed')
              assert py_typed.exists()

      implementation:
        approach: |
          1. Create src/maptimize/ directory for package code
          2. Add src/maptimize/__init__.py to make it a package
          3. Add src/maptimize/py.typed for PEP 561 type hint compliance
