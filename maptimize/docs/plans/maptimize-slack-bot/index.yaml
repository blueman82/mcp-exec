  notes_for_user:
    purpose: |
      This YAML plan enables a skilled Python engineer with zero context about
      Maptimize to successfully implement the entire MVP from scratch. The plan
      includes:

      1. Complete breakdown of 25 tasks
      2. Test-first (TDD) approach for every task
      3. Detailed code structure and examples
      4. Infrastructure automation (Docker, EC2, IAM)
      5. CI/CD pipeline setup
      6. Comprehensive testing and verification
      7. Production deployment procedures
      8. Documentation and troubleshooting guides

      The plan respects all user constraints:
      - No version pinning on dependencies
      - No .env files (AWS Secrets Manager only)
      - Programmatic secret fetching at runtime
      - json-file logging (no CloudWatch)
      - IAM policies mirrored from AskSplunk
      - SSSD/SUDO integration for LDAP
      - Socket Mode WebSocket (no port exposure)
      - EC2 t3.micro Debian 12 deployment
      - GitHub Actions → ECR pipeline
      - Ephemeral Slack messages (user-only visibility)

    conductor_compatibility: |
      This plan is formatted for Conductor auto-discovery:
      - Phase 2A format (plan-01-*.yaml through plan-04-*.yaml)
      - Sequential numbering for proper load order
      - Each file is independently valid YAML
      - Cross-file references via index.yaml
      - Run with: conductor run docs/plans/maptimize-slack-bot/
      - Or start first file: conductor run docs/plans/maptimize-slack-bot/plan-01-foundation-core.yaml

    estimated_implementation_time: |
      - Single engineer: 20-24 hours (sequential)
      - Three engineers: 8-10 hours (parallel execution)
      - Four engineers: 6-8 hours (optimal parallelism)

      Parallel execution savings: 50-70% faster with team approach

    next_session_instructions: |
      1. User can start immediately with plan-01-foundation-core.yaml
      2. Create worktree for chain-1: git worktree add ../wt-chain-1 -b feature/maptimize-slack-bot/chain-1
      3. Follow tasks 1-6 sequentially
      4. After chain-1 completes, create parallel worktrees for chain-2 and chain-5
      5. Use index.yaml to understand dependencies and scheduling
      6. Merge worktree branches to main in dependency order
      7. Reference each task's test-first and code structure sections for implementation details
