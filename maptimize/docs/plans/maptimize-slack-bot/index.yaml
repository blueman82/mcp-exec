plan_index:
  metadata:
    feature_name: "Maptimize Slack Bot MVP"
    created: "2025-11-19"
    total_tasks: 25
    total_files: 4
    total_lines: 7312
    estimated_total_time: "20-24 hours"
    estimated_parallel_speedup: "3-4x with multiple engineers"

  files:
    - sequence: 1
      filename: "plan-01-foundation-core.yaml"
      phase: "Phase 1: Foundation & Setup"
      worktree_group: "chain-1"
      tasks: [1, 2, 3, 4, 5, 6]
      line_count: 1847
      estimated_time: "2 hours"
      description: "Development environment setup, project structure, pyproject.toml, GitHub Actions workflow initialization"
      completion_blocker: true
      dependencies_on: []
      precedes: ["plan-02", "plan-03"]

    - sequence: 2
      filename: "plan-02-core-implementation.yaml"
      phase: "Phase 2: Core Implementation"
      worktree_groups:
        - "chain-2: sequential core code (tasks 7-13)"
        - "independent-3: config file (task 11)"
        - "independent-4: utilities (task 12)"
      tasks: [7, 8, 9, 10, 11, 12, 13]
      line_count: 1862
      estimated_time: "5 hours"
      description: "Slack-bolt bot implementation, config module, message handlers, formatters, process config, integration tests"
      completion_blocker: true
      dependencies_on: ["plan-01"]
      precedes: ["plan-04"]

    - sequence: 3
      filename: "plan-03-infrastructure-deployment.yaml"
      phase: "Phase 3: Infrastructure & Deployment"
      worktree_groups:
        - "chain-5: infrastructure files (tasks 14-18)"
        - "chain-6: scripts and CI/CD (tasks 19-22)"
        - "independent-7: documentation (task 21)"
      tasks: [14, 15, 16, 17, 18, 19, 20, 21, 22]
      line_count: 2147
      estimated_time: "6 hours"
      description: "Docker files, docker-compose (dev/prod), IAM policies, EC2 scripts, systemd service, GitHub Actions, documentation"
      completion_blocker: true
      dependencies_on: ["plan-01"]
      precedes: ["plan-04"]

    - sequence: 4
      filename: "plan-04-testing-deployment-completion.yaml"
      phase: "Phase 4: Final Testing & Deployment"
      worktree_group: "chain-8: sequential final phase"
      tasks: [23, 24, 25]
      line_count: 1456
      estimated_time: "3.5 hours"
      description: "Integration and e2e tests (>80% coverage), AWS Secrets Manager and IAM setup, README and deployment guides"
      completion_blocker: true
      dependencies_on: ["plan-02", "plan-03"]
      precedes: []

  worktree_groups:
    - group_id: "chain-1"
      description: "Foundation setup (sequential)"
      tasks: [1, 2, 3, 4, 5, 6]
      branch: "feature/maptimize-slack-bot/chain-1"
      can_start_immediately: true
      estimated_time: "2 hours"

    - group_id: "chain-2"
      description: "Core implementation (sequential)"
      tasks: [7, 8, 9, 10, 13]
      branch: "feature/maptimize-slack-bot/chain-2"
      can_start_after: ["chain-1"]
      estimated_time: "4.5 hours"

    - group_id: "independent-3"
      description: "Process configuration (parallel)"
      tasks: [11]
      branch: "feature/maptimize-slack-bot/independent-3"
      can_start_after: ["chain-1"]
      can_run_parallel_with: ["chain-2", "independent-4", "chain-5"]
      estimated_time: "15m"

    - group_id: "independent-4"
      description: "Utility functions (parallel)"
      tasks: [12]
      branch: "feature/maptimize-slack-bot/independent-4"
      can_start_after: ["chain-1"]
      can_run_parallel_with: ["chain-2", "independent-3", "chain-5"]
      estimated_time: "30m"

    - group_id: "chain-5"
      description: "Infrastructure files (sequential)"
      tasks: [14, 15, 16, 17, 18]
      branch: "feature/maptimize-slack-bot/chain-5"
      can_start_after: ["chain-1"]
      can_run_parallel_with: ["chain-2", "independent-3", "independent-4"]
      estimated_time: "2 hours"

    - group_id: "chain-6"
      description: "Deployment scripts and CI/CD (sequential)"
      tasks: [19, 20, 22]
      branch: "feature/maptimize-slack-bot/chain-6"
      can_start_after: ["chain-5"]
      estimated_time: "1.5 hours"

    - group_id: "independent-7"
      description: "Documentation (parallel)"
      tasks: [21]
      branch: "feature/maptimize-slack-bot/independent-7"
      can_start_after: ["chain-1"]
      can_run_parallel_with: ["chain-2", "chain-5", "chain-6"]
      estimated_time: "20m"

    - group_id: "chain-8"
      description: "Final testing and deployment (sequential)"
      tasks: [23, 24, 25]
      branch: "feature/maptimize-slack-bot/chain-8"
      can_start_after: ["chain-2", "chain-6"]
      estimated_time: "3.5 hours"

  execution_strategy:
    recommended_team_size: "3-4 engineers"
    sequential_critical_path: "chain-1 → chain-2 → chain-8 OR chain-1 → chain-5 → chain-6 → chain-8"
    parallel_opportunity: |
      After completing chain-1, teams can work in parallel:
      - Engineer A: chain-2 (core implementation)
      - Engineer B: chain-5 (infrastructure files)
      - Engineer C: independent-3, independent-4, independent-7 (quick parallel tasks)
      - After A and B complete: Engineer C/D work on chain-6 and chain-8

    single_engineer_timeline: "20-24 hours (sequential)"
    three_engineer_timeline: "8-10 hours (parallel execution)"
    four_engineer_timeline: "6-8 hours (optimal parallelism)"

  critical_path_analysis:
    critical_path_duration: "15.5 hours (chain-1 → chain-2 → chain-8)"
    critical_tasks:
      - "Task 1: Dev environment validation (blocking)"
      - "Task 2: pyproject.toml"
      - "Task 3: GitHub Actions workflow"
      - "Task 6: Module structure"
      - "Task 7: config.py (Secrets Manager)"
      - "Task 8: bot.py (slack-bolt)"
      - "Task 9: handlers.py"
      - "Task 10: formatter.py"
      - "Task 13: Integration tests"
      - "Task 14: Dockerfile"
      - "Task 18: IAM policies"
      - "Task 19: systemd service"
      - "Task 20: EC2 launch script"
      - "Task 23: Final tests"
      - "Task 24: AWS setup"
      - "Task 25: Documentation"

    optional_parallel_tasks:
      - "Task 11: processes.json (can start anytime after Task 1)"
      - "Task 12: utils.py (can start anytime after Task 1)"
      - "Task 21: Documentation (can start anytime after Task 1)"

  planning_guidelines:
    rule_1: "Start with chain-1 (foundation) - blocks everything else"
    rule_2: "After chain-1, start chain-2 and chain-5 in parallel if multiple engineers"
    rule_3: "Independent tasks (11, 12, 21) can be assigned to 3rd/4th engineer immediately after chain-1"
    rule_4: "chain-6 depends on chain-5 - cannot start until chain-5 complete"
    rule_5: "chain-8 depends on chain-2 and chain-6 - must merge both before starting"
    rule_6: "Merge worktree branches to main in dependency order to avoid integration issues"

  getting_started:
    first_step: "Read plan-01-foundation-core.yaml (tasks 1-6)"
    command_to_start: |
      # Create and start first worktree
      git worktree add ../wt-chain-1 -b feature/maptimize-slack-bot/chain-1
      cd ../wt-chain-1

      # Read task details from plan-01-foundation-core.yaml
      # Complete tasks 1-6 sequentially
      # Commit after each task as documented

      # When done, merge to main
      git checkout main
      git merge feature/maptimize-slack-bot/chain-1
      git push origin main

    what_to_read_next: |
      1. plan-01-foundation-core.yaml (foundation setup)
      2. If working on core code: plan-02-core-implementation.yaml
      3. If working on infrastructure: plan-03-infrastructure-deployment.yaml
      4. Final phase: plan-04-testing-deployment-completion.yaml

  quick_reference:
